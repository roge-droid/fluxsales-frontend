  <main style="max-width:880px;margin:0 auto;padding:48px 20px;font-family:Inter,system-ui,sans-serif">

    <ul>
      <li><strong>Flotilla — $1,499/mes</strong> + costo de envío directo. Entregas on-demand en 30 min, $0 comisión de entrega. Solo entregas.</li>

      <li><strong>Flux Higher — $7,499/mes</strong>. Todo incluido: plataforma + Flotilla + Mesero IA (toma pedidos por WhatsApp 24/7) + success manager.</li>
    </ul>
    <p>Tarifas especiales disponibles para multi-sucursal. <a href="/demo">Agenda una demo</a>.</p>
  </main>
</noscript>
<div id="root"></div>

<script type="text/babel" src="/landing/components/Sections.jsx"></script>

<script type="text/babel">
function LogoMark() {
  return (
    <span className="logo-mark" aria-hidden="true">
      <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
        <g fill="currentColor">
          <rect x="54" y="40" width="50" height="172" rx="6"/>
          <rect x="54" y="40" width="150" height="46" rx="6"/>
          <rect x="54" y="108" width="98" height="38" rx="6"/>
          <path d="M 148 94 Q 152 92 158 96 L 198 124 Q 202 128 198 132 L 158 160 Q 152 164 148 162 L 148 94 Z"/>
        </g>
      </svg>
    </span>
  );
}

function Nav({ lang, setLang }) {
  const t = window.COPY[lang].nav;
  return (
    <header className="nav">
      <div className="wrap nav-inner">
        <a href="/" className="logo">
          <LogoMark />
          <span>Fluxsales</span>
        </a>
        <nav className="nav-links">
          <a href="/#product">{t.product}</a>
          <a href="/#how">{t.howItWorks}</a>
          <a href="/pricing">{t.pricing}</a>
          <a href="/#stories">{t.stories}</a>
          <a href="/#faq">{lang === "es" ? "Preguntas" : "FAQ"}</a>
        </nav>
        <div className="nav-right">
          <div className="lang-toggle" role="group" aria-label="language">
            <button className={lang === "es" ? "on" : ""} onClick={() => setLang("es")}>ES</button>
            <button className={lang === "en" ? "on" : ""} onClick={() => setLang("en")}>EN</button>
          </div>
          <a href="/demo" className="btn btn-primary">{t.cta} <span className="arr">→</span></a>
        </div>
      </div>
    </header>
  );
}

function PricingCTA({ lang }) {
  const t = window.COPY[lang].cta;
  return (
    <section className="endcta" id="demo">
      <div className="wrap">
        <span className="eyebrow" style={{ color: "#0d2c20" }}>{lang === "es" ? "Último paso" : "Last step"}</span>
        <h2 className="display h2" style={{ margin: "16px auto 16px", maxWidth: "14ch" }}>{t.title}</h2>
        <p>{t.subtitle}</p>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
          <a className="btn btn-primary" href="/demo">{t.primary} →</a>
          <a className="btn btn-secondary" href="https://wa.me/5214421716825">{t.secondary}</a>
        </div>
      </div>
    </section>
  );
}

function Footer({ lang }) {
  const t = window.COPY[lang].footer;
  return (
    <footer>
      <div className="wrap">
        <div className="foot-grid">
          <div className="foot-brand">
            <a href="/" className="logo"><LogoMark /><span>Fluxsales</span></a>
            <p>{t.tagline}</p>
          </div>
          <div className="foot-col">
            <h4>{t.product}</h4>
            <ul>{t.productLinks.map((l, i) => <li key={i}><a href={l.href}>{l.label}</a></li>)}</ul>
          </div>
          <div className="foot-col">
            <h4>{t.company}</h4>
            <ul>{t.companyLinks.map((l, i) => <li key={i}><a href={l.href}>{l.label}</a></li>)}</ul>
          </div>
          <div className="foot-col">
            <h4>{t.resources}</h4>
            <ul>{t.resourcesLinks.map((l, i) => <li key={i}><a href={l.href}>{l.label}</a></li>)}</ul>
          </div>
        </div>
        <div className="foot-legal">
          <span>{t.legal}</span>
          <span>CDMX · Monterrey · Guadalajara</span>
        </div>
      </div>
    </footer>
  );
}

function App() {
  const [lang, setLang] = React.useState(() => {
    try { return localStorage.getItem("flux_lang") || "es"; } catch { return "es"; }
  });
  React.useEffect(() => {
    try { localStorage.setItem("flux_lang", lang); document.documentElement.lang = lang; } catch {}
  }, [lang]);

  return (
    <>
      <Nav lang={lang} setLang={setLang} />
      <main style={{ paddingTop: 24 }}>
        <Pricing lang={lang} />
        <FAQ lang={lang} />
      </main>
      <PricingCTA lang={lang} />
      <Footer lang={lang} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
