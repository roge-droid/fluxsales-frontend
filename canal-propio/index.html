// so scripts/local-canal-propio.js can proxy /api/* to the flux-automation server).
const API_BASE = (location.hostname === "localhost" || location.hostname === "127.0.0.1") ? "" : "/api";
const API_URL = API_BASE + "/demo-page/lead-intake";
const SESSION_ID = "sess_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
const FLUX_WA = "5214421716825";

const _qs = new URLSearchParams(location.search);
const UTM = (() => {
  const saved = JSON.parse(sessionStorage.getItem("flux_canal_propio_utm") || "null");
  if (saved) return saved;
  const u = {
    utm_source: _qs.get("utm_source") || "",
    utm_medium: _qs.get("utm_medium") || "",
    utm_campaign: _qs.get("utm_campaign") || "",
    utm_content: _qs.get("utm_content") || "",
    gclid: _qs.get("gclid") || "",
  };
  if (u.utm_source || u.gclid) sessionStorage.setItem("flux_canal_propio_utm", JSON.stringify(u));
  return u;
})();
const UTM_FIELDS = {
  funnel: "volume",
  utm_source: UTM.utm_source || undefined,
  utm_medium: UTM.utm_medium || undefined,
  utm_campaign: UTM.utm_campaign || undefined,
  utm_content: UTM.utm_content || undefined,
  gclid: UTM.gclid || undefined,
};

// ─── Google Ads conversions (shared account 331-202-9931) ────────────────────
const GADS_ID = "AW-18291478874";
const GADS_CONVERSIONS = {
  lead: GADS_ID + "/K15XCPyA-8gcENqih5JE", // reuse "Lead - Diagnóstico" label until a dedicated one ships
};
function gadsConvert(kind) {
  if (typeof gtag !== "function") return;
  const send_to = GADS_CONVERSIONS[kind];
  if (!send_to || send_to.indexOf("<") !== -1) return;
  gtag("event", "conversion", { send_to });
}

function fireEvent(eventType, extra) {
  if (window.datafast) window.datafast(eventType);
  fetch(API_BASE + "/diagnostico/event", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ event_type: eventType, session_id: SESSION_ID, funnel_version: "v1-canal-propio", ...extra }),
  }).catch(() => {});
}

// ─── Savings calculator (client-side) ─────────────────────────────────────────
const RECOVERY_RATE = 0.70;
const COMMISSION_BRACKETS = {
  lt15k:    { min: 0,      max: 15000  },
  "15k-50k":  { min: 15000,  max: 50000  },
  "50k-150k": { min: 50000,  max: 150000 },
  gt150k:   { min: 150000, max: null   },
};
const VENTA_MIDPOINT = { lt50k: 30000, "50k-150k": 100000, "150k-500k": 325000, gt500k: 650000 };

function fmtMXN(n) {
  return "$" + Math.round(n).toLocaleString("es-MX");
}

// Returns { bracketKey, min, max, estimated } — estimated=true when derived from
// venta_online_mensual because the lead didn't know their commission spend.
function resolveCommissionBracket(comisiones, ventaOnline) {
  if (comisiones && comisiones !== "unknown") {
    return { bracketKey: comisiones, ...COMMISSION_BRACKETS[comisiones], estimated: false };
  }
  const ventaMid = VENTA_MIDPOINT[ventaOnline] || VENTA_MIDPOINT["50k-150k"];
  const estComisiones = ventaMid * 0.30;
  let bracketKey = "50k-150k";
  if (estComisiones < 15000) bracketKey = "lt15k";
  else if (estComisiones < 50000) bracketKey = "15k-50k";
  else if (estComisiones < 150000) bracketKey = "50k-150k";
  else bracketKey = "gt150k";
  return { bracketKey, ...COMMISSION_BRACKETS[bracketKey], estimated: true };
}

function computeSavings(comisiones, ventaOnline) {
  const b = resolveCommissionBracket(comisiones, ventaOnline);
  const recoveryMin = b.min * RECOVERY_RATE;
  const recoveryMax = b.max != null ? b.max * RECOVERY_RATE : null;
  let text;
  if (b.bracketKey === "lt15k") text = "hasta ~" + fmtMXN(15000 * RECOVERY_RATE) + "/mes";
  else if (b.bracketKey === "15k-50k") text = "entre ~" + fmtMXN(15000 * RECOVERY_RATE) + " y ~" + fmtMXN(50000 * RECOVERY_RATE) + "/mes";
  else if (b.bracketKey === "50k-150k") text = "entre ~" + fmtMXN(50000 * RECOVERY_RATE) + " y ~" + fmtMXN(150000 * RECOVERY_RATE) + "/mes";
  else text = "más de ~" + fmtMXN(150000 * RECOVERY_RATE) + "/mes";
  if (b.estimated) text += " (estimado con el 30% típico de comisión)";
  return { ...b, recoveryMin, recoveryMax, text };
}

// Plan price shown, keyed off the EFFECTIVE commission bracket (post-estimate).
function resolvePlan(bracketKey) {
  if (bracketKey === "lt15k") return null; // educational lane — skip the investment question
  if (bracketKey === "15k-50k") return { price: 5499, label: "$5,499/mes" };
  return { price: 7499, label: "desde $7,499/mes" }; // 50k-150k, gt150k
}

function roiLine(recoveryMin, plan) {
  if (!plan) return null;
  if (recoveryMin / 4 > plan.price) return "— menos que lo que recuperas en la primera semana";
  if (recoveryMin > plan.price) return "— se paga solo con lo que recuperas";
  return null;
}

function CalendarBooking({ firstName, lastName, email, phone, companyName, assignedAE, onBooked, sessionId, placeId }) {
  const [loading, setLoading] = React.useState(true);
  const [dates, setDates] = React.useState([]);
  const [selectedDate, setSelectedDate] = React.useState(0);
  const [selectedSlot, setSelectedSlot] = React.useState(null);
  const [booking, setBooking] = React.useState(false);
  const [booked, setBooked] = React.useState(null);
  const [error, setError] = React.useState(null);

  const waExpertUrl = "https://wa.me/" + FLUX_WA + "?text=" + encodeURIComponent(
    "Hola, soy " + (firstName || "") + " de " + (companyName || "mi restaurante") + ", quiero hablar con un asesor sobre mi propio canal de pedidos."
  );

  React.useEffect(() => {
    fireEvent("calendar_shown", { place_id: placeId });
    fetch(API_BASE + "/calendar/available-slots?ae=" + encodeURIComponent(assignedAE) + "&days=14")
      .then(r => r.json())
      .then(data => {
        if (data.ok && data.dates?.length) setDates(data.dates);
        else setError("fallback");
      })
      .catch(() => setError("fallback"))
      .finally(() => setLoading(false));
  }, [assignedAE]);

  const handleBook = async () => {
    if (!selectedSlot) return;
    setBooking(true); setError(null);
    try {
      const res = await fetch(API_BASE + "/calendar/book-demo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          ae: assignedAE, start: selectedSlot.start, end: selectedSlot.end,
          first_name: firstName, last_name: lastName, email, phone, company_name: companyName,
          session_id: sessionId, source: "canal_propio", place_id: placeId || undefined,
          ...UTM_FIELDS,
        }),
      });
      const result = await res.json();
      if (!res.ok) { setError(result.error || "No pudimos agendar tu demo."); return; }
      setBooked(result);
      fireEvent("demo_booked", { place_id: placeId });
      if (onBooked) onBooked();
      if (typeof fbq === "function" && result.eventId) {
        fbq("track", "Schedule", { content_name: "canal_propio_booking", value: 0, currency: "MXN" }, { eventID: "schedule_" + result.eventId });
      }
    } catch { setError("No pudimos agendar. Intenta de nuevo."); }
    finally { setBooking(false); }
  };

  if (booked) {
    return (
      <div style={{ textAlign: "center" }}>
        <div className="dx-bk-booked-check">✓</div>
        <h3 className="dx-bk-booked-title">Demo agendada, {firstName}</h3>
        <p style={{ color: "#64748b", fontSize: 15, margin: "0 0 16px" }}>{booked.startFormatted}</p>
        {booked.meetLink && <a href={booked.meetLink} target="_blank" rel="noopener" className="dx-btn" style={{ marginBottom: 8 }}>Abrir Google Meet →</a>}
        <p style={{ fontSize: 13, color: "#94a3b8", marginTop: 14 }}>Te enviamos confirmación a <strong>{email}</strong></p>
      </div>
    );
  }

  if (error === "fallback") {
    return (
      <div style={{ textAlign: "center" }}>
        <p style={{ fontSize: 16, color: "#2563eb", fontWeight: 600, margin: "0 0 16px" }}>Un asesor te escribe hoy mismo.</p>
        <a href={waExpertUrl} target="_blank" rel="noopener" className="dx-btn dx-btn--green" style={{ display: "flex", textDecoration: "none", justifyContent: "center" }}
          onClick={() => fireEvent("ae_whatsapp_chosen", { place_id: placeId })}>💬 Habla con un experto por WhatsApp</a>
      </div>
    );
  }

  if (loading) return <p style={{ textAlign: "center", color: "#2563eb", fontWeight: 500 }}>Cargando horarios...</p>;

  const currentDate = dates[selectedDate];
  const parseLabel = (l) => { const p = l.split(" "); return { day: p[0], num: p[1] }; };

  return (
    <>
      <div className="dx-bk-header">
        <div className="dx-bk-title">Agenda tu demo</div>
        <div className="dx-bk-sub">30 min por Google Meet — te mostramos tu propia cuenta</div>
      </div>
      {error && error !== "fallback" && <div className="dx-error">{error}</div>}
      <div className="dx-bk-dates">
        {dates.map((d, i) => {
          const p = parseLabel(d.dateLabel);
          return (
            <button key={i} onClick={() => { setSelectedDate(i); setSelectedSlot(null); setError(null); }}
              className={"dx-bk-date" + (i === selectedDate ? " on" : "")}>
              <span className="dx-bk-day">{p.day}</span>
              <span className="dx-bk-num">{p.num}</span>
            </button>
          );
        })}
      </div>
      {currentDate && (
        <div className="dx-bk-slots">
          {currentDate.slots.length ? currentDate.slots.map((s, i) => (
            <button key={i} onClick={() => { setSelectedSlot(s); setError(null); }}
              className={"dx-bk-slot" + (selectedSlot === s ? " on" : "")}>
              {s.timeLabel}
            </button>
          )) : <div className="dx-bk-empty">No hay horarios este día.</div>}
        </div>
      )}
      <div style={{ marginTop: 16 }}>
        <button className="dx-btn dx-btn--dark" disabled={!selectedSlot || booking} onClick={handleBook}>
          {booking ? "Agendando..." : selectedSlot ? "Agendar " + selectedSlot.timeLabel + " →" : "Selecciona un horario"}
        </button>
      </div>
      <div className="dx-bk-links">
        <a href={"https://wa.me/" + FLUX_WA}>¿Prefieres WhatsApp?</a>
      </div>
    </>
  );
}

function OptionCard({ selected, onClick, children }) {
  return (
    <button type="button" className={"dx-opt" + (selected ? " on" : "")} onClick={onClick}>
      <span>{children}</span>
      <span className="dx-opt-check">{selected ? "✓" : ""}</span>
    </button>
  );
}

function Progress({ step }) {
  return (
    <div className="dx-progress">
      <div className={"dx-progress-step" + (step >= 1 ? " done" : "") + (step === 1 ? " on" : "")} />
      <div className={"dx-progress-step" + (step >= 2 ? " done" : "") + (step === 2 ? " on" : "")} />
      <div className={"dx-progress-step" + (step >= 3 ? " done" : "") + (step === 3 ? " on" : "")} />
    </div>
  );
}

function CanalPropioApp() {
  // step: "hero" (paso 1 lives in the hero card) → "bant" (paso 2) → "savings" (paso 3) → "result"
  const [step, setStep] = React.useState("paso1");

  // Paso 1 — restaurant picker
  const [companyName, setCompanyName] = React.useState("");
  const [placeId, setPlaceId] = React.useState("");
  const [placeAddress, setPlaceAddress] = React.useState("");
  const [pickerError, setPickerError] = React.useState(null);

  const placesLibRef = React.useRef(null);
  const sessionTokenRef = React.useRef(null);
  const debounceRef = React.useRef(null);
  const blurTimerRef = React.useRef(null);
  const [suggestions, setSuggestions] = React.useState([]);
  const [sugActive, setSugActive] = React.useState(-1);

  React.useEffect(() => {
    if (placesLibRef.current) return;
    let cancelled = false;
    (async () => {
      try {
        const lib = await google.maps.importLibrary("places");
        if (!cancelled) placesLibRef.current = lib;
      } catch (err) { console.error("[places] importLibrary failed:", err); }
    })();
    return () => { cancelled = true; };
  }, []);

  const runSuggest = (text) => {
    const lib = placesLibRef.current;
    const q = (text || "").trim();
    if (!lib || !lib.AutocompleteSuggestion || q.length < 2) { setSuggestions([]); return; }
    if (!sessionTokenRef.current) sessionTokenRef.current = new lib.AutocompleteSessionToken();
    const base = {
      input: q,
      sessionToken: sessionTokenRef.current,
      includedRegionCodes: ["mx", "co", "cl", "pe"],
      language: "es", region: "mx",
    };
    const apply = ({ suggestions }) => {
      const preds = (suggestions || []).map((s) => s.placePrediction).filter(Boolean).slice(0, 5);
      setSuggestions(preds);
      setSugActive(-1);
    };
    const AS = lib.AutocompleteSuggestion;
    AS.fetchAutocompleteSuggestions({ ...base, includedPrimaryTypes: ["establishment"] })
      .then(apply)
      .catch(() => AS.fetchAutocompleteSuggestions(base).then(apply))
      .catch((err) => { console.error("[places] suggest error:", err); setSuggestions([]); });
  };

  const onSearchChange = (val) => {
    setCompanyName(val);
    if (placeId) { setPlaceId(""); setPlaceAddress(""); }
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => runSuggest(val), 220);
  };

  const selectSuggestion = async (pred) => {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    const fallbackName = (pred.text && pred.text.text) || (pred.mainText && pred.mainText.text) || "";
    try {
      const place = pred.toPlace();
      await place.fetchFields({ fields: ["displayName", "formattedAddress"] });
      const n = place.displayName ? (typeof place.displayName === "object" ? place.displayName.text : String(place.displayName)) : fallbackName;
      const a = place.formattedAddress ? (typeof place.formattedAddress === "object" ? place.formattedAddress.text : String(place.formattedAddress)) : "";
      const pid = place.id || pred.placeId || "";
      setCompanyName(n); setPlaceId(pid); setPlaceAddress(a);
    } catch (err) {
      console.error("[places] fetchFields error:", err);
      if (fallbackName) setCompanyName(fallbackName);
      if (pred.placeId) setPlaceId(pred.placeId);
    }
    sessionTokenRef.current = null;
    setSuggestions([]);
    setSugActive(-1);
  };

  const onSearchKeyDown = (e) => {
    if (!suggestions.length) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setSugActive((i) => Math.min(i + 1, suggestions.length - 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setSugActive((i) => Math.max(i - 1, 0)); }
    else if (e.key === "Enter" && sugActive >= 0) { e.preventDefault(); selectSuggestion(suggestions[sugActive]); }
    else if (e.key === "Escape") { setSuggestions([]); }
  };

  // Paso 2 — BANT
  const [bant, setBant] = React.useState({
    ordenes_mensuales: "", venta_online_mensual: "", comisiones_mensuales: "",
    plataformas: "", funnel_timing: "",
  });
  const setBantField = (k, v) => setBant((b) => ({ ...b, [k]: v }));
  const bantComplete = bant.ordenes_mensuales && bant.venta_online_mensual && bant.comisiones_mensuales && bant.plataformas && bant.funnel_timing;

  // Paso 3 — savings + investment + contact
  const [inversionReady, setInversionReady] = React.useState("");
  const [form, setForm] = React.useState({
    first_name: "", last_name: "", email: "",
    country_code: "+52", phone: "", whatsapp_optin: true,
  });
  const [phoneError, setPhoneError] = React.useState("");
  const [submitting, setSubmitting] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [result, setResult] = React.useState(null);

  const savings = React.useMemo(
    () => computeSavings(bant.comisiones_mensuales, bant.venta_online_mensual),
    [bant.comisiones_mensuales, bant.venta_online_mensual]
  );
  const plan = resolvePlan(savings.bracketKey);
  const roiText = plan ? roiLine(savings.recoveryMin, plan) : null;
  const skipInvestmentQuestion = !plan; // lt15k → educational lane

  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const PHONE_LENGTHS = { "+52": 10, "+57": 10, "+56": 9, "+51": 9, "+54": 10, "+1": 10, "+593": 9, "+502": 8 };
  const maxDigits = PHONE_LENGTHS[form.country_code] || 10;
  const digits = form.phone.replace(/\D/g, "");
  const canSubmit = form.first_name.trim() && form.email.trim() && digits.length >= maxDigits;
  const validatePhone = () => {
    const d = form.phone.replace(/\D/g, "");
    if (d.length < maxDigits) { setPhoneError("El número debe tener " + maxDigits + " dígitos"); return false; }
    setPhoneError(""); return true;
  };

  const goToBant = () => {
    const name = companyName.trim();
    if (!name) { setPickerError("Por favor escribe el nombre de tu restaurante."); return; }
    setPickerError(null);
    fireEvent("canal_propio_started", { place_id: placeId });
    setStep("paso2");
  };

  const goToSavings = () => {
    if (!bantComplete) return;
    fireEvent("canal_propio_bant_completed", { place_id: placeId });
    setStep("paso3");
  };

  const handleSubmit = async () => {
    if (!validatePhone()) return;
    setSubmitting(true); setError(null);
    try {
      const fullPhone = form.country_code + form.phone.replace(/\D/g, "");
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          first_name: form.first_name.trim(), last_name: form.last_name.trim(),
          email: form.email.trim(), phone: fullPhone,
          company_name: companyName, place_id: placeId || undefined, place_address: placeAddress || undefined,
          ordenes_mensuales: bant.ordenes_mensuales, venta_online_mensual: bant.venta_online_mensual,
          comisiones_mensuales: bant.comisiones_mensuales, plataformas: bant.plataformas,
          funnel_timing: bant.funnel_timing, inversion_ready: inversionReady || undefined,
          whatsapp_optin: form.whatsapp_optin, session_id: SESSION_ID,
          ...UTM_FIELDS,
        }),
      });
      if (!res.ok) throw new Error(String(res.status));
      const data = await res.json();
      setResult(data);
      fireEvent("canal_propio_contact_submitted", { place_id: placeId });
      if (window.datafast && form.email) window.datafast("identify", { user_id: form.email.trim().toLowerCase() });
      if (typeof fbq === "function" && data.eventId) {
        fbq("track", "Lead", { content_name: "canal_propio_page", value: 0, currency: "MXN" }, { eventID: data.eventId });
      } else if (typeof fbq === "function") {
        fbq("track", "Lead", { content_name: "canal_propio_page", value: 0, currency: "MXN" });
      }
      gadsConvert("lead");
      setStep("resultado");
    } catch {
      setError("No pudimos enviar tu información. Intenta de nuevo.");
    } finally {
      setSubmitting(false);
    }
  };

  // ── Render: Paso 1 — restaurant picker ──
  const renderPaso1 = () => (
    <div className="dx-card">
      <div className="dx-progress-label">Paso 1 de 3 — Tu restaurante</div>
      <Progress step={1} />
      <div className="dx-field">
        <label>Busca tu restaurante</label>
        <div className="dx-ac">
          <input type="text" className="dx-ac-input" placeholder="Ej. Brooklyn Burgers"
            value={companyName}
            onChange={(e) => onSearchChange(e.target.value)}
            onKeyDown={onSearchKeyDown}
            onBlur={() => {
              if (blurTimerRef.current) clearTimeout(blurTimerRef.current);
              blurTimerRef.current = setTimeout(() => setSuggestions([]), 150);
            }}
            autoComplete="off" role="combobox" aria-expanded={suggestions.length > 0}
            aria-autocomplete="list" />
          {suggestions.length > 0 && (
            <ul className="dx-ac-list" role="listbox">
              {suggestions.map((pred, i) => {
                const main = (pred.mainText && pred.mainText.text) || (pred.text && pred.text.text) || "";
                const secondary = (pred.secondaryText && pred.secondaryText.text) || "";
                return (
                  <li key={pred.placeId || i} role="option" aria-selected={i === sugActive}
                    className={"dx-ac-item" + (i === sugActive ? " active" : "")}
                    onMouseDown={(e) => { e.preventDefault(); selectSuggestion(pred); }}
                    onMouseEnter={() => setSugActive(i)}>
                    <span className="dx-ac-main">{main}</span>
                    {secondary && <span className="dx-ac-sec">{secondary}</span>}
                  </li>
                );
              })}
            </ul>
          )}
        </div>
        {placeId && (
          <div className="dx-place-ok">
            <span className="dot" />
            <span>{placeAddress}</span>
          </div>
        )}
      </div>
      {pickerError && <div className="dx-error">{pickerError}</div>}
      <button className="dx-btn" onClick={goToBant}>Continuar →</button>
      <p style={{ fontSize: 12.5, color: "var(--diag-muted)", textAlign: "center", marginTop: 12 }}>
        Sin compromiso · 2 minutos · te mostramos tu propia cuenta
      </p>
    </div>
  );

  // ── Render: Paso 2 — BANT ──
  const renderPaso2 = () => (
    <div className="dx-card">
      <button className="dx-back" onClick={() => setStep("paso1")}>← Volver</button>
      <div className="dx-progress-label">Paso 2 de 3 — Sobre tu restaurante</div>
      <Progress step={2} />

      <h3 className="dx-q-title">¿Cuántas órdenes en línea recibes al mes?</h3>
      <div className="dx-opt-grid">
        {[["lt200", "Menos de 200"], ["200-400", "200 – 400"], ["400-1000", "400 – 1,000"], ["gt1000", "Más de 1,000"]].map(([v, label]) => (
          <OptionCard key={v} selected={bant.ordenes_mensuales === v} onClick={() => setBantField("ordenes_mensuales", v)}>{label}</OptionCard>
        ))}
      </div>

      <h3 className="dx-q-title" style={{ marginTop: 24 }}>¿Cuánto vendes al mes en pedidos en línea?</h3>
      <div className="dx-opt-grid">
        {[["lt50k", "Menos de $50,000"], ["50k-150k", "$50,000 – $150,000"], ["150k-500k", "$150,000 – $500,000"], ["gt500k", "Más de $500,000"]].map(([v, label]) => (
          <OptionCard key={v} selected={bant.venta_online_mensual === v} onClick={() => setBantField("venta_online_mensual", v)}>{label}</OptionCard>
        ))}
      </div>

      <h3 className="dx-q-title" style={{ marginTop: 24 }}>¿Cuánto pagas de comisiones a las apps al mes?</h3>
      <div className="dx-opt-grid">
        {[["lt15k", "Menos de $15,000"], ["15k-50k", "$15,000 – $50,000"], ["50k-150k", "$50,000 – $150,000"], ["gt150k", "Más de $150,000"], ["unknown", "No lo sé exactamente"]].map(([v, label]) => (
          <OptionCard key={v} selected={bant.comisiones_mensuales === v} onClick={() => setBantField("comisiones_mensuales", v)}>{label}</OptionCard>
        ))}
      </div>

      <h3 className="dx-q-title" style={{ marginTop: 24 }}>¿Cuál es tu rol en el restaurante?</h3>
      <div className="dx-opt-grid">
        {[["dueno", "Dueño / Socio"], ["gerente", "Gerente general u operaciones"], ["marketing", "Marketing"], ["otro", "Otro"]].map(([v, label]) => (
          <OptionCard key={v} selected={bant.plataformas === v} onClick={() => setBantField("plataformas", v)}>{label}</OptionCard>
        ))}
      </div>

      <h3 className="dx-q-title" style={{ marginTop: 24 }}>¿Qué tan rápido quieres dejar de pagar comisiones?</h3>
      <div className="dx-opt-grid">
        {[["ya_semana", "Ya — quiero empezar esta semana"], ["este_mes", "Este mes"], ["explorando", "Más adelante / solo estoy explorando"]].map(([v, label]) => (
          <OptionCard key={v} selected={bant.funnel_timing === v} onClick={() => setBantField("funnel_timing", v)}>{label}</OptionCard>
        ))}
      </div>

      <button className="dx-btn dx-btn--dark" style={{ marginTop: 24 }} disabled={!bantComplete} onClick={goToSavings}>
        Ver cuánto puedo recuperar →
      </button>
    </div>
  );

  // ── Render: Paso 3 — savings + investment + contact ──
  const renderPaso3 = () => (
    <div className="dx-card">
      <button className="dx-back" onClick={() => setStep("paso2")}>← Volver</button>
      <div className="dx-progress-label">Paso 3 de 3 — Tu estimado</div>
      <Progress step={3} />

      <div className="dx-estimate">
        <div className="dx-estimate-label">Podrías recuperar</div>
        <div className="dx-estimate-num">{savings.text}</div>
        <div className="dx-estimate-sub">Con base en el {Math.round(RECOVERY_RATE * 100)}% típico que recuperan nuestros clientes al mover su volumen a un canal propio.</div>
      </div>

      {plan && (
        <div className="dx-plan-box">
          <div className="dx-plan-price">Tu inversión: {plan.label}</div>
          {roiText && <div className="dx-plan-roi">{roiText}</div>}
        </div>
      )}

      {error && <div className="dx-error">{error}</div>}

      {!skipInvestmentQuestion && !inversionReady && (
        <>
          <h3 className="dx-q-title">¿Estás listo para hacer esa inversión si te mostramos cómo?</h3>
          <div className="dx-opt-grid">
            {[["si", "Sí, si veo cómo funciona"], ["ver_numeros", "Necesito ver los números en la demo"], ["no", "No por ahora"]].map(([v, label]) => (
              <OptionCard key={v} selected={inversionReady === v} onClick={() => setInversionReady(v)}>{label}</OptionCard>
            ))}
          </div>
        </>
      )}

      {(skipInvestmentQuestion || inversionReady) && (
        <div style={{ marginTop: skipInvestmentQuestion ? 0 : 20 }}>
          <h3 className="dx-q-title">¿A dónde te enviamos tu plan?</h3>
          <div className="dx-name-row">
            <div className="dx-field"><label>Nombre</label><input type="text" placeholder="Nombre" value={form.first_name} onChange={set("first_name")} data-clarity-mask="true" /></div>
            <div className="dx-field"><label>Apellido</label><input type="text" placeholder="Apellido" value={form.last_name} onChange={set("last_name")} data-clarity-mask="true" /></div>
          </div>
          <div className="dx-field"><label>Email</label><input type="email" placeholder="tu@restaurante.com" value={form.email} onChange={set("email")} data-clarity-mask="true" /></div>
          <div className="dx-field">
            <label>WhatsApp</label>
            <div className="dx-phone-row">
              <select value={form.country_code} onChange={set("country_code")}>
                <option value="+52">+52</option><option value="+57">+57</option>
                <option value="+56">+56</option><option value="+51">+51</option>
                <option value="+54">+54</option><option value="+1">+1</option>
                <option value="+593">+593</option><option value="+502">+502</option>
              </select>
              <input type="tel" inputMode="numeric" maxLength={14} placeholder="55 1234 5678"
                data-clarity-mask="true" value={form.phone} onChange={(e) => {
                  const raw = e.target.value.replace(/[^\d\s\-()]/g, "");
                  if (raw.replace(/\D/g, "").length > maxDigits) return;
                  setForm({ ...form, phone: raw }); setPhoneError("");
                }} onBlur={validatePhone} />
            </div>
            {phoneError && <div className="dx-phone-error">{phoneError}</div>}
          </div>
          <div className="dx-checkbox">
            <input type="checkbox" id="wa-opt" checked={form.whatsapp_optin}
              onChange={(e) => setForm({ ...form, whatsapp_optin: e.target.checked })} />
            <label htmlFor="wa-opt">Acepto recibir mensajes por WhatsApp. Máximo 4/mes.</label>
          </div>
          <button className="dx-btn dx-btn--dark" disabled={!canSubmit || submitting} onClick={handleSubmit}>
            {submitting ? "Enviando..." : "Ver mi plan completo →"}
          </button>
          <div className="dx-legal">Al enviar aceptas nuestra política de privacidad.</div>
        </div>
      )}
    </div>
  );

  // ── Render: post-submit routing by backend BANT lane ──
  const renderResultado = () => {
    // Backend nests the BANT lane at result.bant.lane (null for non-volume funnels).
    // Fallback: if bant is missing but the gate opened the calendar, treat as 'calendar'.
    const lane = (result && result.bant && result.bant.lane) || (result && result.showCalendar ? "calendar" : null);
    if (lane === "hot" || lane === "calendar") {
      return (
        <div className="dx-card" style={{ textAlign: "center" }}>
          <CalendarBooking
            firstName={form.first_name} lastName={form.last_name}
            email={form.email} phone={form.phone} companyName={companyName}
            assignedAE={result.assignedAE || "Mariana"}
            sessionId={SESSION_ID} placeId={placeId} />
        </div>
      );
    }
    if (lane === "whatsapp") {
      const waUrl = "https://wa.me/" + FLUX_WA + "?text=" + encodeURIComponent(
        "Hola, soy " + (form.first_name || "") + " de " + (companyName || "mi restaurante") + ", quiero recuperar mi comisión con mi propio canal de pedidos."
      );
      return (
        <div className="dx-card" style={{ textAlign: "center" }}>
          <div className="dx-bk-booked-check">✓</div>
          <h3 className="dx-bk-booked-title">Un asesor te escribe hoy mismo</h3>
          <p style={{ color: "#64748b", fontSize: 15, margin: "0 0 20px" }}>
            Revisamos tu caso y te contactamos por WhatsApp en breve.
          </p>
          <a href={waUrl} target="_blank" rel="noopener" className="dx-btn dx-btn--green" style={{ textDecoration: "none", display: "flex", justifyContent: "center" }}
            onClick={() => fireEvent("ae_whatsapp_chosen", { place_id: placeId })}>
            💬 Escríbenos por WhatsApp ahora
          </a>
        </div>
      );
    }
    // educational (or missing lane) — gracious close + guide link
    return (
      <div className="dx-card" style={{ textAlign: "center" }}>
        <div className="dx-bk-booked-check">✓</div>
        <h3 className="dx-bk-booked-title">¡Gracias, {form.first_name}!</h3>
        <p style={{ color: "#64748b", fontSize: 15, margin: "0 0 20px" }}>
          Te enviamos tu estimado por correo. Cuando estés listo para dar el siguiente paso, aquí tienes por dónde empezar.
        </p>
        <a href="/guias/comisiones" className="dx-btn" style={{ textDecoration: "none" }}>
          Empieza por aquí: la guía para recuperar tus comisiones →
        </a>
      </div>
    );
  };

  return (
    <div className="dx-page">
      <nav className="dx-nav">
        <a href="/" className="dx-logo">
          <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg"><g fill="currentColor"><rect x="54" y="40" width="50" height="172" rx="6"/><rect x="54" y="40" width="150" height="46" rx="6"/><rect x="54" y="108" width="98" height="38" rx="6"/><path d="M 148 94 Q 152 92 158 96 L 198 124 Q 202 128 198 132 L 158 160 Q 152 164 148 162 L 148 94 Z"/></g></svg>
          Fluxsales
        </a>
      </nav>
      <div className="dx-main">
        <div className={"dx-container" + (step === "paso1" ? " dx-container--wide" : "")}>
          {step === "paso1" && (
            <div className="dx-hero-layout">
              <div className="dx-hero">
                <span className="dx-hero-badge">Calculadora gratuita</span>
                <h1>¿Tu restaurante hace más de 400 órdenes en línea al mes?</h1>
                <p>Deja de regalarle el 40% de cada pedido a las apps. Brooklyn Burgers recuperó más de $245,000 al mes — te enseñamos tu propia cuenta en 2 minutos.</p>
                <p className="dx-hero-note">Gratis · 2 minutos · sin tarjeta</p>
              </div>
              <div className="dx-trust-bar">
                <span className="dx-trust-item"><strong>+1,400</strong> restaurantes</span>
                <span className="dx-trust-item"><strong>70%</strong> de comisión recuperada</span>
                <span className="dx-trust-item"><strong>48h</strong> para estar operando</span>
              </div>
              <div className="dx-hero-right">{renderPaso1()}</div>
            </div>
          )}
          {step === "paso1" && (
            <section className="dx-proof">
              <div className="dx-proof-card">
                <div className="dx-proof-eyebrow">Caso de éxito</div>
                <h2 className="dx-proof-title">Brooklyn Burgers recuperó más de $245,000 MXN al mes con solo 4 sucursales</h2>
                <p className="dx-proof-quote">
                  La misma hamburguesa cuesta $130 en su canal propio vs $209 en las apps de delivery. Hoy mueven entre 100 y 120 pedidos al día por su canal propio, contra 15–20 que recibían por las apps — y en menos de 3 meses. Hoy tienen 10 sucursales.
                </p>
                <div className="dx-proof-metrics">
                  <div className="dx-proof-metric">
                    <div className="dx-proof-metric-num">$245,000+/mes</div>
                    <div className="dx-proof-metric-label">recuperados con solo 4 sucursales, en menos de 3 meses</div>
                  </div>
                  <div className="dx-proof-metric">
                    <div className="dx-proof-metric-num">$130 vs $209</div>
                    <div className="dx-proof-metric-label">misma hamburguesa: canal propio vs apps</div>
                  </div>
                  <div className="dx-proof-metric">
                    <div className="dx-proof-metric-num">100–120 vs 15–20</div>
                    <div className="dx-proof-metric-label">pedidos/día por canal propio vs por apps</div>
                  </div>
                  <div className="dx-proof-metric">
                    <div className="dx-proof-metric-num">10 sucursales</div>
                    <div className="dx-proof-metric-label">hoy — el canal propio impulsó la expansión</div>
                  </div>
                </div>
                <a href="/casos/brooklyn-burgers" className="dx-proof-link">Ver el caso completo de Brooklyn Burgers →</a>
              </div>
            </section>
          )}
          {step === "paso2" && renderPaso2()}
          {step === "paso3" && renderPaso3()}
          {step === "resultado" && renderResultado()}
        </div>
      </div>
      <div className="dx-footer">
        <a href="/privacy">Privacidad</a> · <a href="/terms">Términos</a> · © 2026 Fluxsales
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CanalPropioApp />);
</script>
</body>
</html>
