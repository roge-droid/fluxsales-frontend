<style>
:root {
  --diag-navy: #1a2332;
  --diag-blue: #2563eb;
  --diag-blue-hover: #1d4ed8;
  --diag-green: #10b981;
  --diag-yellow: #f59e0b;
  --diag-red: #ef4444;
  --diag-bg: #f8fafc;
  --diag-card: #ffffff;
  --diag-border: #e2e8f0;
  --diag-muted: #64748b;
  --diag-subtle: #64748b;
  --diag-rule: #f1f5f9;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "Inter", -apple-system, system-ui, sans-serif;
  background: var(--diag-bg); color: var(--diag-navy);
  -webkit-font-smoothing: antialiased; font-size: 15px; line-height: 1.5;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

.dx-page { min-height: 100vh; display: flex; flex-direction: column; }
.dx-nav {
  display: flex; align-items: center; justify-content: center;
  height: 56px; border-bottom: 1px solid var(--diag-border);
  background: var(--diag-card);
}
.dx-logo {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: "DM Sans", sans-serif; font-weight: 700; font-size: 20px;
  color: var(--diag-navy); text-decoration: none;
}
.dx-logo svg { width: 24px; height: 24px; }
.dx-main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 32px 16px;
}
.dx-container { width: 100%; max-width: 440px; }
.dx-container--wide { max-width: 440px; }

@media (min-width: 768px) {
  .dx-container--wide { max-width: 600px; }
  .dx-hero h1 { font-size: 32px; }
}

@media (min-width: 1000px) {
  .dx-main { align-items: flex-start; padding: 56px 24px; }
  .dx-container--wide { max-width: 1080px; }
  .dx-hero-layout {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    grid-template-areas:
      "hero  card"
      "trust card";
    column-gap: 48px;
    row-gap: 18px;
    align-items: start;
  }
  .dx-hero-layout .dx-hero { grid-area: hero; text-align: left; margin-bottom: 4px; }
  .dx-hero-layout .dx-hero h1 { font-size: 38px; }
  .dx-hero-layout .dx-hero p { font-size: 17px; }
  .dx-hero-layout .dx-hero-right { grid-area: card; align-self: start; position: sticky; top: 56px; }
  .dx-hero-layout .dx-trust-bar { grid-area: trust; justify-content: flex-start; margin: 0; }
}

.dx-hero { text-align: center; margin-bottom: 24px; }
.dx-hero h1 {
  font-family: "DM Sans", sans-serif; font-weight: 700;
  font-size: 27px; line-height: 1.15; margin: 0 0 10px; color: var(--diag-navy);
}
.dx-hero p {
  font-size: 15px; color: var(--diag-subtle); margin: 0; line-height: 1.55;
}
.dx-hero-badge {
  display: inline-block; font-size: 12px; font-weight: 600;
  color: var(--diag-blue); background: #eff6ff; border: 1px solid #dbeafe;
  border-radius: 20px; padding: 4px 12px; margin: 0 0 12px;
}
.dx-hero-note {
  font-size: 13px; color: var(--diag-muted); margin-top: 10px !important;
  font-weight: 500;
}

.dx-card {
  background: var(--diag-card); border: 1px solid var(--diag-border);
  border-radius: 16px; padding: 28px 24px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 8px 24px -8px rgba(0,0,0,.08);
}

/* Progress indicator */
.dx-progress { display: flex; align-items: center; gap: 6px; margin-bottom: 22px; }
.dx-progress-step {
  flex: 1; height: 4px; border-radius: 4px; background: var(--diag-border);
  transition: background .25s;
}
.dx-progress-step.done, .dx-progress-step.on { background: var(--diag-blue); }
.dx-progress-label {
  font-size: 12px; font-weight: 600; color: var(--diag-muted);
  text-transform: uppercase; letter-spacing: .04em; margin: 0 0 10px;
}

.dx-field { margin-bottom: 20px; }
.dx-field label {
  display: block; font-size: 13px; font-weight: 500;
  color: var(--diag-subtle); margin-bottom: 6px;
}
.dx-field input, .dx-field select {
  width: 100%; padding: 12px 14px; font-size: 15px;
  border: 1px solid var(--diag-border); border-radius: 10px;
  background: var(--diag-bg); color: var(--diag-navy);
  font-family: inherit; outline: none; transition: border-color .2s;
}
.dx-field input:focus, .dx-field select:focus { border-color: var(--diag-blue); }
.dx-field input::placeholder { color: var(--diag-muted); }

.dx-ac { width: 100%; position: relative; }
.dx-ac-input {
  width: 100%; padding: 12px 14px; font-size: 15px; box-sizing: border-box;
  border: 1px solid var(--diag-border); border-radius: 10px;
  background: var(--diag-bg); color: var(--diag-navy);
  font-family: inherit; outline: none; transition: border-color .2s;
}
.dx-ac-input:focus { border-color: var(--diag-blue); }
.dx-ac-list {
  list-style: none; margin: 6px 0 0; padding: 4px;
  position: absolute; left: 0; right: 0; top: 100%; z-index: 30;
  background: #fff; border: 1px solid var(--diag-border); border-radius: 10px;
  box-shadow: 0 8px 24px rgba(15, 23, 42, .12);
  max-height: 280px; overflow-y: auto;
}
.dx-ac-item {
  display: flex; flex-direction: column; gap: 2px;
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
}
.dx-ac-item.active, .dx-ac-item:hover { background: #f1f5f9; }
.dx-ac-main { font-size: 14px; color: var(--diag-navy); font-weight: 500; }
.dx-ac-sec { font-size: 12px; color: var(--diag-muted); }
.dx-place-ok {
  display: flex; align-items: center; gap: 6px;
  margin-top: 6px; padding: 6px 10px;
  background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px;
  font-size: 12px; color: #166534;
}
.dx-place-ok .dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--diag-green); flex-shrink: 0;
}

.dx-btn {
  width: 100%; padding: 14px; font-size: 15px; font-weight: 600;
  background: var(--diag-blue); color: #fff;
  border: none; border-radius: 12px; cursor: pointer;
  font-family: "DM Sans", sans-serif; transition: .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  min-height: 48px;
}
.dx-btn:hover { background: var(--diag-blue-hover); transform: translateY(-1px); }
.dx-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.dx-btn--green { background: #25d366; }
.dx-btn--green:hover { background: #20bd5a; }
.dx-btn--dark { background: var(--diag-navy); }
.dx-btn--dark:hover { background: #0f172a; }
.dx-btn--ghost {
  background: transparent; color: var(--diag-blue);
  font-size: 13px; font-weight: 500; padding: 10px;
}
.dx-btn--ghost:hover { background: transparent; text-decoration: underline; transform: none; }

.dx-error {
  background: #fef2f2; border: 1px solid #fecaca;
  border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
  font-size: 13px; color: #991b1b;
}
.dx-back {
  font-size: 13px; color: var(--diag-blue); cursor: pointer;
  background: none; border: none; margin-bottom: 12px; padding: 0;
}
.dx-back:hover { text-decoration: underline; }

/* BANT option cards — big tappable answers */
.dx-opt-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 8px; }
.dx-opt {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  width: 100%; text-align: left;
  background: var(--diag-bg); border: 1.5px solid var(--diag-border);
  border-radius: 12px; padding: 16px 18px;
  font-size: 15px; font-weight: 500; color: var(--diag-navy);
  transition: border-color .15s, background .15s;
  min-height: 52px;
}
.dx-opt:hover { border-color: #93c5fd; background: #f8fbff; }
.dx-opt.on { border-color: var(--diag-blue); background: #eff6ff; font-weight: 600; }
.dx-opt-check {
  width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--diag-border); background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #fff;
}
.dx-opt.on .dx-opt-check { background: var(--diag-blue); border-color: var(--diag-blue); }
.dx-q-title {
  font-family: "DM Sans", sans-serif; font-weight: 700; font-size: 18px;
  color: var(--diag-navy); margin: 0 0 14px; line-height: 1.3;
}

/* Step 3 — savings estimate */
.dx-estimate {
  text-align: center; background: #f0fdf4; border: 1px solid #bbf7d0;
  border-radius: 14px; padding: 20px 18px; margin-bottom: 20px;
}
.dx-estimate-label { font-size: 12px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: #166534; margin: 0 0 6px; }
.dx-estimate-num {
  font-family: "DM Sans", sans-serif; font-weight: 700; font-size: 26px;
  color: #166534; line-height: 1.2; margin: 0 0 4px;
}
.dx-estimate-sub { font-size: 13px; color: #166534; margin: 0; line-height: 1.5; }
.dx-plan-box {
  border: 1px solid var(--diag-border); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px;
  background: var(--diag-bg);
}
.dx-plan-price { font-family: "DM Sans", sans-serif; font-weight: 700; font-size: 18px; color: var(--diag-navy); }
.dx-plan-roi { font-size: 13px; color: var(--diag-green); font-weight: 600; margin-top: 4px; }

.dx-name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.dx-phone-row {
  display: flex; gap: 0; border: 1px solid var(--diag-border); border-radius: 10px;
  overflow: hidden; background: var(--diag-bg); transition: border-color .2s;
}
.dx-phone-row:focus-within { border-color: var(--diag-blue); }
.dx-phone-row > select {
  flex: 0 0 74px; padding: 12px 6px 12px 10px; font-size: 14px;
  border: none; border-right: 1px solid var(--diag-border); border-radius: 0;
  background: #f1f5f9; color: var(--diag-navy); outline: none;
}
.dx-phone-row > input {
  flex: 1; min-width: 0; padding: 12px 14px; font-size: 15px;
  border: none; border-radius: 0; background: transparent;
  color: var(--diag-navy); outline: none;
}
.dx-phone-error { font-size: 12px; color: var(--diag-red); margin-top: 4px; }
.dx-checkbox { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; }
.dx-checkbox input[type=checkbox] {
  width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0;
  accent-color: var(--diag-blue);
}
.dx-checkbox label { font-size: 13px; color: var(--diag-subtle); line-height: 1.45; cursor: pointer; }
.dx-legal {
  font-size: 12px; color: var(--diag-muted); text-align: center;
  margin-top: 14px; line-height: 1.5;
}

/* Calendar (shared) */
.dx-bk-header { text-align: center; margin-bottom: 20px; }
.dx-bk-title { font-family: "DM Sans", sans-serif; font-size: 20px; font-weight: 700; margin: 0 0 4px; }
.dx-bk-sub { font-size: 14px; color: var(--diag-muted); margin: 0; }
.dx-bk-dates {
  display: flex; gap: 2px; overflow-x: auto; padding: 4px 0 14px;
  scrollbar-width: none; border-bottom: 1px solid var(--diag-border); margin-bottom: 14px;
}
.dx-bk-dates::-webkit-scrollbar { display: none; }
.dx-bk-date {
  flex: 0 0 auto; padding: 10px 8px; min-width: 50px; min-height: 48px;
  border-radius: 10px; text-align: center; transition: .15s;
}
.dx-bk-date:hover { background: var(--diag-rule); }
.dx-bk-date.on { background: var(--diag-blue); box-shadow: 0 2px 8px rgba(37,99,235,.25); }
.dx-bk-day { display: block; font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--diag-muted); }
.dx-bk-date.on .dx-bk-day { color: rgba(255,255,255,.7); }
.dx-bk-num { display: block; font-size: 18px; font-weight: 600; color: var(--diag-navy); margin-top: 2px; }
.dx-bk-date.on .dx-bk-num { color: #fff; }
.dx-bk-slots { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.dx-bk-slot {
  width: 100%; padding: 13px; border-radius: 10px;
  border: 1px solid var(--diag-blue); background: transparent;
  color: var(--diag-blue); font-size: 15px; font-weight: 500;
  text-align: center; transition: .15s;
}
.dx-bk-slot:hover { background: #eff6ff; }
.dx-bk-slot.on { background: var(--diag-blue); color: #fff; border-color: var(--diag-blue); }
.dx-bk-empty { text-align: center; padding: 20px 0; color: var(--diag-muted); font-size: 14px; }
.dx-bk-booked-check {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--diag-green); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin: 0 auto 14px;
}
.dx-bk-booked-title {
  font-family: "DM Sans", sans-serif; font-size: 22px; font-weight: 700;
  margin: 0 0 8px; text-align: center;
}
.dx-bk-links { font-size: 12px; color: var(--diag-muted); text-align: center; margin-top: 12px; }
.dx-bk-links a { color: var(--diag-blue); text-decoration: underline; }

.dx-footer {
  text-align: center; padding: 16px;
  font-size: 12px; color: var(--diag-muted);
}
.dx-footer a { color: var(--diag-blue); text-decoration: underline; }

/* Trust bar */
.dx-trust-bar {
  display: flex; justify-content: center; gap: 24px;
  margin: -8px 0 20px; padding: 0;
  flex-wrap: wrap;
}
.dx-trust-item {
  font-size: 13px; color: var(--diag-subtle);
  font-weight: 500; white-space: nowrap;
}
.dx-trust-item strong {
  color: var(--diag-navy); font-weight: 700;
}

/* ── VSL variant additions ─────────────────────────────────────────────── */
/* Hero video — vertical 9:16, phone-like frame, centered. */
.dx-vsl-wrap {
  position: relative; width: 100%; max-width: 340px; margin: 22px auto 0;
  border-radius: 20px; overflow: hidden; background: #0f172a;
  box-shadow: 0 4px 12px rgba(15,23,42,.18), 0 24px 48px -16px rgba(15,23,42,.28);
  aspect-ratio: 9 / 16;
}
.dx-vsl-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; }
.dx-vsl-overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  background: rgba(15,23,42,.35); cursor: pointer; border: none; width: 100%;
  transition: background .2s;
}
.dx-vsl-overlay:hover { background: rgba(15,23,42,.45); }
.dx-vsl-overlay-icon {
  width: 64px; height: 64px; border-radius: 50%;
  background: #fff; color: var(--diag-navy);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; box-shadow: 0 8px 24px rgba(0,0,0,.3);
}
.dx-vsl-overlay-label {
  font-family: "DM Sans", sans-serif; font-weight: 700; font-size: 14px;
  color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.4);
  background: rgba(15,23,42,.55); padding: 6px 14px; border-radius: 16px;
}
.dx-vsl-cta { max-width: 340px; margin: 18px auto 0; }

/* Dark hero band — full-bleed navy like the reference (headline + VSL + CTA live on
   dark; everything below is light). Negative margins cancel .dx-main's padding. */
.dx-hero-band {
  margin: -32px calc(50% - 50vw) 0;
  background: var(--diag-navy);
  padding: 44px 20px 40px;
}
@media (min-width: 1000px) { .dx-hero-band { margin-top: -56px; padding: 60px 24px 52px; } }
.dx-vsl-hero { text-align: center; margin-bottom: 8px; }
.dx-vsl-hero h1 {
  font-family: "DM Sans", sans-serif; font-weight: 700;
  font-size: 27px; line-height: 1.15; margin: 0 0 10px; color: #fff;
}
.dx-vsl-hero .dx-sub { font-size: 15px; color: rgba(255,255,255,.72); margin: 0; line-height: 1.55; }
.dx-hero-band .dx-hero-badge { background: rgba(37,99,235,.18); border-color: rgba(147,197,253,.35); color: #93c5fd; }
.dx-hero-band .dx-trust-bar { margin-top: 22px; }
.dx-hero-band .dx-trust-item { color: rgba(255,255,255,.6); }

// ─── Savings calculator (client-side) ─────────────────────────────────────────
const RECOVERY_RATE = 0.70;
const COMMISSION_BRACKETS = {
  lt15k:    { min: 0,      max: 15000  },
  "15k-50k":  { min: 15000,  max: 50000  },
  "50k-150k": { min: 50000,  max: 150000 },
  gt150k:   { min: 150000, max: null   },
};
const VENTA_MIDPOINT = { lt50k: 30000, "50k-150k": 100000, "150k-500k": 325000, gt500k: 650000 };

function fmtMXN(n) {
  return "$" + Math.round(n).toLocaleString("es-MX");
}

// Returns { bracketKey, min, max, estimated } — estimated=true when derived from
// venta_online_mensual because the lead didn't know their commission spend.
function resolveCommissionBracket(comisiones, ventaOnline) {
  if (comisiones && comisiones !== "unknown") {
    return { bracketKey: comisiones, ...COMMISSION_BRACKETS[comisiones], estimated: false };
  }
  const ventaMid = VENTA_MIDPOINT[ventaOnline] || VENTA_MIDPOINT["50k-150k"];
  const estComisiones = ventaMid * 0.30;
  let bracketKey = "50k-150k";
  if (estComisiones < 15000) bracketKey = "lt15k";
  else if (estComisiones < 50000) bracketKey = "15k-50k";
  else if (estComisiones < 150000) bracketKey = "50k-150k";
  else bracketKey = "gt150k";
  return { bracketKey, ...COMMISSION_BRACKETS[bracketKey], estimated: true };
}

function computeSavings(comisiones, ventaOnline) {
  const b = resolveCommissionBracket(comisiones, ventaOnline);
  const recoveryMin = b.min * RECOVERY_RATE;
  const recoveryMax = b.max != null ? b.max * RECOVERY_RATE : null;
  let text;
  if (b.bracketKey === "lt15k") text = "hasta ~" + fmtMXN(15000 * RECOVERY_RATE) + "/mes";
  else if (b.bracketKey === "15k-50k") text = "entre ~" + fmtMXN(15000 * RECOVERY_RATE) + " y ~" + fmtMXN(50000 * RECOVERY_RATE) + "/mes";
  else if (b.bracketKey === "50k-150k") text = "entre ~" + fmtMXN(50000 * RECOVERY_RATE) + " y ~" + fmtMXN(150000 * RECOVERY_RATE) + "/mes";
  else text = "más de ~" + fmtMXN(150000 * RECOVERY_RATE) + "/mes";
  if (b.estimated) text += " (estimado con el 30% típico de comisión)";
  return { ...b, recoveryMin, recoveryMax, text };
}

// then concede down from the anchor in the demo; the page never contradicts them.
function resolvePlan(bracketKey) {
  if (bracketKey === "lt15k") return null; // educational lane — skip the investment question
  return { price: 7499, label: "$7,499/mes" }; // 15k-50k, 50k-150k, gt150k
}

}

function CalendarBooking({ firstName, lastName, email, phone, companyName, assignedAE, onBooked, sessionId, placeId }) {
  const [loading, setLoading] = React.useState(true);
  const [dates, setDates] = React.useState([]);
  const [selectedDate, setSelectedDate] = React.useState(0);
  const [selectedSlot, setSelectedSlot] = React.useState(null);
  const [booking, setBooking] = React.useState(false);
  const [booked, setBooked] = React.useState(null);
  const [error, setError] = React.useState(null);

  const waExpertUrl = "https://wa.me/" + FLUX_WA + "?text=" + encodeURIComponent(
    "Hola, soy " + (firstName || "") + " de " + (companyName || "mi restaurante") + ", quiero hablar con un asesor sobre mi propio canal de pedidos."
  );

  React.useEffect(() => {
    fireEvent("calendar_shown", { place_id: placeId });
    if (MOCK) {
      // Fake next-5-weekday slots so the whole booking UI is clickable locally.
      const days = [];
      const d = new Date();
      const DAY_NAMES = ["dom", "lun", "mar", "mié", "jue", "vie", "sáb"];
      while (days.length < 5) {
        d.setDate(d.getDate() + 1);
        if (d.getDay() === 0 || d.getDay() === 6) continue;
        days.push({
          dateLabel: DAY_NAMES[d.getDay()] + " " + d.getDate(),
          slots: ["10:00 am", "11:30 am", "1:00 pm", "4:00 pm"].map((t) => ({ timeLabel: t, start: d.toISOString(), end: d.toISOString() })),
        });
      }
      setDates(days);
      setLoading(false);
      return;
    }
    fetch(API_BASE + "/calendar/available-slots?ae=" + encodeURIComponent(assignedAE) + "&days=14")
      .then(r => r.json())
      .then(data => {
        if (data.ok && data.dates?.length) setDates(data.dates);
        else setError("fallback");
      })
      .catch(() => setError("fallback"))
      .finally(() => setLoading(false));
  }, [assignedAE]);

  const handleBook = async () => {
    if (!selectedSlot) return;
    if (MOCK) {
      setBooked({ startFormatted: "(demo de prueba — nada se agendó)", meetLink: null });
      return;
    }
    setBooking(true); setError(null);
    try {
      const res = await fetch(API_BASE + "/calendar/book-demo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          ae: assignedAE, start: selectedSlot.start, end: selectedSlot.end,
          first_name: firstName, last_name: lastName, email, phone, company_name: companyName,
          session_id: sessionId, source: "canal_propio_vsl", place_id: placeId || undefined,
          ...UTM_FIELDS,
        }),
      });
      const result = await res.json();
      if (!res.ok) { setError(result.error || "No pudimos agendar tu demo."); return; }
      setBooked(result);
      fireEvent("demo_booked", { place_id: placeId });
      if (onBooked) onBooked();
      if (typeof fbq === "function" && result.eventId) {
        fbq("track", "Schedule", { content_name: "canal_propio_vsl_booking", value: 0, currency: "MXN" }, { eventID: "schedule_" + result.eventId });
      }
    } catch { setError("No pudimos agendar. Intenta de nuevo."); }
    finally { setBooking(false); }
  };

  if (booked) {
    return (
      <div style={{ textAlign: "center" }}>
        <div className="dx-bk-booked-check">✓</div>
        <h3 className="dx-bk-booked-title">Demo agendada, {firstName}</h3>
        <p style={{ color: "#64748b", fontSize: 15, margin: "0 0 16px" }}>{booked.startFormatted}</p>
        {booked.meetLink && <a href={booked.meetLink} target="_blank" rel="noopener" className="dx-btn" style={{ marginBottom: 8 }}>Abrir Google Meet →</a>}
        <p style={{ fontSize: 13, color: "#94a3b8", marginTop: 14 }}>Te enviamos confirmación a <strong>{email}</strong></p>
      </div>
    );
  }

  if (error === "fallback") {
    return (
      <div style={{ textAlign: "center" }}>
        <p style={{ fontSize: 16, color: "#2563eb", fontWeight: 600, margin: "0 0 16px" }}>Un asesor te escribe hoy mismo.</p>
        <a href={waExpertUrl} target="_blank" rel="noopener" className="dx-btn dx-btn--green" style={{ display: "flex", textDecoration: "none", justifyContent: "center" }}
          onClick={() => fireEvent("ae_whatsapp_chosen", { place_id: placeId })}>💬 Habla con un experto por WhatsApp</a>
      </div>
    );
  }

  if (loading) return <p style={{ textAlign: "center", color: "#2563eb", fontWeight: 500 }}>Cargando horarios...</p>;

  const currentDate = dates[selectedDate];
  const parseLabel = (l) => { const p = l.split(" "); return { day: p[0], num: p[1] }; };

  return (
    <>
      <div className="dx-bk-header">
        <div className="dx-bk-title">Agenda tu demo</div>
        <div className="dx-bk-sub">30 min por Google Meet — te mostramos tu propia cuenta</div>
      </div>
      {error && error !== "fallback" && <div className="dx-error">{error}</div>}
      <div className="dx-bk-dates">
        {dates.map((d, i) => {
          const p = parseLabel(d.dateLabel);
          return (
            <button key={i} onClick={() => { setSelectedDate(i); setSelectedSlot(null); setError(null); }}
              className={"dx-bk-date" + (i === selectedDate ? " on" : "")}>
              <span className="dx-bk-day">{p.day}</span>
              <span className="dx-bk-num">{p.num}</span>
            </button>
          );
        })}
      </div>
      {currentDate && (
        <div className="dx-bk-slots">
          {currentDate.slots.length ? currentDate.slots.map((s, i) => (
            <button key={i} onClick={() => { setSelectedSlot(s); setError(null); }}
              className={"dx-bk-slot" + (selectedSlot === s ? " on" : "")}>
              {s.timeLabel}
            </button>
          )) : <div className="dx-bk-empty">No hay horarios este día.</div>}
        </div>
      )}
      <div style={{ marginTop: 16 }}>
        <button className="dx-btn dx-btn--dark" disabled={!selectedSlot || booking} onClick={handleBook}>
          {booking ? "Agendando..." : selectedSlot ? "Agendar " + selectedSlot.timeLabel + " →" : "Selecciona un horario"}
        </button>
      </div>

// Hero VSL: autoplays muted (Meta traffic = mobile, sound off), one tap restarts
// WITH sound. No native controls / no scrub bar (VSL convention — Vidalytics-style);
// after unmuting, tapping the video toggles play/pause. When it ends, the overlay
// returns as the CTA into the form.
function VslPlayer({ onCta }) {
  const videoRef = React.useRef(null);
  const [unmuted, setUnmuted] = React.useState(false);
  const [ended, setEnded] = React.useState(false);

  // React doesn't write `muted` as an HTML attribute, which defeats Chrome's
  // muted-autoplay policy check — set it imperatively before kicking playback.
  React.useEffect(() => {
    const v = videoRef.current;
    if (!v) return;
    v.muted = true;
    v.play().catch(() => {}); // autoplay may still be blocked (e.g. Low Power Mode) — poster+overlay stay usable
  }, []);

  const startWithSound = () => {
    const v = videoRef.current;
    if (!v) return;
    v.currentTime = 0; v.muted = false;
    v.play().catch(() => {});
    setUnmuted(true); setEnded(false);
    fireEvent("vsl_unmuted");
  };

  const togglePlay = () => {
    const v = videoRef.current;
    if (!v || !unmuted) return;
    if (v.paused) v.play().catch(() => {}); else v.pause();
  };

  return (
    <div className="dx-vsl-wrap">
      <video ref={videoRef} src={VSL_SRC} poster={VSL_POSTER}
        autoPlay muted loop={false} playsInline preload="metadata"
        onClick={togglePlay}
        onEnded={() => { setEnded(true); fireEvent("vsl_completed"); }} />
      {(!unmuted || ended) && (
        <button type="button" className="dx-vsl-overlay" onClick={ended ? onCta : startWithSound}>
          <span className="dx-vsl-overlay-icon">{ended ? "→" : "🔊"}</span>
          <span className="dx-vsl-overlay-label">{ended ? "Ver si tu restaurante califica" : "Toca para escuchar"}</span>
        </button>
      )}
    </div>
  );
}

function CanalPropioApp() {
  // step: "hero" (paso 1 lives in the hero card) → "bant" (paso 2) → "savings" (paso 3) → "result"
  const [step, setStep] = React.useState("paso1");

  // Paso 1 — restaurant picker
  const [companyName, setCompanyName] = React.useState("");
  const [placeId, setPlaceId] = React.useState("");
  const [placeAddress, setPlaceAddress] = React.useState("");
  const [pickerError, setPickerError] = React.useState(null);

  const placesLibRef = React.useRef(null);
  const sessionTokenRef = React.useRef(null);
  const debounceRef = React.useRef(null);
  const blurTimerRef = React.useRef(null);
  const [suggestions, setSuggestions] = React.useState([]);
  const [sugActive, setSugActive] = React.useState(-1);

  React.useEffect(() => {
    if (placesLibRef.current) return;
    let cancelled = false;
    (async () => {
      try {
        const lib = await google.maps.importLibrary("places");
        if (!cancelled) placesLibRef.current = lib;
      } catch (err) { console.error("[places] importLibrary failed:", err); }
    })();
    return () => { cancelled = true; };
  }, []);

  const runSuggest = (text) => {
    const lib = placesLibRef.current;
    const q = (text || "").trim();
    if (!lib || !lib.AutocompleteSuggestion || q.length < 2) { setSuggestions([]); return; }
    if (!sessionTokenRef.current) sessionTokenRef.current = new lib.AutocompleteSessionToken();
    const base = {
      input: q,
      sessionToken: sessionTokenRef.current,
      includedRegionCodes: ["mx", "co", "cl", "pe"],
      language: "es", region: "mx",
    };
    const apply = ({ suggestions }) => {
      const preds = (suggestions || []).map((s) => s.placePrediction).filter(Boolean).slice(0, 5);
      setSuggestions(preds);
      setSugActive(-1);
    };
    const AS = lib.AutocompleteSuggestion;
    AS.fetchAutocompleteSuggestions({ ...base, includedPrimaryTypes: ["establishment"] })
      .then(apply)
      .catch(() => AS.fetchAutocompleteSuggestions(base).then(apply))
      .catch((err) => { console.error("[places] suggest error:", err); setSuggestions([]); });
  };

  const onSearchChange = (val) => {
    setCompanyName(val);
    if (placeId) { setPlaceId(""); setPlaceAddress(""); }
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => runSuggest(val), 220);
  };

  const selectSuggestion = async (pred) => {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    const fallbackName = (pred.text && pred.text.text) || (pred.mainText && pred.mainText.text) || "";
    try {
      const place = pred.toPlace();
      await place.fetchFields({ fields: ["displayName", "formattedAddress"] });
      const n = place.displayName ? (typeof place.displayName === "object" ? place.displayName.text : String(place.displayName)) : fallbackName;
      const a = place.formattedAddress ? (typeof place.formattedAddress === "object" ? place.formattedAddress.text : String(place.formattedAddress)) : "";
      const pid = place.id || pred.placeId || "";
      setCompanyName(n); setPlaceId(pid); setPlaceAddress(a);
    } catch (err) {
      console.error("[places] fetchFields error:", err);
      if (fallbackName) setCompanyName(fallbackName);
      if (pred.placeId) setPlaceId(pred.placeId);
    }
    sessionTokenRef.current = null;
    setSuggestions([]);
    setSugActive(-1);
  };

  const onSearchKeyDown = (e) => {
    if (!suggestions.length) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setSugActive((i) => Math.min(i + 1, suggestions.length - 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setSugActive((i) => Math.max(i - 1, 0)); }
    else if (e.key === "Enter" && sugActive >= 0) { e.preventDefault(); selectSuggestion(suggestions[sugActive]); }
    else if (e.key === "Escape") { setSuggestions([]); }
  };

  // Paso 2 — BANT (form-minimization 2026-07-20, acquisition.com/workshop pattern:
  // 4 visible questions max. Venta only appears as a drill-down when the lead doesn't
  // know their commission spend (backend derives the bracket from venta × 30%). Rol is
  // no longer asked — the AE verifies authority on the call; backend defaults
  // authorityOk=true when the field is absent (bant.ts, needs backend ≥ that change live).
  const [bant, setBant] = React.useState({
    ordenes_mensuales: "", venta_online_mensual: "", comisiones_mensuales: "",
    funnel_timing: "",
  });

  // value too so a stale answer never rides along in the payload or the estimate.
  const setBantField = (k, v) => setBant((b) => {
    const next = { ...b, [k]: v };
    if (k === "comisiones_mensuales" && v !== "unknown") next.venta_online_mensual = "";
    return next;
  });
  const ventaNeeded = bant.comisiones_mensuales === "unknown";
  const bantComplete = bant.ordenes_mensuales && bant.comisiones_mensuales
    && (!ventaNeeded || bant.venta_online_mensual) && bant.funnel_timing;

  // Paso 3 — savings + investment + contact
  const [inversionReady, setInversionReady] = React.useState("");
  const [form, setForm] = React.useState({
    first_name: "", last_name: "", email: "",
    country_code: "+52", phone: "", whatsapp_optin: true,
  });
  const [phoneError, setPhoneError] = React.useState("");
  const [submitting, setSubmitting] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [result, setResult] = React.useState(null);

  const savings = React.useMemo(
    () => computeSavings(bant.comisiones_mensuales, bant.venta_online_mensual),
    [bant.comisiones_mensuales, bant.venta_online_mensual]

  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const PHONE_LENGTHS = { "+52": 10, "+57": 10, "+56": 9, "+51": 9, "+54": 10, "+1": 10, "+593": 9, "+502": 8 };
  const maxDigits = PHONE_LENGTHS[form.country_code] || 10;
  const digits = form.phone.replace(/\D/g, "");
  const canSubmit = form.first_name.trim() && form.email.trim() && digits.length >= maxDigits;
  const validatePhone = () => {
    const d = form.phone.replace(/\D/g, "");
    if (d.length < maxDigits) { setPhoneError("El número debe tener " + maxDigits + " dígitos"); return false; }
    setPhoneError(""); return true;
  };

  const goToBant = () => {
    const name = companyName.trim();

  const goToSavings = () => {

  const handleSubmit = async () => {
    if (!validatePhone()) return;
    if (MOCK) {
      setResult({ bant: { lane: "hot", flags: [], breakdown: {} }, showCalendar: true, assignedAE: "Roge", aeWhatsapp: FLUX_WA, eventId: "mock" });
      setStep("resultado");
      return;
    }
    setSubmitting(true); setError(null);
    try {
      const fullPhone = form.country_code + form.phone.replace(/\D/g, "");
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          first_name: form.first_name.trim(), last_name: form.last_name.trim(),
          email: form.email.trim(), phone: fullPhone,

          ordenes_mensuales: bant.ordenes_mensuales,
          venta_online_mensual: bant.venta_online_mensual || undefined,
          comisiones_mensuales: bant.comisiones_mensuales,
          funnel_timing: bant.funnel_timing, inversion_ready: inversionReady || undefined,
          whatsapp_optin: form.whatsapp_optin, session_id: SESSION_ID,

      if (!res.ok) throw new Error(String(res.status));
      const data = await res.json();
      setResult(data);

      if (window.datafast && form.email) window.datafast("identify", { user_id: form.email.trim().toLowerCase() });
      if (typeof fbq === "function" && data.eventId) {

      } else if (typeof fbq === "function") {
        fbq("track", "Lead", { content_name: "canal_propio_vsl_page", value: 0, currency: "MXN" });
      }
      gadsConvert("lead");

    } catch {
      setError("No pudimos enviar tu información. Intenta de nuevo.");

      setSubmitting(false);

  };

  // ── Render: Paso 1 — restaurant picker ──
  const renderPaso1 = () => (
    <div className="dx-card">

          {suggestions.length > 0 && (

                return (

          </div>
        )}
      </div>
      {pickerError && <div className="dx-error">{pickerError}</div>}
      <button className="dx-btn" onClick={goToBant}>Continuar →</button>

          <div className="dx-opt-grid">
            {[["si", "Sí, si veo cómo funciona"], ["ver_numeros", "Necesito ver los números en la demo"], ["no", "No por ahora"]].map(([v, label]) => (
              <OptionCard key={v} selected={inversionReady === v} onClick={() => setInversionReady(v)}>{label}</OptionCard>
