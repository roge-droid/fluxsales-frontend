<style>
.demo-page { min-height: 100vh; background: var(--cream); overflow-x: hidden; }

.demo-layout {
  display: grid; grid-template-columns: 1fr 1fr;
  grid-template-rows: auto;
  max-width: var(--max); margin: 0 auto; padding: 0 28px;
  min-height: calc(100vh - 70px); align-items: center; gap: 40px 80px;
}
.demo-hero {
  grid-column: 1; grid-row: 1;
}
.demo-form-col {
  grid-column: 2; grid-row: 1 / 3;
}
.demo-covers {
  grid-column: 1; grid-row: 2;
  align-self: start;
}

.demo-hero { padding: 60px 0 0; }
.demo-hero h1 {
  font-family: var(--serif); font-variation-settings: "opsz" 144, "SOFT" 30;
  font-size: clamp(36px, 4vw, 56px); line-height: 1.02;
  letter-spacing: -0.028em; color: var(--ink-soft); font-weight: 400;
  margin: 0 0 20px;
}
.demo-hero h1 em {
  font-style: italic; color: var(--green-ink);
  font-variation-settings: "opsz" 144, "SOFT" 80;
}
.demo-hero .lead {
  font-size: 17px; color: var(--ink-muted); line-height: 1.55;
  max-width: 48ch; margin: 0 0 36px;
}
.demo-hero .trust {
  font-family: var(--mono); font-size: 12px; letter-spacing: .06em;
  color: var(--ink-muted); margin-bottom: 32px;
}
.demo-hero .trust b { color: var(--ink); }
.demo-covers { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.demo-cover {
  padding: 18px; border-radius: var(--radius);
  border: 1px solid var(--rule); background: var(--card);
}
.demo-cover .icon {
  font-size: 18px; margin-bottom: 8px; display: block;
}
.demo-cover h4 {
  font-family: var(--serif); font-size: 16px; margin: 0 0 4px;
  font-variation-settings: "opsz" 144; letter-spacing: -0.01em;
}
.demo-cover p {
  font-size: 13px; color: var(--ink-muted); margin: 0; line-height: 1.45;
}

.demo-card {
  background: var(--card); border: 1px solid var(--rule);
  border-radius: var(--radius-lg); padding: 40px;
  box-shadow: var(--shadow);
  box-sizing: border-box; max-width: 100%; overflow: hidden;
}
.demo-step {
  font-family: var(--mono); font-size: 11px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--ink-muted); margin-bottom: 8px;
}
.demo-card h2 {
  font-family: var(--serif); font-size: 26px; font-weight: 400;
  font-variation-settings: "opsz" 144, "SOFT" 30;
  letter-spacing: -0.015em; margin: 0 0 28px; color: var(--ink);
}
.demo-field { margin-bottom: 22px; }
.demo-field:last-of-type { margin-bottom: 28px; }
.demo-field label {
  display: block; font-size: 14px; color: var(--ink-soft); margin-bottom: 8px;
}
.demo-field input, .demo-field select {
  width: 100%; padding: 14px 16px; font-size: 15px;
  border: 1px solid var(--rule); border-radius: 10px;
  background: var(--cream); color: var(--ink);
  font-family: var(--sans); outline: none;
  transition: border-color .2s;
}
.demo-field input:focus, .demo-field select:focus {
  border-color: var(--green);
}
.demo-field input::placeholder { color: var(--ink-muted); }
.demo-submit {
  width: 100%; padding: 16px; font-size: 15px; font-weight: 500;
  background: var(--ink); color: var(--cream);
  border: none; border-radius: 999px; cursor: pointer;
  font-family: var(--sans); transition: .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.demo-submit:hover { background: var(--green-ink); transform: translateY(-1px); }
.demo-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.demo-legal {
  font-size: 12px; color: var(--ink-muted); text-align: center;
  margin-top: 16px; line-height: 1.5;
}
.demo-success {
  text-align: center; padding: 40px 20px;
  box-sizing: border-box; max-width: 100%;
}
.demo-success .check {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--green); color: #0d2c20;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 20px;
}
.demo-success h2 {
  font-family: var(--serif); font-size: 28px; margin: 0 0 12px;
  font-variation-settings: "opsz" 144, "SOFT" 40;
}
.demo-success p { color: var(--ink-muted); font-size: 15px; margin: 0; }
.demo-error {
  background: rgba(196,90,42,.08); border: 1px solid rgba(196,90,42,.3);
  border-radius: 8px; padding: 12px 16px; margin-bottom: 16px;
  font-size: 13px; color: #c45a2a;
}
.demo-back {
  font-size: 13px; color: var(--green-ink); cursor: pointer;
  background: none; border: none; font-family: var(--sans);
  margin-bottom: 16px; padding: 0;
}
.demo-back:hover { text-decoration: underline; }

.demo-name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.demo-checkbox { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 22px; }
.demo-checkbox input[type=checkbox] {
  width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0;
  accent-color: var(--green-ink);
}
.demo-checkbox label {
  font-size: 13px; color: var(--ink-muted); line-height: 1.45; cursor: pointer;
}
.demo-testimonial {
  margin-top: 28px; padding: 24px 28px;
  background: var(--card); border: 1px solid var(--rule);
  border-radius: var(--radius); text-align: center;
  box-sizing: border-box; max-width: 100%; overflow: hidden;
}
.demo-testimonial blockquote {
  font-family: var(--serif); font-size: 16px; font-style: italic;
  font-variation-settings: "opsz" 144, "SOFT" 60;
  color: var(--ink-soft); margin: 0 0 12px; line-height: 1.5;
}
.demo-testimonial cite {
  font-style: normal; font-size: 13px; color: var(--ink-muted);
  font-family: var(--sans);
}
.demo-calendar-btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; margin-top: 20px; padding: 14px 28px;
  font-size: 15px; font-weight: 500; background: var(--green-ink);
  color: var(--cream); border: none; border-radius: 999px;
  text-decoration: none; font-family: var(--sans); transition: .2s;
}
.demo-calendar-btn:hover { opacity: .9; transform: translateY(-1px); }

.demo-nav {
  display: flex; align-items: center; justify-content: space-between;
  max-width: var(--max); margin: 0 auto; padding: 0 28px; height: 70px;
}
.demo-nav .logo {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--serif); font-size: 22px;
  font-variation-settings: "opsz" 144, "SOFT" 20;
  letter-spacing: -0.02em; color: var(--ink);
  text-decoration: none;
}
.demo-nav .logo-mark {
  width: 26px; height: 26px; display: inline-flex;
}

gmp-place-autocomplete {
  width: 100%; font-family: var(--sans);
}
gmp-place-autocomplete input {
  width: 100%; padding: 14px 16px; font-size: 15px;
  border: 1px solid var(--rule); border-radius: 10px;
  background: var(--cream); color: var(--ink);
  font-family: var(--sans); outline: none;
  transition: border-color .2s;
}
gmp-place-autocomplete input:focus {
  border-color: var(--green);
}
.demo-place-info {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px; padding: 8px 12px;
  background: var(--green-100); border: 1px solid var(--green-wash);
  border-radius: 8px; font-size: 12px; color: var(--green-ink);
  font-family: var(--mono); letter-spacing: .03em;
}
.demo-place-info .dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0;
}

/* Inline calendar booking */
.demo-success { overflow: hidden; }
.demo-card *, .demo-card *::before, .demo-card *::after { box-sizing: border-box; }
.bk-header {
  text-align: center; margin-bottom: 24px;
}
.bk-title {
  font-family: var(--serif); font-size: 22px; font-weight: 400;
  font-variation-settings: "opsz" 144, "SOFT" 40;
  color: var(--ink); margin: 0 0 4px;
}
.bk-subtitle {
  font-size: 14px; color: var(--ink-muted); margin: 0;
}
.bk-dates {
  display: flex; gap: 2px; overflow-x: auto; padding: 4px 0 16px;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
  max-width: 100%; border-bottom: 1px solid var(--rule);
  margin-bottom: 16px;
}
.bk-dates::-webkit-scrollbar { display: none; }
.bk-date {
  flex: 0 0 auto; padding: 10px 6px; min-width: 56px;
  border-radius: 12px; border: none; background: transparent;
  cursor: pointer; text-align: center; transition: .15s;
}
.bk-date:hover { background: var(--cream-3); }
.bk-date.on {
  background: var(--green-ink);
  box-shadow: 0 2px 8px rgba(45,90,60,.25);
}
.bk-date-day {
  display: block; font-family: var(--mono); font-size: 10px;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--ink-muted);
}
.bk-date.on .bk-date-day { color: rgba(255,255,255,.7); }
.bk-date-num {
  display: block; font-size: 20px; font-weight: 600; color: var(--ink);
  margin-top: 2px; line-height: 1.2;
}
.bk-date.on .bk-date-num { color: white; }
.bk-slots-wrap {
  position: relative;
}
.bk-slots-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 32px; pointer-events: none;
  background: linear-gradient(transparent, var(--card));
}
.bk-slots {
  max-height: 280px; overflow-y: auto; margin-top: 0;
  scrollbar-width: thin; scrollbar-color: var(--rule) transparent;
  display: flex; flex-direction: column; gap: 8px;
  padding-bottom: 8px;
}
.bk-slot {
  width: 100%; padding: 15px 16px; border-radius: 10px;
  border: 1px solid var(--green); background: transparent;
  color: var(--green-ink); font-size: 15px; font-weight: 500;
  font-family: var(--sans); cursor: pointer; text-align: center;
  transition: .15s; flex-shrink: 0;
}
.bk-slot:hover { background: var(--green-100); }
.bk-slot.on {
  background: var(--green-ink); color: white; border-color: var(--green-ink);
  box-shadow: 0 2px 8px rgba(45,90,60,.25);
}
.bk-empty {
  text-align: center; padding: 24px 0; color: var(--ink-muted); font-size: 14px;
}
.bk-cta {
  margin-top: 20px;
}
.bk-fallback {
  font-size: 12px; color: var(--ink-muted); text-align: center; margin-top: 12px;
}
.bk-fallback a { color: var(--green-ink); text-decoration: underline; }
.bk-booked-check {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--green); color: #0d2c20;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; margin: 0 auto 16px;
}
.bk-booked-title {
  font-family: var(--serif); font-size: 24px; font-weight: 400;
  margin: 0 0 8px; text-align: center;
  font-variation-settings: "opsz" 144, "SOFT" 40;
}
.bk-booked-time {
  color: var(--ink-muted); text-align: center; font-size: 15px; margin: 0 0 20px;
}
.bk-booked-email {
  font-size: 13px; color: var(--ink-muted); text-align: center; margin-top: 16px;
}
/* Phone input with country code */
.phone-row {
  display: flex; gap: 0; border: 1px solid var(--rule); border-radius: 10px;
  overflow: hidden; background: var(--cream);
  transition: border-color .2s;
}
.phone-row:focus-within { border-color: var(--green); }
.phone-row > .phone-country {
  flex: 0 0 80px; width: 80px; max-width: 80px; padding: 14px 8px 14px 12px; font-size: 14px;
  border: none; border-right: 1px solid var(--rule); border-radius: 0;
  background: var(--cream-2); color: var(--ink); font-family: var(--sans);
  outline: none; cursor: pointer;
}
.phone-row > .phone-number {
  flex: 1 1 auto; min-width: 0; width: auto; padding: 14px 16px; font-size: 15px;
  border: none; border-radius: 0; background: transparent; color: var(--ink);
  font-family: var(--sans); outline: none;
}
.phone-number::placeholder { color: var(--ink-muted); }
.phone-error {
  font-size: 12px; color: var(--tomato-ink); margin-top: 4px;
}

/* ── Diagnostic Scorecard ── */
.diag-card {
  background: #f8fafc; border: 1px solid #e2e8f0;
  border-radius: 16px; padding: 32px 24px;
  box-sizing: border-box; max-width: 100%;
}
.diag-name {
  font-family: "DM Sans", var(--sans); font-weight: 700; font-size: 16px;
  color: #1a2332; text-align: center; margin: 0 0 24px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.diag-score-section {
  display: flex; flex-direction: column; align-items: center; margin-bottom: 16px;
}
.diag-ring-wrap {
  position: relative; display: inline-flex;
  align-items: center; justify-content: center;
}
.diag-ring-wrap svg { display: block; }
.diag-score-inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.diag-score-num {
  font-family: "DM Sans", var(--sans); font-weight: 700; font-size: 48px;
  line-height: 1; transition: color .3s;
}
.diag-score-of {
  font-family: "Inter", var(--sans); font-size: 13px; color: #94a3b8;
  margin-top: 2px;
}
.diag-summary {
  font-size: 14px; color: #64748b; text-align: center;
  margin: 12px 0 24px; line-height: 1.5;
}
.diag-metrics {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-bottom: 24px;
}
.diag-metric {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
  padding: 12px; min-height: 72px;
  display: flex; flex-direction: column; gap: 4px;
}
.diag-metric-icon { font-size: 16px; line-height: 1; }
.diag-metric-val {
  font-family: "DM Sans", var(--sans); font-weight: 700; font-size: 18px;
  color: #1a2332; line-height: 1.2;
}
.diag-metric-label {
  font-size: 12px; color: #94a3b8; line-height: 1.3;
}
.diag-metric--good { border-left: 3px solid #10b981; }
.diag-metric--warn { border-left: 3px solid #f59e0b; }
.diag-metric--bad  { border-left: 3px solid #ef4444; }

.diag-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 0 0 16px; color: #94a3b8; font-size: 12px;
  font-family: "DM Sans", var(--sans); font-weight: 500;
  text-transform: uppercase; letter-spacing: .06em;
}
.diag-divider::before, .diag-divider::after {
  content: ""; flex: 1; height: 1px; background: #e2e8f0;
}
.diag-competitors { margin-bottom: 16px; }
.diag-comp {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid #f1f5f9;
}
.diag-comp:last-child { border-bottom: none; }
.diag-comp-name {
  font-size: 14px; color: #1a2332; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 55%;
}
.diag-comp-rating {
  font-family: "DM Sans", var(--sans); font-size: 14px; font-weight: 700;
  display: flex; align-items: center; gap: 4px;
}
.diag-comp-reviews {
  font-size: 12px; color: #94a3b8; font-weight: 400;
}
.diag-ranking {
  text-align: center; padding: 8px 16px; margin-bottom: 24px;
  background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px;
  font-size: 13px; font-weight: 500; color: #166534;
}
.diag-ranking--warn {
  background: #fffbeb; border-color: #fde68a; color: #92400e;
}
.diag-ranking--bad {
  background: #fef2f2; border-color: #fecaca; color: #991b1b;
}
.diag-cta {
  width: 100%; padding: 16px; font-size: 15px; font-weight: 600;
  background: #2563eb; color: #fff;
  border: none; border-radius: 12px; cursor: pointer;
  font-family: "DM Sans", var(--sans); transition: .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  min-height: 48px;
}
.diag-cta:hover { background: #1d4ed8; transform: translateY(-1px); }

/* Warm landing (score < 40) */
.diag-warm-section { margin-top: 24px; }
.diag-warm-title {
  font-family: "DM Sans", var(--sans); font-weight: 700; font-size: 16px;
  color: #1a2332; margin: 0 0 12px;
}
.diag-tip {
  display: flex; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid #f1f5f9;
}
.diag-tip:last-child { border-bottom: none; }
.diag-tip-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.diag-tip-text { font-size: 13px; color: #475569; line-height: 1.5; }
.diag-wa-cta {
  width: 100%; padding: 14px; font-size: 15px; font-weight: 600;
  background: #25d366; color: #fff;
  border: none; border-radius: 12px; cursor: pointer;
  font-family: "DM Sans", var(--sans); transition: .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 16px; text-decoration: none; min-height: 48px;
}
.diag-wa-cta:hover { background: #20bd5a; }
.diag-secondary {
  display: block; width: 100%; text-align: center;
  font-size: 13px; color: #2563eb; cursor: pointer;
  background: none; border: none; font-family: var(--sans);
  margin-top: 12px; padding: 8px;
}
.diag-secondary:hover { text-decoration: underline; }

/* ── Evaluation Report ── */
.diag-eval-summary {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
  padding: 16px; margin-bottom: 16px;
}
.diag-eval-headline {
  font-family: "DM Sans", var(--sans); font-weight: 700; font-size: 15px;
  color: #1a2332; margin: 0 0 4px;
}
.diag-eval-body {
  font-size: 13px; color: #64748b; line-height: 1.5; margin: 0;
}
.diag-eval-items { margin-bottom: 16px; }
.diag-eval-item {
  padding: 12px; margin-bottom: 8px;
  background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
}
.diag-eval-item--good { border-left: 3px solid #10b981; }
.diag-eval-item--warn { border-left: 3px solid #f59e0b; }
.diag-eval-item--bad  { border-left: 3px solid #ef4444; }
.diag-eval-verdict {
  display: flex; align-items: center; gap: 6px;
  font-family: "DM Sans", var(--sans); font-weight: 600; font-size: 14px;
  color: #1a2332; margin-bottom: 4px;
}
.diag-eval-detail {
  font-size: 13px; color: #475569; line-height: 1.5; margin: 0;
  padding-left: 22px;
}
.diag-eval-rec {
  background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px;
  padding: 14px; margin-bottom: 20px;
}
.diag-eval-rec-label {
  font-family: var(--mono, monospace); font-size: 10px;
  letter-spacing: .08em; text-transform: uppercase;
  color: #166534; margin-bottom: 6px;
}
.diag-eval-rec-text {
  font-size: 13px; color: #166534; line-height: 1.5; margin: 0;
}
@media (max-width: 640px) {
  .diag-eval-item { padding: 10px; }

<body>
<div id="root"></div>
<script type="text/babel">
const API_URL = "/api/demo-page/lead-intake";
const SESSION_ID = "sess_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);

function fireEvent(eventType, placeId) {
  fetch("/api/diagnostico/event", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ event_type: eventType, place_id: placeId, session_id: SESSION_ID }),
  }).catch(() => {});
}

function computeDigitalScore(enrich, competitors) {
  let score = 0;
  if (enrich.rating) score += (enrich.rating / 5) * 30;
  if (enrich.reviewCount) score += Math.min(enrich.reviewCount / 200, 1) * 25;
  if (enrich.websiteUri) score += 20;
  if (enrich.businessStatus === "OPERATIONAL") score += 10;
  if (competitors && competitors.length > 0) {
    const avg = competitors.reduce((s, c) => s + (c.rating || 0), 0) / competitors.length;
    if (enrich.rating) {
      const diff = enrich.rating - avg;
      score += diff > 0.5 ? 15 : diff > 0 ? 12 : diff > -0.3 ? 8 : 4;
    } else {
      score += 4;
    }
  } else {
    score += 8;
  }
  return Math.round(score);
}

function getGaps(enrich, competitors) {
  const gaps = [];
  if (!enrich.rating || enrich.rating < 4.0)
    gaps.push({ key: "rating", label: "Calificación Google", icon: "★", tip: "Responde a todas las reseñas de Google. Cada respuesta mejora tu calificación y muestra que te importa." });
  if (!enrich.reviewCount || enrich.reviewCount < 50)
    gaps.push({ key: "reviews", label: "Reseñas de clientes", icon: "💬", tip: "Pide reseñas a clientes satisfechos. Un QR en la mesa funciona muy bien." });
  if (!enrich.websiteUri)
    gaps.push({ key: "website", label: "Presencia web", icon: "🌐", tip: "Crea un sitio web con tu menú y ubicación. Es lo primero que buscan tus clientes." });
  if (competitors && competitors.length > 0) {
    const avg = competitors.reduce((s, c) => s + (c.rating || 0), 0) / competitors.length;
    if (enrich.rating && enrich.rating < avg)
      gaps.push({ key: "competition", label: "Competitividad local", icon: "📊", tip: "Analiza qué hacen bien tus competidores y adapta lo mejor a tu restaurante." });
  }
  return gaps;
}

function generateEvaluation(enrich, competitors) {
  const avgRating = competitors.length > 0
    ? competitors.reduce((s, c) => s + (c.rating || 0), 0) / competitors.length
    : 4.2;
  const avgReviews = competitors.length > 0
    ? competitors.reduce((s, c) => s + (c.reviewCount || 0), 0) / competitors.length
    : 156;
  const zoneLabel = competitors.length > 0 && competitors[0]?.placeId ? "promedio de tu zona" : "promedio nacional";

  const sections = [];

  if (enrich.rating != null) {
    const diff = enrich.rating - avgRating;
    const absDiff = Math.abs(diff).toFixed(1);
    let verdict, detail, status;
    if (diff >= 0.3) {
      verdict = "Tu calificación es una fortaleza";
      detail = "Con " + enrich.rating.toFixed(1) + " estrellas, estás " + absDiff + " puntos arriba del " + zoneLabel + " (" + avgRating.toFixed(1) + "). Esto genera confianza inmediata cuando un cliente te busca en Google.";
      status = "good";
    } else if (diff >= -0.2) {
      verdict = "Tu calificación está en el promedio";
      detail = "Tu " + enrich.rating.toFixed(1) + " está prácticamente igual al " + zoneLabel + " (" + avgRating.toFixed(1) + "). Para destacar, necesitas llegar a " + (avgRating + 0.3).toFixed(1) + " o más.";
      status = "warn";
    } else {
      verdict = "Tu calificación necesita atención";
      detail = "Tu " + enrich.rating.toFixed(1) + " está " + absDiff + " puntos debajo del " + zoneLabel + " (" + avgRating.toFixed(1) + "). Los clientes eligen primero a los restaurantes con mejor calificación.";
      status = "bad";
    }
    sections.push({ key: "rating", icon: "★", verdict, detail, status });
  } else {
    sections.push({ key: "rating", icon: "★", verdict: "Sin calificación visible", detail: "Tu perfil de Google no tiene calificación visible. Los clientes no pueden evaluar tu restaurante antes de visitarlo — y la mayoría elige otro.", status: "bad" });
  }

  if (enrich.reviewCount != null) {
    let verdict, detail, status;
    if (enrich.reviewCount >= 200) {
      verdict = "Volumen de reseñas excelente";
      detail = enrich.reviewCount + " reseñas te dan credibilidad fuerte. Google prioriza negocios con más reseñas en resultados locales.";
      status = "good";
    } else if (enrich.reviewCount >= 50) {
      verdict = "Buen inicio en reseñas";
      detail = "Tienes " + enrich.reviewCount + " reseñas — un buen número, pero el " + zoneLabel + " es " + Math.round(avgReviews) + ". Cada reseña nueva mejora tu posición en Google Maps.";
      status = "warn";
    } else if (enrich.reviewCount >= 10) {
      verdict = "Pocas reseñas para competir";
      detail = "Con solo " + enrich.reviewCount + " reseñas, estás lejos del " + zoneLabel + " (" + Math.round(avgReviews) + "). Los restaurantes con más reseñas aparecen primero en Google Maps.";
      status = "bad";
    } else {
      verdict = "Necesitas más reseñas urgentemente";
      detail = "Solo " + enrich.reviewCount + " reseñas. Google no muestra tu restaurante en las primeras posiciones con tan pocas reseñas. Un QR en cada mesa puede cambiar esto rápido.";
      status = "bad";
    }
    sections.push({ key: "reviews", icon: "💬", verdict, detail, status });
  } else {
    sections.push({ key: "reviews", icon: "💬", verdict: "Sin reseñas registradas", detail: "No encontramos reseñas en tu perfil. Las reseñas son el factor #1 que usan los clientes para elegir dónde comer.", status: "bad" });
  }

  if (enrich.websiteUri) {
    sections.push({ key: "website", icon: "🌐", verdict: "Tienes sitio web", detail: "Tener un sitio web propio te da control sobre tus pedidos y reduce dependencia de apps de delivery que cobran 30% de comisión.", status: "good" });
  } else {
    sections.push({ key: "website", icon: "🌐", verdict: "Sin sitio web propio", detail: "No tienes un sitio web vinculado a tu perfil de Google. Cada cliente que te busca y no encuentra tu menú o forma de pedir se va a la competencia.", status: "bad" });
  }

  if (enrich.businessStatus === "OPERATIONAL") {
    sections.push({ key: "status", icon: "✓", verdict: "Perfil activo en Google", detail: "Tu negocio aparece como activo. Esto es lo básico — pero importante porque un perfil inactivo pierde el 100% de las búsquedas.", status: "good" });
  } else {
    sections.push({ key: "status", icon: "✓", verdict: "Tu perfil no aparece como activo", detail: "Google no muestra tu negocio como activo. Esto puede significar que no apareces en búsquedas tipo 'restaurantes cerca de mí'.", status: "bad" });
  }

  const goods = sections.filter(s => s.status === "good").length;
  const bads = sections.filter(s => s.status === "bad").length;
  let summaryHeadline, summaryBody;
  if (goods >= 3) {
    summaryHeadline = "Tu presencia digital tiene bases sólidas";
    summaryBody = "Tienes lo principal en orden. Con algunos ajustes estratégicos puedes convertir más búsquedas en clientes reales.";
  } else if (goods >= 2) {
    summaryHeadline = "Vas por buen camino, pero hay oportunidades claras";
    summaryBody = "Tienes fortalezas que puedes aprovechar. Corrigiendo " + bads + " área" + (bads > 1 ? "s" : "") + " clave puedes ver resultados en semanas.";
  } else if (goods >= 1) {
    summaryHeadline = "Tu restaurante tiene potencial — pero necesita atención";
    summaryBody = "Encontramos varias áreas que necesitan trabajo. La buena noticia: cada mejora tiene impacto directo en clientes nuevos.";
  } else {
    summaryHeadline = "Es momento de actuar en tu presencia digital";
    summaryBody = "Tu restaurante tiene mucho que ganar. Cada día sin optimizar tu perfil de Google, tus competidores capturan clientes que podrían ser tuyos.";
  }

  const recMap = {
    rating: "Empieza respondiendo a cada reseña de Google — los clientes ven que te importa y Google mejora tu posición.",
    reviews: "Coloca un QR en cada mesa que lleve directo a dejar una reseña en Google. Con 5 reseñas por semana, en 2 meses puedes duplicar tu número.",
    website: "Un sitio web con tu menú, ubicación y forma de pedir elimina la barrera entre la búsqueda y el pedido.",
    status: "Verifica tu perfil de Google Business. Un perfil activo y completo es requisito para aparecer en búsquedas locales.",
  };
  const firstBad = sections.find(s => s.status === "bad");
  const topRec = firstBad ? recMap[firstBad.key] : null;

  return { sections, summaryHeadline, summaryBody, topRec, goods, bads };
}

function getScoreColor(score) {
  if (score >= 70) return "#10b981";
  if (score >= 40) return "#f59e0b";
  return "#ef4444";
}

function LogoMark() {
  return (
    <span className="logo-mark">
      <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" style={{width:"100%",height:"100%"}}>
        <g fill="currentColor">
          <rect x="54" y="40" width="50" height="172" rx="6"/>
          <rect x="54" y="40" width="150" height="46" rx="6"/>
          <rect x="54" y="108" width="98" height="38" rx="6"/>
          <path d="M 148 94 Q 152 92 158 96 L 198 124 Q 202 128 198 132 L 158 160 Q 152 164 148 162 L 148 94 Z"/>
        </g>
      </svg>
    </span>
  );
}

function ScoreRing({ score, size = 120, strokeWidth = 8 }) {
  const [progress, setProgress] = React.useState(0);
  const [revealed, setRevealed] = React.useState(false);

  React.useEffect(() => {
    const duration = 2000;
    const start = performance.now();
    let raf;
    function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      setProgress(eased);
      if (eased >= 0.8 && !revealed) setRevealed(true);
      if (t < 1) raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [score]);

  const r = (size - strokeWidth) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - (progress * score / 100));
  const display = Math.round(progress * score);
  const finalColor = getScoreColor(score);
  const color = revealed ? finalColor : "#2563eb";

  return (
    <div className="diag-ring-wrap" role="img" aria-label={"Puntuación: " + score + " de 100"} style={{ width: size, height: size }}>
      <svg width={size} height={size} viewBox={"0 0 " + size + " " + size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e2e8f0" strokeWidth={strokeWidth} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={strokeWidth}
          strokeDasharray={circ} strokeDashoffset={offset}
          strokeLinecap="round" style={{ transition: "stroke 0.3s ease" }} />
      </svg>
      <div className="diag-score-inner">
        <span className="diag-score-num" style={{ color: revealed ? finalColor : "#1a2332" }}>{display}</span>
        <span className="diag-score-of">/100</span>
      </div>
    </div>
  );
}

function SkeletonLoader() {
  return (
    <div className="diag-card">
      <div className="diag-skel-ring" />
      <div className="diag-skel-text" style={{ width: "60%" }} />
      <div className="diag-skel-cards">
        <div className="diag-skel-card" />
        <div className="diag-skel-card" />
        <div className="diag-skel-card" />
        <div className="diag-skel-card" />
      </div>
      <div className="diag-skel-text" style={{ width: "40%", marginBottom: 16 }} />
      <div className="diag-skel-bar" style={{ width: "90%" }} />
      <div className="diag-skel-bar" style={{ width: "75%" }} />
      <div className="diag-skel-bar" style={{ width: "85%" }} />
    </div>
  );
}

function DiagnosticScorecard({ companyName, placeId, onContinue, onBack }) {
  const [loading, setLoading] = React.useState(true);
  const [enrich, setEnrich] = React.useState(null);
  const [competitors, setCompetitors] = React.useState([]);
  const [failed, setFailed] = React.useState(false);

  React.useEffect(() => {
    let cancelled = false;
    const timeout = setTimeout(() => {
      if (!cancelled && loading) { setFailed(true); setLoading(false); }
    }, 8000);

    Promise.all([
      fetch("/api/diagnostico/enrich?place_id=" + encodeURIComponent(placeId)).then(r => r.ok ? r.json() : null),
      fetch("/api/diagnostico/nearby?place_id=" + encodeURIComponent(placeId)).then(r => r.ok ? r.json() : null),
    ]).then(([enrichRes, nearbyRes]) => {
      if (cancelled) return;
      clearTimeout(timeout);
      if (!enrichRes) { setFailed(true); setLoading(false); return; }
      setEnrich(enrichRes);
      setCompetitors(nearbyRes?.competitors || []);
      setLoading(false);
      fireEvent("diagnostic_viewed", placeId);
    }).catch(() => {
      if (!cancelled) { setFailed(true); setLoading(false); }
    });

    return () => { cancelled = true; clearTimeout(timeout); };
  }, [placeId]);

  React.useEffect(() => {
    if (failed) onContinue();
  }, [failed]);

  if (loading) return <SkeletonLoader />;
  if (failed) return null;

  const score = computeDigitalScore(enrich, competitors);
  const gaps = getGaps(enrich, competitors);
  const scoreColor = getScoreColor(score);
  const evaluation = generateEvaluation(enrich, competitors);
  const hasAnyData = enrich.rating != null || enrich.reviewCount != null || enrich.websiteUri != null;

  const ratingClass = enrich.rating >= 4.0 ? "diag-metric--good" : enrich.rating >= 3.0 ? "diag-metric--warn" : "diag-metric--bad";
  const reviewClass = enrich.reviewCount >= 100 ? "diag-metric--good" : enrich.reviewCount >= 30 ? "diag-metric--warn" : "diag-metric--bad";
  const webClass = enrich.websiteUri ? "diag-metric--good" : "diag-metric--bad";
  const statusClass = enrich.businessStatus === "OPERATIONAL" ? "diag-metric--good" : "diag-metric--bad";

  const betterThan = competitors.filter(c => enrich.rating && c.rating && enrich.rating > c.rating).length;
  const total = competitors.length;
  let rankText, rankClass;
  if (total === 0) {
    rankText = null;
  } else if (betterThan === total) {
    rankText = "Mejor que " + total + " de " + total + " competidores cercanos";
    rankClass = "";
  } else if (betterThan > 0) {
    rankText = "Mejor que " + betterThan + " de " + total + " competidores cercanos";
    rankClass = betterThan >= total / 2 ? "" : "diag-ranking--warn";
  } else {
    rankText = "Por debajo de tus " + total + " competidores cercanos";
    rankClass = "diag-ranking--bad";
  }

  const isWarm = score < 40;

  return (
    <div className="diag-card">
      <button className="demo-back" onClick={onBack}>{"←"} Cambiar restaurante</button>
      <div className="diag-name">{companyName}</div>

      <div className="diag-score-section">
        <ScoreRing score={score} />
      </div>

      <div className="diag-summary">
        {gaps.length === 0
          ? "Tu restaurante tiene una presencia digital sólida."
          : "Oportunidades de mejora en " + gaps.length + " área" + (gaps.length > 1 ? "s" : "") + "."}
      </div>

      <div className="diag-metrics">
        <div className={"diag-metric " + ratingClass}>
          <span className="diag-metric-icon">{"★"}</span>
          <span className="diag-metric-val">{enrich.rating ? enrich.rating.toFixed(1) + "/5" : "N/A"}</span>
          <span className="diag-metric-label">Calificación Google</span>
        </div>
        <div className={"diag-metric " + reviewClass}>
          <span className="diag-metric-icon">{"💬"}</span>
          <span className="diag-metric-val">{enrich.reviewCount != null ? enrich.reviewCount : "N/A"}</span>
          <span className="diag-metric-label">Reseñas</span>
        </div>
        <div className={"diag-metric " + webClass}>
          <span className="diag-metric-icon">{"🌐"}</span>
          <span className="diag-metric-val">{enrich.websiteUri ? "Sí" : "No"}</span>
          <span className="diag-metric-label">Sitio web</span>
        </div>
        <div className={"diag-metric " + statusClass}>
          <span className="diag-metric-icon">{"✓"}</span>
          <span className="diag-metric-val">{enrich.businessStatus === "OPERATIONAL" ? "Activo" : "Inactivo"}</span>
          <span className="diag-metric-label">Estado Google</span>
        </div>
      </div>

      <div className="diag-divider">Tu evaluación</div>

      {hasAnyData ? (
        <>
          <div className="diag-eval-summary">
            <div className="diag-eval-headline">{evaluation.summaryHeadline}</div>
            <p className="diag-eval-body">{evaluation.summaryBody}</p>
          </div>

          <div className="diag-eval-items">
            {evaluation.sections.map((s, i) => (
              <div className={"diag-eval-item diag-eval-item--" + s.status} key={i}>
                <div className="diag-eval-verdict">
                  <span>{s.icon}</span> {s.verdict}
                </div>
                <p className="diag-eval-detail">{s.detail}</p>
              </div>
            ))}
          </div>

          {evaluation.topRec && (
            <div className="diag-eval-rec">
              <div className="diag-eval-rec-label">Acción #1</div>
              <p className="diag-eval-rec-text">{evaluation.topRec}</p>
            </div>
          )}
        </>
      ) : (
        <div className="diag-eval-summary">
          <div className="diag-eval-headline">No pudimos obtener todos los datos de tu perfil</div>
          <p className="diag-eval-body">Esto puede pasar si tu perfil de Google Business es nuevo o no está verificado. Un experto puede revisar tu caso y darte recomendaciones personalizadas.</p>
        </div>
      )}

      {total > 0 && (
        <>
          <div className="diag-divider">Tu vs tu zona</div>
          <div className="diag-competitors">
            {competitors.map((c, i) => (
              <div className="diag-comp" key={i}>
                <span className="diag-comp-name">{c.name}</span>
                <span className="diag-comp-rating">
                  <span style={{ color: c.rating >= (enrich.rating || 0) ? "#f59e0b" : "#94a3b8" }}>{"★"}</span>
                  {c.rating ? c.rating.toFixed(1) : "N/A"}
                  <span className="diag-comp-reviews">({c.reviewCount || 0})</span>
                </span>
              </div>
            ))}
          </div>
          {rankText && <div className={"diag-ranking " + rankClass}>{rankText}</div>}
        </>
      )}

      {isWarm ? (
        <>
          <div className="diag-warm-section">
            <div className="diag-warm-title">Lo bueno: todo esto se puede mejorar</div>
            <p style={{ fontSize: 13, color: "#475569", lineHeight: 1.5, margin: "0 0 16px" }}>
              Muchos de nuestros clientes empezaron con un perfil similar al tuyo. Con las acciones correctas, los resultados llegan rápido.
            </p>
          </div>
          <a href={"https://wa.me/5214421716825?text=" + encodeURIComponent("Hola, acabo de hacer el diagnóstico de " + companyName + " y quiero mejorar mi presencia digital")} className="diag-wa-cta" target="_blank" rel="noopener">
            Habla con un experto por WhatsApp
          </a>
          <button className="diag-secondary" onClick={onContinue}>
            Agendar demo de todas formas
          </button>
        </>
      ) : (
        <button className="diag-cta" onClick={onContinue}>
          Quiero mejorar mi presencia digital <span>{"→"}</span>
        </button>
      )}
    </div>
  );
}

function CalendarBooking({ firstName, lastName, email, phone, companyName, assignedAE, calendarUrl }) {
  const [loading, setLoading] = React.useState(true);
  const [dates, setDates] = React.useState([]);
  const [selectedDate, setSelectedDate] = React.useState(0);
  const [selectedSlot, setSelectedSlot] = React.useState(null);
  const [booking, setBooking] = React.useState(false);
  const [booked, setBooked] = React.useState(null);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    fetch(`/api/calendar/available-slots?ae=${encodeURIComponent(assignedAE)}&days=14`)
      .then(r => r.json())
      .then(data => {
        if (data.ok && data.dates?.length) setDates(data.dates);
        else setError("fallback");
      })
      .catch(() => setError("fallback"))
      .finally(() => setLoading(false));
  }, [assignedAE]);

  const handleBook = async () => {
    if (!selectedSlot) return;
    setBooking(true);
    setError(null);
    try {
      const res = await fetch("/api/calendar/book-demo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          ae: assignedAE,
          start: selectedSlot.start,
          end: selectedSlot.end,
          first_name: firstName,
          last_name: lastName,
          email,
          phone,
          company_name: companyName,
        }),
      });
      const result = await res.json();
      if (!res.ok) {
        setError(result.error || "No pudimos agendar tu demo.");
        return;
      }
      setBooked(result);
      if (typeof fbq === "function" && result.eventId) {
        fbq("track", "Schedule", { content_name: "demo_booking", value: 0, currency: "MXN" }, { eventID: "schedule_" + result.eventId });
      }
    } catch {
      setError("No pudimos agendar tu demo. Intenta de nuevo.");
    } finally {
      setBooking(false);
    }
  };

  if (booked) {
    return (
      <>
        <div className="bk-booked-check">{"✓"}</div>
        <h3 className="bk-booked-title">
          Demo agendada, {firstName}
        </h3>
        <p className="bk-booked-time">
          {booked.startFormatted}
        </p>
        {booked.meetLink && (
          <a href={booked.meetLink} target="_blank" rel="noopener" className="demo-calendar-btn" style={{ display: "flex", width: "100%", justifyContent: "center" }}>
            Abrir Google Meet <span>{"→"}</span>
          </a>
        )}
        <p className="bk-booked-email">
          Te enviamos confirmación a <strong>{email}</strong>
        </p>
      </>
    );
  }

  if (error === "fallback") {
    return (
      <>
        <p style={{ fontSize: 17, color: "var(--green-ink)", fontWeight: 500 }}>
          Tu restaurante califica para una demo personalizada.
        </p>
        <a href={calendarUrl} className="demo-calendar-btn" style={{ display: "flex", width: "100%", justifyContent: "center", marginTop: 16 }}>
          Agendar mi demo de 20 min <span>{"→"}</span>
        </a>
        <p style={{ marginTop: 12, fontSize: 12, color: "var(--ink-muted)", textAlign: "center" }}>
          <a href="https://wa.me/5214421716825" style={{ color: "var(--green-ink)", textDecoration: "underline" }}>WhatsApp</a>
        </p>
      </>
    );
  }

  if (loading) {
    return (
      <div style={{ textAlign: "center", padding: "20px 0" }}>
        <p style={{ fontSize: 15, color: "var(--green-ink)", fontWeight: 500 }}>Cargando horarios disponibles...</p>
      </div>
    );
  }

  const currentDate = dates[selectedDate];

  const parseDateLabel = (label) => {
    const parts = label.split(" ");
    return { day: parts[0], num: parts[1], month: parts[2] };
  };

  return (
    <>
      <div className="bk-header">
        <div className="bk-title">Elige tu horario</div>
        <div className="bk-subtitle">Demo personalizada de 20 min por Google Meet</div>
      </div>

      {error && error !== "fallback" && <div className="demo-error">{error}</div>}

      <div className="bk-dates">
        {dates.map((d, i) => {
          const p = parseDateLabel(d.dateLabel);
          return (
            <button
              key={i}
              onClick={() => { setSelectedDate(i); setSelectedSlot(null); setError(null); }}
              className={"bk-date" + (i === selectedDate ? " on" : "")}
            >
              <span className="bk-date-day">{p.day}</span>
              <span className="bk-date-num">{p.num}</span>
            </button>
          );
        })}
      </div>

      {currentDate && (
        <div className="bk-slots-wrap">
          <div className="bk-slots">
            {currentDate.slots.length ? currentDate.slots.map((s, i) => (
              <button
                key={i}
                onClick={() => { setSelectedSlot(s); setError(null); }}
                className={"bk-slot" + (selectedSlot === s ? " on" : "")}
              >
                {s.timeLabel}
              </button>
            )) : (
              <div className="bk-empty">No hay horarios disponibles este día.</div>
            )}
          </div>
        </div>
      )}

      <div className="bk-cta">
        <button
          className="demo-submit"
          disabled={!selectedSlot || booking}
          onClick={handleBook}
        >
          {booking ? "Agendando..." : selectedSlot ? `Agendar ${selectedSlot.timeLabel} →` : "Selecciona un horario"}
        </button>
      </div>

      <div className="bk-fallback">
        <a href={calendarUrl}>Agendar en Google Calendar</a>
        {" · "}
        <a href="https://wa.me/5214421716825">WhatsApp</a>
      </div>
    </>
  );
}

function DemoForm() {
  const [step, setStep] = React.useState("place");
  const [submitting, setSubmitting] = React.useState(false);
  const [success, setSuccess] = React.useState(false);
  const [showCalendar, setShowCalendar] = React.useState(false);
  const [calendarUrl, setCalendarUrl] = React.useState("");
  const [assignedAE, setAssignedAE] = React.useState("Mariana");
  const [error, setError] = React.useState(null);

  const [form, setForm] = React.useState({
    company_name: "",
    place_id: "",
    place_address: "",
    role: "dueno",
    sucursales: "1",
    first_name: "",
    last_name: "",
    email: "",
    country_code: "+52",
    phone: "",
    source: "",
    whatsapp_optin: true,
  });
  const [phoneError, setPhoneError] = React.useState("");


  const placesContainerRef = React.useRef(null);
  const [placesMounted, setPlacesMounted] = React.useState(false);

  React.useEffect(() => {
    if (step !== "place" || placesMounted) return;

    function tryMount() {
      const container = placesContainerRef.current;
      if (!container) return false;
      if (!window.google?.maps?.places?.PlaceAutocompleteElement) return false;

      try {
        const el = new google.maps.places.PlaceAutocompleteElement({
          types: ["establishment"],
          componentRestrictions: { country: ["mx", "co", "cl", "pe"] },
        });
        el.style.cssText = "width:100%;font-size:15px;";
        el.setAttribute("placeholder", "Escribe el nombre de tu restaurante...");

        const reactInput = container.querySelector("input");
        if (reactInput) reactInput.style.display = "none";
        container.appendChild(el);
        setPlacesMounted(true);

        el.addEventListener("gmp-select", async (e) => {
          try {
            const pp = e.placePrediction;
            if (!pp) return;
            const place = pp.toPlace();
            await place.fetchFields({ fields: ["displayName", "formattedAddress"] });
            const pid = place.id || pp.placeId || "";
            const n = place.displayName ? (typeof place.displayName === "object" ? place.displayName.text : String(place.displayName)) : "";
            const a = place.formattedAddress ? (typeof place.formattedAddress === "object" ? place.formattedAddress.text : String(place.formattedAddress)) : "";
            if (n || pid) setForm(prev => ({ ...prev, company_name: n || prev.company_name, place_id: pid, place_address: a }));
          } catch (err) { console.error("[places] gmp-select error:", err); }
        });

        return true;
      } catch (err) { console.error("[places] PlaceAutocompleteElement init error:", err); return false; }
    }

    if (!tryMount()) {
      const interval = setInterval(() => { if (tryMount()) clearInterval(interval); }, 500);
      return () => clearInterval(interval);
    }
  }, [step, placesMounted]);

  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const PHONE_LENGTHS = { "+52": 10, "+57": 10, "+56": 9, "+51": 9, "+54": 10, "+1": 10, "+593": 9, "+502": 8 };
  const maxDigits = PHONE_LENGTHS[form.country_code] || 10;
  const digits = form.phone.replace(/\D/g, "");
  const canSubmit = form.first_name.trim() && form.email.trim() && digits.length >= maxDigits;

  const validatePhone = () => {
    const d = form.phone.replace(/\D/g, "");
    if (d.length < maxDigits) { setPhoneError(`El numero debe tener ${maxDigits} digitos`); return false; }
    setPhoneError("");
    return true;
  };

  const handleSubmit = async () => {
    if (!validatePhone()) return;
    setSubmitting(true);
    setError(null);
    try {
      const fullPhone = form.country_code + form.phone.replace(/\D/g, "");
      const payload = {
        first_name: form.first_name.trim(),
        last_name: form.last_name.trim(),
        email: form.email.trim(),
        phone: fullPhone,
        company_name: form.company_name.trim(),
        sucursales: form.sucursales,
        plataformas: form.role,
        place_id: form.place_id || undefined,
        place_address: form.place_address || undefined,
        source: form.source || undefined,
        whatsapp_optin: form.whatsapp_optin,
      };
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error("Error del servidor: " + res.status);
      const result = await res.json();
      setShowCalendar(result.showCalendar === true);
      const AE_CALENDARS = {
        "Mariana": "https://calendar.app.google/PNn3ykthv5gY8SMN8",
        "Ayline": "https://calendar.app.google/Z1PUtkg8xErSkLPr7",
      };
      setCalendarUrl(AE_CALENDARS[result.assignedAE] || AE_CALENDARS["Mariana"]);
      setAssignedAE(result.assignedAE || "Mariana");
      setSuccess(true);
      if (typeof fbq === "function" && result.eventId) {
        fbq("track", "Lead", { content_name: "demo_page", value: 0, currency: "MXN" }, { eventID: result.eventId });
      } else if (typeof fbq === "function") {
        fbq("track", "Lead", { content_name: "demo_page", value: 0, currency: "MXN" });
      }
    } catch (err) {
      setError("No pudimos enviar tu información. Intenta de nuevo o escríbenos por WhatsApp.");
    } finally {
      setSubmitting(false);
    }
  };

  if (success) {
    return (
      <div className="demo-card">
        <div className="demo-success">
          {showCalendar ? (
            <CalendarBooking
              firstName={form.first_name}
              lastName={form.last_name}
              email={form.email}
              phone={form.phone}
              companyName={form.company_name}
              assignedAE={assignedAE}
              calendarUrl={calendarUrl}
            />
          ) : (
            <>
              <div className="check">{"✓"}</div>
              <h2>{"¡"}Listo, {form.first_name}!</h2>
              <p>Recibimos tu información. Nuestro equipo revisará tu perfil y te contactará en las próximas 24 horas con una propuesta personalizada.</p>
              <p style={{ marginTop: 20, fontSize: 13, color: "var(--green-ink)" }}>
                {"¿"}Quieres hablar antes?{" "}
                <a href="https://wa.me/5214421716825" style={{ color: "var(--green-ink)", textDecoration: "underline" }}>Escríbenos por WhatsApp {"→"}</a>
              </p>
            </>
          )}
        </div>
      </div>
    );
  }

  if (step === "scorecard") {
    return (
      <DiagnosticScorecard
        companyName={form.company_name}
        placeId={form.place_id}
        onContinue={() => {
          fireEvent("contact_form_shown", form.place_id);
          setStep("contact");
        }}
        onBack={() => setStep("place")}
      />
    );
  }

  return (
    <div className="demo-card">
      {step === "place" && <div className="demo-step">Paso 1 de 2</div>}
      {step === "contact" && <div className="demo-step">Paso 2 de 2</div>}

      {step === "place" && (
        <>
          <h2>Cuéntanos de tu restaurante para preparar tu demo.</h2>
          {error && <div className="demo-error">{error}</div>}

          <div className="demo-field">
            <label>Busca tu restaurante</label>
            <div ref={placesContainerRef} style={{ minHeight: 48 }}>
              <input
                type="text"
                placeholder="Ej. Bora Bora Pizzas"
                value={form.company_name}
                onChange={set("company_name")}
                autoFocus
              />
            </div>
            {form.place_id && (
              <div className="demo-place-info">
                <span className="dot" />
                <span>{form.place_address}</span>
              </div>
            )}
          </div>

          <div className="demo-field">
            <label>Tu rol</label>
            <select value={form.role} onChange={set("role")}>
              <option value="dueno">Soy dueño o socio</option>
              <option value="gerente">Soy gerente u operador</option>
              <option value="marketing">Marketing o ventas</option>
              <option value="otro">Otro</option>
            </select>
          </div>

          <div className="demo-field">
            <label>{"¿"}Cuántas sucursales tienes?</label>
            <select value={form.sucursales} onChange={set("sucursales")}>
              <option value="1">1 sucursal</option>
              <option value="2-5">2 a 5 sucursales</option>
              <option value="6-20">6 a 20 sucursales</option>
              <option value="20+">Más de 20 sucursales</option>
            </select>
          </div>

          <button
            className="demo-submit"
            onClick={() => {
              let name = form.company_name.trim();
              if (!name) {
                try {
                  const gmp = placesContainerRef.current?.querySelector("gmp-place-autocomplete");
                  if (gmp) {
                    for (const k in gmp) {
                      try { if (gmp[k] instanceof HTMLInputElement && gmp[k].value) { name = gmp[k].value.trim(); break; } } catch {}
                    }
                  }
                } catch {}
              }
              if (!name) {
                setError("Por favor escribe el nombre de tu restaurante.");
                return;
              }
              setForm(prev => ({ ...prev, company_name: name }));
              setError(null);
              if (form.place_id) {
                fireEvent("diagnostic_started", form.place_id);
                setTimeout(() => setStep("scorecard"), 50);
              } else {
                setTimeout(() => setStep("contact"), 50);
              }
            }}
          >
            Continuar <span>{"→"}</span>
          </button>
        </>
      )}

      {step === "contact" && (
        <>
          <button className="demo-back" onClick={() => {
            if (form.place_id) setStep("scorecard");
            else setStep("place");
          }}>{"←"} Volver</button>
          <h2>{"¿"}A dónde te enviamos los resultados?</h2>
          {error && <div className="demo-error">{error}</div>}

          <div className="demo-name-row">
            <div className="demo-field">
              <label>Nombre</label>
              <input
                type="text"
                placeholder="Nombre"
                value={form.first_name}
                onChange={set("first_name")}
                autoFocus
              />
            </div>
            <div className="demo-field">
              <label>Apellido</label>
              <input
                type="text"
                placeholder="Apellido"
                value={form.last_name}
                onChange={set("last_name")}
              />
            </div>
          </div>

          <div className="demo-field">
            <label>Email</label>
            <input
              type="email"
              placeholder="tu@restaurante.com"
              value={form.email}
              onChange={set("email")}
            />
          </div>

          <div className="demo-field">
            <label>WhatsApp</label>
            <div className="phone-row">
              <select
                className="phone-country"
                value={form.country_code}
                onChange={set("country_code")}
              >
                <option value="+52">+52</option>
                <option value="+57">+57</option>
                <option value="+56">+56</option>
                <option value="+51">+51</option>
                <option value="+54">+54</option>
                <option value="+1">+1</option>
                <option value="+593">+593</option>
                <option value="+502">+502</option>
              </select>
              <input
                className="phone-number"
                type="tel"
                inputMode="numeric"
                maxLength={14}
                placeholder="55 1234 5678"
                value={form.phone}
                onChange={(e) => {
                  const raw = e.target.value.replace(/[^\d\s\-()]/g, "");
                  const digitsOnly = raw.replace(/\D/g, "");
                  if (digitsOnly.length > maxDigits) return;
                  setForm({ ...form, phone: raw });
                  setPhoneError("");
                }}
                onBlur={validatePhone}
              />
            </div>
            {phoneError && <div className="phone-error">{phoneError}</div>}
          </div>

          <div className="demo-field">
            <label>{"¿"}Cómo nos encontraste?</label>
            <select value={form.source} onChange={set("source")}>
              <option value="">Selecciona una opción</option>
              <option value="Google">Google</option>
              <option value="Instagram">Instagram</option>
              <option value="Facebook">Facebook</option>
              <option value="Recomendación de otro restaurantero">Recomendación de otro restaurantero</option>
              <option value="Un vendedor me contactó">Un vendedor me contactó</option>
              <option value="Otro">Otro</option>
            </select>
          </div>

          <div className="demo-checkbox">
            <input
              type="checkbox"
              id="whatsapp-optin"
              checked={form.whatsapp_optin}
              onChange={(e) => setForm({ ...form, whatsapp_optin: e.target.checked })}
            />
            <label htmlFor="whatsapp-optin">
              Acepto recibir mensajes por WhatsApp para agendar mi demo. Máximo 4 mensajes/mes.
            </label>
          </div>

          <button
            className="demo-submit"
            disabled={!canSubmit || submitting}
            onClick={handleSubmit}
          >
            {submitting ? "Enviando..." : "Agenda mi demo →"}
          </button>

          <div className="demo-legal">
            Al enviar aceptas nuestra política de privacidad.
            No compartimos tu información con terceros.
          </div>
        </>
      )}
    </div>
  );
}
