          "@type": "Question",

    <h1>FluxSales — el sistema operativo con IA para restaurantes</h1>
    <p>Más tráfico en Google, más ventas directas y más clientes que regresan. FluxSales reemplaza tu dependencia de las apps de delivery: sitio web con SEO local, pedidos directos sin comisión de marketplace, repartidores on-demand, lealtad y marketing automático — para que seas dueño de tus clientes, tus pedidos y tu crecimiento.</p>
    <p><a href="/demo">Agenda una demo</a> · <a href="/pricing">Ver precios</a></p>

    <h2>Qué incluye</h2>
    <ul>
      <li>Sitio web hecho con IA, optimizado para SEO local.</li>
      <li>Pedidos en línea directos, sin pagar ~30% de comisión a las apps.</li>
      <li>Repartidores on-demand (entrega en 30 min, $0 comisión de entrega).</li>
      <li>Lealtad, recompensas y marketing automático por WhatsApp, SMS y email.</li>
      <li>Mesero IA: toma pedidos por WhatsApp 24/7.</li>
      <li>Tú eres dueño de los datos de tus clientes — a diferencia de Rappi o Uber Eats.</li>
    </ul>

    <h2>Precios</h2>
    <ul>
      <li><strong>Flotilla — $1,499/mes</strong> + costo de envío. Entregas on-demand, $0 comisión de entrega.</li>
      <li><strong>Flexible — $2,499/mes</strong> + 5% comisión por orden. Plataforma completa con tu marca.</li>
      <li><strong>Sin comisiones — $5,499/mes</strong> (Más popular). Toda la plataforma, sin comisión por orden.</li>
      <li><strong>Flux Higher — $7,499/mes</strong>. Todo + Flotilla + Mesero IA + success manager.</li>
    </ul>
    <p><strong>Garantía de 60 días:</strong> si no recuperas tu inversión, seguimos trabajando contigo sin costo hasta que lo logres.</p>

    <h2>Preguntas frecuentes</h2>
    <h3>¿Cuánto tiempo toma implementar Fluxsales?</h3>
    <p>En promedio, 48 horas. Conectamos tu POS, WhatsApp Business y redes. Tú ves resultados en la primera semana.</p>

function App() {
  const [lang, setLang] = React.useState(() => {
    try { return localStorage.getItem("flux_lang") || "es"; } catch { return "es"; }
  });
  React.useEffect(() => {
    try { localStorage.setItem("flux_lang", lang); document.documentElement.lang = lang; } catch {}
  }, [lang]);

  return (
    <>
      <Nav lang={lang} setLang={setLang} />
      <Hero lang={lang} />
      <VenuesSlider lang={lang} />
      <Problem lang={lang} />
      <Features lang={lang} />
      <HowItWorks lang={lang} />
      <Metrics lang={lang} />

      <FAQ lang={lang} />
      <Founders lang={lang} />

}
