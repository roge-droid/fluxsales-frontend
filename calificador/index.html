.cx-scan{max-width:440px;margin:0 auto;padding:70px 20px}
.cx-scan h2{font-size:20px;margin-bottom:6px}
.cx-scan .cx-scan-sub{color:var(--muted);font-size:13.5px;margin-bottom:26px}

.cx-scan-item.cx-active{color:var(--ink);font-weight:500}

.cx-dial svg{transform:rotate(-90deg)}
.cx-dial-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}

.cx-grade-lbl{color:var(--muted);font-size:12.5px;margin-top:12px}
.cx-grade{font-family:'DM Sans';font-weight:700;font-size:22px;margin-top:2px}
.cx-subs{margin-top:22px;text-align:left}
.cx-sub-row{margin-bottom:15px}
.cx-sub-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;margin-bottom:5px}
.cx-sub-top b{font-weight:600}
.cx-sub-grade{font-size:12px;font-weight:700}
.cx-sub-pts{color:var(--muted);font-size:12px}
.cx-sub-bar{height:7px;background:var(--line);border-radius:99px;overflow:hidden}
.cx-sub-bar i{display:block;height:100%;border-radius:99px}
.cx-g-good{color:var(--good)}.cx-g-regular{color:var(--warn)}.cx-g-critico{color:var(--bad)}

.cx-biz{font-size:13px;color:var(--muted);margin:14px 0 0;padding-top:14px;border-top:1px solid var(--line)}

/* cards */
.cx-cardrow{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:640px){.cx-cardrow{grid-template-columns:1fr 1fr}}
.cx-panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow)}

.cx-issue{display:flex;gap:10px;padding:11px 0;border-top:1px solid var(--line)}

.cx-sec-title{font-family:'DM Sans';font-weight:700;font-size:15px;margin:6px 0 12px}

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

const MOCK = new URLSearchParams(location.search).get("mock") === "1";
const SESSION_ID = "grader-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
const FUNNEL_VERSION = "v2-calificador-scan";

function fireEvent(eventType, placeId) {
  fetch("/api/diagnostico/event", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ event_type: eventType, place_id: placeId || "", session_id: SESSION_ID, funnel: "grader", funnel_version: FUNNEL_VERSION }),
  }).catch(() => {});
}
function clarityStep(s) { if (window.clarity) window.clarity("set", "funnel_step", s); }
const MXN = (n) => "$" + Math.round(n).toLocaleString("es-MX");
const dialColor = (v) => v >= 75 ? "#16a34a" : v >= 60 ? "#65a30d" : v >= 40 ? "#d97706" : "#dc2626";

// 3 weighted areas (Owner-style: Search / Guest / Local). v2 returns them directly
// (40/40/20); v1 recombines its 6 dimensions (25/50/25) as a fallback.
function subScores(bd) {
  const g = (pts, max) => { const p = max ? pts / max : 0; return { pts, max, grade: p >= 0.75 ? "Bueno" : p >= 0.5 ? "Regular" : "Crítico", cls: p >= 0.75 ? "good" : p >= 0.5 ? "regular" : "critico", color: p >= 0.75 ? "#16a34a" : p >= 0.5 ? "#d97706" : "#dc2626", pct: Math.round(p * 100) }; };
  if (bd.presenciaBuscadores != null || bd.experienciaCliente != null || bd.perfilLocal != null) {
    return [
      { key: "Presencia en buscadores", ...g(bd.presenciaBuscadores || 0, 40) },
      { key: "Experiencia del cliente", ...g(bd.experienciaCliente || 0, 40) },
      { key: "Perfil local", ...g(bd.perfilLocal || 0, 20) },
    ];
  }
  return [
    { key: "Presencia y posición", ...g((bd.competencia || 0) + (bd.web || 0), 25) },
    { key: "Experiencia del cliente", ...g((bd.reputacion || 0) + (bd.resenas || 0), 50) },
    { key: "Perfil local", ...g((bd.perfil || 0) + (bd.canales || 0), 25) },
  ];
}

const MOCK_SCORE = {
  ok: true,
  version: "v2",
  business: { displayName: "Tacos Don Lupe", rating: 4.1, reviewCount: 48, photoCount: 3, websiteUri: "https://tacosdonlupe.mx", priceLevel: "PRICE_LEVEL_INEXPENSIVE", businessStatus: "OPERATIONAL", primaryTypeDisplayName: "Restaurante mexicano", googleMapsUri: "#" },

// ── Places autocomplete ──────────────────────────────────────────────────────
function usePlaces(active) {
  const libRef = useRef(null), tokenRef = useRef(null), debRef = useRef(null);
  const [suggestions, setSuggestions] = useState([]);
  useEffect(() => {
    if (!active || libRef.current || MOCK) return;
    let cancelled = false;
    (async () => { try { const lib = await google.maps.importLibrary("places"); if (!cancelled) libRef.current = lib; } catch (e) { console.error("[places] importLibrary failed:", e); } })();
    return () => { cancelled = true; };
  }, [active]);
  const suggest = (text) => {
    if (debRef.current) clearTimeout(debRef.current);
    debRef.current = setTimeout(() => {
      const q = (text || "").trim();
      if (MOCK) {
        if (q.length < 1) { setSuggestions([]); return; }
        const ql = q.toLowerCase();
        const hits = MOCK_SUGGEST.filter((s) => s.mainText.text.toLowerCase().includes(ql));
        setSuggestions(hits.length ? hits : MOCK_SUGGEST);
        return;
      }
      const lib = libRef.current;
      if (!lib || !lib.AutocompleteSuggestion || q.length < 2) { setSuggestions([]); return; }
      if (!tokenRef.current) tokenRef.current = new lib.AutocompleteSessionToken();
      const base = { input: q, sessionToken: tokenRef.current, includedRegionCodes: ["mx", "co", "cl", "pe"], language: "es", region: "mx" };
      const apply = ({ suggestions }) => setSuggestions((suggestions || []).map((s) => s.placePrediction).filter(Boolean).slice(0, 5));
      const AS = lib.AutocompleteSuggestion;
      AS.fetchAutocompleteSuggestions({ ...base, includedPrimaryTypes: ["establishment"] })
        .then(apply).catch(() => AS.fetchAutocompleteSuggestions(base).then(apply))
        .catch((e) => { console.error("[places] suggest error:", e); setSuggestions([]); });
    }, 220);
  };
  const resolve = async (pred) => {
    const fallback = (pred.text && pred.text.text) || (pred.mainText && pred.mainText.text) || "";
    try {
      const place = pred.toPlace();
      await place.fetchFields({ fields: ["displayName", "formattedAddress"] });
      const n = place.displayName ? (typeof place.displayName === "object" ? place.displayName.text : String(place.displayName)) : fallback;
      const a = place.formattedAddress ? (typeof place.formattedAddress === "object" ? place.formattedAddress.text : String(place.formattedAddress)) : "";
      tokenRef.current = null;
      return { name: n, placeId: place.id || pred.placeId || "", address: a };
    } catch (e) { console.error("[places] fetchFields error:", e); tokenRef.current = null; return { name: fallback, placeId: pred.placeId || "", address: "" }; }
  };
  return { suggestions, setSuggestions, suggest, resolve };
}

function Hero({ onSelect }) {

  const inputRef = useRef(null);
  useEffect(() => { fireEvent("diagnostic_started"); clarityStep("landing"); }, []);
  useEffect(() => { if (chat && inputRef.current) inputRef.current.focus(); }, [chat]);

  const openChat = (c) => { setChat(c); fireEvent("grader_chip_clicked"); clarityStep("chat_" + c.slug); };

  const pick = async (pred) => {
    places.setSuggestions([]);
    if (MOCK || !pred) {
      const name = (pred && pred.mainText && pred.mainText.text) || MOCK_SCORE.business.displayName;
      const address = (pred && pred.secondaryText && pred.secondaryText.text) || "CDMX";
      onSelect({ name, placeId: "mock", address });

    }
    const r = await places.resolve(pred);
    setVal(r.name);
    fetch("/api/diagnostico/partial-lead", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ company_name: r.name, place_id: r.placeId || undefined, place_address: r.address || undefined, session_id: SESSION_ID, funnel: "grader" }) }).catch(() => {});
    onSelect(r);
  };

  const searchBox = (
    <div className={"cx-ac" + (chat ? " cx-ac--up" : "")}>
      {places.suggestions.length > 0 && (
        <ul className="cx-suggest">
          {places.suggestions.map((p, i) => (
            <li key={p.placeId || i} role="option" aria-selected={i === active} onMouseDown={(e) => { e.preventDefault(); pick(p); }}>
              <div className="cx-sg-main">{(p.mainText && p.mainText.text) || (p.text && p.text.text)}</div>
              {p.secondaryText && <div className="cx-sg-sub">{p.secondaryText.text}</div>}
            </li>
          ))}
        </ul>
      )}
      <div className="cx-searchwrap">
        <input ref={inputRef} className="cx-input" placeholder="Busca tu restaurante" value={val} autoFocus
          onChange={(e) => { setVal(e.target.value); setActive(-1); places.suggest(e.target.value); }}
          onKeyDown={(e) => {
            if (!places.suggestions.length) { if (e.key === "Enter" && MOCK) pick(null); return; }
            if (e.key === "ArrowDown") { e.preventDefault(); setActive((i) => Math.min(i + 1, places.suggestions.length - 1)); }
            else if (e.key === "ArrowUp") { e.preventDefault(); setActive((i) => Math.max(i - 1, 0)); }
            else if (e.key === "Enter" && active >= 0) { e.preventDefault(); pick(places.suggestions[active]); }
            else if (e.key === "Escape") places.setSuggestions([]);
          }} />
        <button className="cx-go" onClick={() => { if (MOCK) pick(null); else if (active >= 0) pick(places.suggestions[active]); else if (places.suggestions[0]) pick(places.suggestions[0]); }}>↑</button>
      </div>
    </div>
  );

  if (chat) return (
    <div className="cx-hero cx-hero--chat">
      <div className="cx-chatlog">

        <div className="cx-msg cx-msg--bot"><span className="cx-avatar">F</span><div className="cx-bubble--bot">{chat.a}</div></div>
      </div>
      {searchBox}
    </div>
  );

  return (
    <div className="cx-hero">
      <h1>Escribe el nombre de tu restaurante<br/>y descubre tu Calificación Digital</h1>
      <p className="cx-sub">Analizamos tu presencia en Google en segundos y te decimos cómo te ganan tus competidores.</p>

            <span className="d" style={{ background: c.bg }}>{c.icon}</span>{c.label}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── Scan (runs immediately on selection, before any contact) ─────────────────
function Scan({ restaurantName }) {
  const STEPS = [
    restaurantName + " y sus competidores",
    "Tu perfil de Google",
    "Reseñas y calificación",
    "Fotos y datos de tu perfil",
    "Tu sitio web (SEO)",
    "Velocidad y experiencia móvil",
  ];
  const [active, setActive] = useState(0);
  const [pct, setPct] = useState(6);
  useEffect(() => {
    // The wait is VARIABLE: v1 resolves in ~3s; v2 waits on PageSpeed (up to ~12s).
    // The bar eases toward a 92% ceiling so it never sits at "96% · 2s restantes"
    // during a long tail; App jumps to the report when the score actually arrives.
    const t = setInterval(() => setActive((a) => Math.min(a + 1, STEPS.length - 1)), 1100);
    const p = setInterval(() => setPct((x) => Math.min(92, x + Math.max(0.7, (92 - x) * 0.06))), 300);
    return () => { clearInterval(t); clearInterval(p); };
  }, []);
  return (
    <div className="cx-scan">
      <h2>Analizando tu restaurante…</h2>
      <p className="cx-scan-sub">Analizamos tu perfil de Google y —con tu permiso— tu propio sitio web. Nunca rastreamos el sitio de otro restaurante.</p>
      {STEPS.map((s, i) => (
        <div key={i} className={"cx-scan-item" + (i < active ? " cx-done" : i === active ? " cx-active" : "")}>
          <span className="cx-chk">{i < active ? "✓" : i === active ? <span className="cx-mini" /> : ""}</span>
          <span>{s}</span>
        </div>
      ))}
      <div className="cx-scan-bar"><i style={{ width: pct + "%" }} /></div>
      <div className="cx-scan-eta">{pct >= 80 ? "Casi listo…" : `${Math.max(3, Math.round((92 - pct) / 4))} segundos restantes`}</div>
    </div>
  );
}

    fetch("/api/calendar/available-slots?ae=" + encodeURIComponent(ae) + "&days=14").then((r) => r.json())
      .then((d) => { if (d.ok && d.dates?.length) setDates(d.dates); else setErr("fallback"); }).catch(() => setErr("fallback")).finally(() => setLoading(false));
  }, [ae]);

            {serp.map((k, i) => (
              <div className="cx-comp" key={i}>
                <span className="cx-comp-name">{k.keyword}<br /><small style={{ color: "var(--muted)" }}>#1: {k.top1Name || "—"}</small></span>
                <span className="cx-comp-v">{k.mapRank ? `#${k.mapRank} mapa` : "Sin aparecer"} · {k.organicRank ? `#${k.organicRank} orgánico` : "—"}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </>
  );
}

// ── Report (score always visible; details gated behind Unlock) ───────────────
function Report({ score, restaurant, onLeadReady }) {
  const s = score, b = s.business, comp = s.competitors || {};
  const [unlocked, setUnlocked] = useState(false);
  const [intake, setIntake] = useState(null), [lead, setLead] = useState(null);
  const below = Math.max(0, (comp.count || 0) - (comp.betterThan || 0));
  const compList = comp.list || [];
  const topCompetitor = compList[0] && compList[0].name;

  const doUnlock = (form) => {
    const fullLead = { ...form, company_name: b.displayName || restaurant.name, place_id: restaurant.placeId, aeWhatsapp: "5214425975307" };
    setLead(fullLead); setUnlocked(true);
    fireEvent("contact_submitted", restaurant.placeId); clarityStep("report_unlocked");
    fireEvent("full_diagnostic_revealed", restaurant.placeId);
    if (typeof fbq === "function") fbq("track", "Lead", { content_name: "grader_landing" });
    if (MOCK) { setIntake({ ok: true, showCalendar: true, assignedAE: "Mariana", aeWhatsapp: "5214425975307" }); return; }
    fetch("/api/demo-page/lead-intake", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...form, company_name: fullLead.company_name, place_id: restaurant.placeId || undefined, place_address: restaurant.address || undefined, funnel: "grader", session_id: SESSION_ID }) })
      .then((r) => r.json()).then((ik) => { setIntake(ik); if (ik && ik.aeWhatsapp) fullLead.aeWhatsapp = ik.aeWhatsapp; })
      .catch(() => setIntake({ ok: true, showCalendar: false, aeWhatsapp: "5214425975307" }));
  };

  const lockCls = unlocked ? "" : " cx-locked";
  const shownIssues = unlocked ? s.issues : s.issues.slice(0, 1);

  return (
    <div className="cx-report">
      <div className="cx-report-grid">
        <ScorePanel score={s.score} business={b} />
        <div>
          <div className="cx-cardrow">
            <div className="cx-panel">
              <h3>Podrías estar perdiendo dinero</h3>
              <p className="cx-panel-lead">{s.revenueLoss ? `Por ${s.issues.length} problemas en tu presencia digital` : `${s.issues.length} problemas detectados en tu perfil`}</p>
              {s.revenueLoss && <div className="cx-loss-amt">{MXN(s.revenueLoss.lowMxn)} – {MXN(s.revenueLoss.highMxn)} <span style={{ fontSize: 14, color: "var(--muted)" }}>/mes*</span></div>}
              <div style={{ marginTop: 12 }} className={lockCls}>
                {shownIssues.map((it) => (
                  <div className="cx-issue" key={it.id}><span className={"cx-sev cx-sev-" + it.severity} /><div><b>{it.title}</b><p>{it.detail}</p></div></div>
                ))}
              </div>
              {s.revenueLoss && <div className="cx-loss-foot">*Estimado con datos de Google (tu diferencia de reseñas vs. tu zona + señales que faltan en tu perfil). Ver metodología abajo.</div>}
            </div>

            <div className="cx-panel">
              <h3>{below > 0 ? `${below} restaurante${below > 1 ? "s" : ""} de tu zona te gana${below > 1 ? "n" : ""}` : "Tú vs. tu zona"}</h3>
              <p className="cx-panel-lead">Comparado con los restaurantes mejor calificados cerca de ti.</p>
              <div className={lockCls}>
                <div className="cx-comp cx-you"><span className="cx-comp-rank">Tú</span><span className="cx-comp-name">{b.displayName}</span><span className="cx-comp-v">{b.rating != null ? b.rating.toFixed(1) + "★" : "—"} · {b.reviewCount ?? 0}</span></div>
                {(unlocked ? compList : compList.slice(0, 1)).map((c, i) => (
                  <div className="cx-comp" key={i}><span className="cx-comp-rank">{i + 1}</span><span className="cx-comp-name">{c.name}</span><span className="cx-comp-v">{c.rating != null ? c.rating.toFixed(1) + "★" : "—"} · {c.reviewCount ?? 0}</span></div>
                ))}
                {!compList.length && comp.avgReviews != null && <div className="cx-comp"><span className="cx-comp-rank">~</span><span className="cx-comp-name">Promedio de tu zona</span><span className="cx-comp-v">{comp.avgRating}★ · {comp.avgReviews}</span></div>}
              </div>
            </div>
          </div>

          <V2Cards s={s} lockCls={lockCls} />

          {!unlocked && <div style={{ marginTop: 18 }}><Unlock topCompetitor={topCompetitor} onUnlock={doUnlock} /></div>}

          {unlocked && intake && (
            <div className="cx-cta">
              {intake.showCalendar ? (<>
                <h3>Arreglemos esto juntos</h3>
                <p>Agenda una demo gratuita de 20 min. Te mostramos cómo subir tu Calificación y dejar de pagar comisiones.</p>
                <Calendar ae={intake.assignedAE || "Mariana"} lead={lead} />
              </>) : (<>
                <h3>Te preparamos un plan</h3>
                <p>Un especialista revisa tu caso y te escribe por WhatsApp con los primeros pasos.</p>
                <a className="cx-btn cx-btn--wa" style={{ display: "inline-block", width: "auto", padding: "13px 24px" }} href={"https://wa.me/" + (lead.aeWhatsapp || "5214425975307") + "?text=" + encodeURIComponent(`Hola, saqué mi Calificación Digital (${s.score.value}/100) para ${b.displayName || restaurant.name}`)} target="_blank" rel="noopener">Hablar por WhatsApp</a>
              </>)}
            </div>
          )}
          {unlocked && !intake && <p style={{ textAlign: "center", color: "var(--muted)", marginTop: 18 }}>Preparando tu plan…</p>}
        </div>
      </div>
      <Faq />
      <div className="cx-foot">FluxSales — el sistema operativo con IA para restaurantes · <a href="/">Conócenos</a></div>
    </div>
  );
}

function ManualClose({ restaurant, reason }) {
  const msg = reason === "not_restaurant" ? "No pudimos identificar tu restaurante en Google. Escríbenos y lo revisamos contigo." : "Tu perfil necesita una revisión manual. Un especialista lo analiza y te manda tu Calificación por WhatsApp.";
  return (
    <div className="cx-report">
      <div className="cx-panel" style={{ maxWidth: 480, margin: "40px auto", textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 8 }}>🔍</div>
        <h2 style={{ fontSize: 21, marginBottom: 8 }}>Necesitamos revisar tu caso</h2>
        <p style={{ color: "var(--muted)", fontSize: 14, marginBottom: 18 }}>{msg}</p>
        <a className="cx-btn cx-btn--wa" style={{ display: "inline-block", width: "auto", padding: "13px 24px" }} href={"https://wa.me/5214425975307?text=" + encodeURIComponent(`Hola, quiero mi Calificación Digital para ${restaurant.name}`)} target="_blank" rel="noopener">Escribir por WhatsApp</a>
      </div>
      <Faq />
    </div>
  );
}

function Faq() {
  return (
    <div className="cx-faq">
      <details><summary>¿Cómo se calcula la Calificación Digital?</summary><p>Usamos los datos públicos de tu perfil de Google (calificación, reseñas, fotos, horarios, teléfono, canales de pedido) y, con tu permiso, analizamos tu propio sitio web: velocidad y experiencia móvil con la API oficial de Google PageSpeed, y su SEO en la página. Comparamos con el promedio público de restaurantes cercanos. Nunca rastreamos ni calificamos el sitio web de otro restaurante. La calificación va de 0 a 100 sobre tres áreas: presencia en buscadores, experiencia del cliente y perfil local.</p></details>
      <details><summary>¿El dinero perdido es exacto?</summary><p>Es un estimado, no una promesa. Lo calculamos a partir de tu diferencia de reseñas vs. tu zona (asumiendo ~1 reseña pública por cada ~30 pedidos, en ~24 meses) y de las señales que faltan en tu perfil. Siempre se muestra como un rango.</p></details>
      <details><summary>¿Qué hacen con mis datos?</summary><p>Usamos tu nombre, WhatsApp y correo para enviarte tu análisis y coordinar una demo si calificas. No los vendemos. Consulta el <a href="/privacy" target="_blank" rel="noopener">aviso de privacidad</a>.</p></details>
    </div>
  );
}

// ── App: hero → scan (score runs now) → report(teaser→unlock→full) ───────────
function App() {
  const [step, setStep] = useState("hero");  // hero | scan | report | manual
  const [restaurant, setRestaurant] = useState(null);
  const [score, setScore] = useState(null);
  const [manualReason, setManualReason] = useState(null);
  useEffect(() => { window.scrollTo(0, 0); }, [step]);

  const onSelect = (r) => {
    setRestaurant(r); setStep("scan");
    if (MOCK) MOCK_SCORE.business.displayName = r.name;  // demo report reflects the picked restaurant
    const started = Date.now();
    const scorePromise = MOCK ? Promise.resolve(MOCK_SCORE)
      : fetch("/api/grader/score", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ place_id: r.placeId, session_id: SESSION_ID, funnel_version: FUNNEL_VERSION, zone: ((r.address || "").split(",").slice(1).join(",").trim() || (r.address || "")) }) }).then((res) => res.json()).catch(() => ({ ok: false, reason: "error" }));
    // Enrich competitor names for the report card (names come from /nearby, not /score).
    const nearbyPromise = MOCK ? Promise.resolve(null)
      : fetch("/api/diagnostico/nearby?place_id=" + encodeURIComponent(r.placeId)).then((res) => res.ok ? res.json() : null).catch(() => null);
    Promise.all([scorePromise, nearbyPromise]).then(([sc, nb]) => {
      const wait = Math.max(0, 4200 - (Date.now() - started));
      setTimeout(() => {
        if (sc && sc.ok) {
          if (nb && nb.competitors) sc.competitors = { ...sc.competitors, list: nb.competitors.filter((c) => c.placeId) };
          setScore(sc); clarityStep("report"); setStep("report");
        } else { setManualReason(sc && sc.reason); setStep("manual"); }
      }, wait);
    });
  };

  return (
    <div>
      <div className="cx-nav"><span className="cx-logo">Flux<span>Sales</span></span><a className="cx-login" href="/">Iniciar sesión</a></div>
      {step === "hero" && <Hero onSelect={onSelect} />}
      {step === "scan" && <Scan restaurantName={restaurant.name} />}
      {step === "report" && score && <Report score={score} restaurant={restaurant} />}
      {step === "manual" && <ManualClose restaurant={restaurant} reason={manualReason} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
