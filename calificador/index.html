<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

const MOCK = new URLSearchParams(location.search).get("mock") === "1";
const SESSION_ID = "grader-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
const FUNNEL_VERSION = "v1-calificador";

// ── analytics ────────────────────────────────────────────────────────────────
function fireEvent(eventType, placeId) {
  fetch("/api/diagnostico/event", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ event_type: eventType, place_id: placeId || "", session_id: SESSION_ID, funnel: "grader", funnel_version: FUNNEL_VERSION }),
  }).catch(() => {});
}
function clarityStep(step) { if (window.clarity) window.clarity("set", "funnel_step", step); }

const MXN = (n) => "$" + Math.round(n).toLocaleString("es-MX") + " MXN";
const badgeClass = (label) => "cx-b-" + { "Crítico": "critico", "Bajo": "bajo", "Regular": "regular", "Bueno": "bueno", "Excelente": "excelente" }[label];
const dialColor = (v) => v >= 75 ? "#16a34a" : v >= 60 ? "#65a30d" : v >= 40 ? "#d97706" : "#dc2626";

const MOCK_SCORE = {
  ok: true,
  business: { displayName: "Tacos Don Lupe", rating: 4.1, reviewCount: 48, photoCount: 3, websiteUri: null, priceLevel: "PRICE_LEVEL_INEXPENSIVE", businessStatus: "OPERATIONAL", primaryTypeDisplayName: "Restaurante mexicano", googleMapsUri: "#" },
  score: { value: 46, label: "Bajo", breakdown: { reputacion: 14, resenas: 8, competencia: 3, web: 0, perfil: 8, canales: 5 } },
  issues: [
    { id: "sin_sitio_web", severity: "alta", title: "No tienes un sitio web propio", detail: "Tus clientes te encuentran en Google pero no tienen dónde pedirte directo. Cada pedido se va por una app que te cobra 25-30% de comisión." },
    { id: "pocas_resenas_vs_zona", severity: "alta", title: "Tienes menos reseñas que tu competencia", detail: "Tienes 48 reseñas; los restaurantes de tu zona promedian 180. Más reseñas = más visibilidad." },
    { id: "pocas_fotos", severity: "media", title: "Tu perfil tiene pocas fotos", detail: "Los perfiles con 5+ fotos reciben muchas más visitas." },
    { id: "delivery_no_confirmado", severity: "media", title: "No tienes entrega a domicilio confirmada", detail: "Según tu perfil de Google no aparece delivery." },
  ],
  competitors: { count: 3, avgRating: 4.4, avgReviews: 180, betterThan: 0 },
  revenueLoss: { lowMxn: 8000, highMxn: 19000 },
};

// ── Places autocomplete hook (ported from /diagnostico) ──────────────────────
function usePlaces(active) {
  const libRef = useRef(null), tokenRef = useRef(null), debRef = useRef(null);
  const [suggestions, setSuggestions] = useState([]);
  useEffect(() => {
    if (!active || libRef.current || MOCK) return;
    let cancelled = false;
    (async () => {
      try { const lib = await google.maps.importLibrary("places"); if (!cancelled) libRef.current = lib; }
      catch (e) { console.error("[places] importLibrary failed:", e); }
    })();
    return () => { cancelled = true; };
  }, [active]);
  const suggest = (text, cb) => {
    if (debRef.current) clearTimeout(debRef.current);
    debRef.current = setTimeout(() => {
      const lib = libRef.current, q = (text || "").trim();
      if (!lib || !lib.AutocompleteSuggestion || q.length < 2) { setSuggestions([]); return; }
      if (!tokenRef.current) tokenRef.current = new lib.AutocompleteSessionToken();
      const base = { input: q, sessionToken: tokenRef.current, includedRegionCodes: ["mx", "co", "cl", "pe"], language: "es", region: "mx" };
      const apply = ({ suggestions }) => setSuggestions((suggestions || []).map((s) => s.placePrediction).filter(Boolean).slice(0, 5));
      const AS = lib.AutocompleteSuggestion;
      AS.fetchAutocompleteSuggestions({ ...base, includedPrimaryTypes: ["establishment"] })
        .then(apply).catch(() => AS.fetchAutocompleteSuggestions(base).then(apply))
        .catch((e) => { console.error("[places] suggest error:", e); setSuggestions([]); });
    }, 220);
  };
  const resolve = async (pred) => {
    const fallback = (pred.text && pred.text.text) || (pred.mainText && pred.mainText.text) || "";
    try {
      const place = pred.toPlace();
      await place.fetchFields({ fields: ["displayName", "formattedAddress"] });
      const n = place.displayName ? (typeof place.displayName === "object" ? place.displayName.text : String(place.displayName)) : fallback;
      const a = place.formattedAddress ? (typeof place.formattedAddress === "object" ? place.formattedAddress.text : String(place.formattedAddress)) : "";
      tokenRef.current = null;
      return { name: n, placeId: place.id || pred.placeId || "", address: a };
    } catch (e) {
      console.error("[places] fetchFields error:", e);
      tokenRef.current = null;
      return { name: fallback, placeId: pred.placeId || "", address: "" };
    }
  };
  return { suggestions, setSuggestions, suggest, resolve };
}

// ── Hero: restaurant name first ──────────────────────────────────────────────
function Hero({ onSelect }) {
  const places = usePlaces(true);
  const [val, setVal] = useState("");
  const [active, setActive] = useState(-1);
  useEffect(() => { fireEvent("diagnostic_started"); clarityStep("landing"); }, []);

  const pick = async (pred) => {
    places.setSuggestions([]);
    if (MOCK) { onSelect({ name: MOCK_SCORE.business.displayName, placeId: "mock", address: "CDMX" }); return; }
    const r = await places.resolve(pred);
    setVal(r.name);
    // Fire-and-forget partial capture on selection (contactless retargeting record).
    fetch("/api/diagnostico/partial-lead", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ company_name: r.name, place_id: r.placeId || undefined, place_address: r.address || undefined, session_id: SESSION_ID, funnel: "grader" }),
    }).catch(() => {});
    onSelect(r);
  };

  return (
    <div className="cx-hero">
      <div className="cx-card">
        <h1>¿Cuánto dinero deja tu restaurante en Google?</h1>
        <p className="cx-sub">Escribe el nombre de tu restaurante y obtén tu Calificación Digital en segundos. Gratis.</p>
        <div className="cx-ac">
          <input className="cx-input" placeholder="Ej. Tacos Don Lupe" value={val} autoFocus
            onChange={(e) => { setVal(e.target.value); setActive(-1); places.suggest(e.target.value); }}
            onKeyDown={(e) => {
              if (!places.suggestions.length) { if (e.key === "Enter" && MOCK) pick(null); return; }
              if (e.key === "ArrowDown") { e.preventDefault(); setActive((i) => Math.min(i + 1, places.suggestions.length - 1)); }
              else if (e.key === "ArrowUp") { e.preventDefault(); setActive((i) => Math.max(i - 1, 0)); }
              else if (e.key === "Enter" && active >= 0) { e.preventDefault(); pick(places.suggestions[active]); }
              else if (e.key === "Escape") places.setSuggestions([]);
            }} />
          {places.suggestions.length > 0 && (
            <ul className="cx-suggest">
              {places.suggestions.map((p, i) => (
                <li key={p.placeId || i} role="option" aria-selected={i === active} onMouseDown={(e) => { e.preventDefault(); pick(p); }}>
                  <div className="cx-sg-main">{(p.mainText && p.mainText.text) || (p.text && p.text.text)}</div>
                  {p.secondaryText && <div className="cx-sg-sub">{p.secondaryText.text}</div>}
                </li>
              ))}
            </ul>
          )}
        </div>
        {MOCK && <button className="cx-btn" style={{ marginTop: 14 }} onClick={() => pick(null)}>Ver ejemplo (modo demo)</button>}
      </div>
      <div className="cx-cards">
        <div className="cx-benefit"><div className="cx-ic">🔎</div><div><b>Tu posición en Google</b><p>Qué tan visible eres cuando un cliente busca dónde comer cerca.</p></div></div>
        <div className="cx-benefit"><div className="cx-ic">🩺</div><div><b>Los problemas de tu perfil</b><p>Fotos, reseñas, sitio web y horarios que te están costando pedidos.</p></div></div>
        <div className="cx-benefit"><div className="cx-ic">📊</div><div><b>Comparación con tu zona</b><p>Cómo te ves frente a los restaurantes que compiten contigo.</p></div></div>
      </div>
      <p className="cx-trust">Con datos reales de Google · Sin tarjeta · Sin compromiso</p>
    </div>
  );
}

// ── Quiz: 4 steps (Owner-style) ──────────────────────────────────────────────
const ROLES = [["dueno", "Soy dueño(a)"], ["gerente", "Soy gerente"], ["marketing", "Marketing"], ["otro", "Otro"]];
const SUCS = [["1", "1 sucursal"], ["2-5", "2 a 5"], ["6-20", "6 a 20"], ["20+", "Más de 20"]];
const SOURCES = [["instagram", "Instagram"], ["google", "Google"], ["recomendacion", "Recomendación"], ["otro", "Otro"]];

function Quiz({ restaurant, onDone }) {
  const [i, setI] = useState(0);
  const [plataformas, setPlataformas] = useState("");
  const [sucursales, setSucursales] = useState("");
  const [firstName, setFirstName] = useState("");
  const [lastName, setLastName] = useState("");
  const [phone, setPhone] = useState("");
  const [email, setEmail] = useState("");
  const [source, setSource] = useState("");
  const [err, setErr] = useState(null);
  const total = 4;

  const next = () => { setErr(null); setI((x) => x + 1); };
  const submit = () => {
    if (!firstName.trim()) return setErr("Escribe tu nombre.");
    if (!phone.trim() || phone.replace(/\D/g, "").length < 10) return setErr("Escribe un WhatsApp válido (10 dígitos).");
    if (!email.trim() || !/.+@.+\..+/.test(email)) return setErr("Escribe un correo válido.");
    setErr(null);
    fireEvent("contact_submitted", restaurant.placeId);
    clarityStep("contact_submitted");
    onDone({ plataformas, sucursales, first_name: firstName.trim(), last_name: lastName.trim(), phone: phone.trim(), email: email.trim(), source });
  };

  return (
    <div className="cx-card cx-q">
      <div className="cx-progress"><i style={{ width: ((i + 1) / total) * 100 + "%" }} /></div>
      <div className="cx-step-label">Paso {i + 1} de {total}</div>
      <div className="cx-restaurant-chip"><span>📍</span><span>{restaurant.name}</span></div>

      {i === 0 && (<>
        <h2>¿Cuál es tu rol en el restaurante?</h2>
        <div className="cx-opts">{ROLES.map(([v, l]) => (
          <button key={v} className={"cx-opt" + (plataformas === v ? " cx-on" : "")} onClick={() => { setPlataformas(v); setI(1); }}>{l}</button>
        ))}</div>
      </>)}

      {i === 1 && (<>
        <h2>¿Cuántas sucursales tienes?</h2>
        <div className="cx-opts">{SUCS.map(([v, l]) => (
          <button key={v} className={"cx-opt" + (sucursales === v ? " cx-on" : "")} onClick={() => { setSucursales(v); setI(2); }}>{l}</button>
        ))}</div>
        <button className="cx-back" onClick={() => setI(0)}>← Atrás</button>
      </>)}

      {i === 2 && (<>
        <h2>¿A dónde te enviamos tu Calificación?</h2>
        <div className="cx-field"><label>Nombre</label><input className="cx-input" value={firstName} onChange={(e) => setFirstName(e.target.value)} placeholder="Tu nombre" autoFocus /></div>
        <div className="cx-field"><label>WhatsApp</label><input className="cx-input" value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="10 dígitos" inputMode="tel" /></div>
        <div className="cx-field"><label>Correo</label><input className="cx-input" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="tucorreo@ejemplo.com" inputMode="email" /></div>
        {err && <div className="cx-err">{err}</div>}
        <button className="cx-btn" onClick={() => { if (!firstName.trim()) return setErr("Escribe tu nombre."); if (!phone.trim() || phone.replace(/\D/g, "").length < 10) return setErr("Escribe un WhatsApp válido."); if (!email.trim() || !/.+@.+\..+/.test(email)) return setErr("Escribe un correo válido."); next(); }}>Continuar →</button>
        <button className="cx-back" onClick={() => setI(1)}>← Atrás</button>
        <p className="cx-legal">Al continuar aceptas recibir tu análisis por WhatsApp y correo. Consulta nuestro <a href="/privacy" target="_blank" rel="noopener">aviso de privacidad</a>.</p>
      </>)}

      {i === 3 && (<>
        <h2>Última pregunta: ¿cómo nos encontraste?</h2>
        <div className="cx-opts">{SOURCES.map(([v, l]) => (
          <button key={v} className={"cx-opt" + (source === v ? " cx-on" : "")} onClick={() => setSource(v)}>{l}</button>
        ))}</div>
        {err && <div className="cx-err">{err}</div>}
        <button className="cx-btn" onClick={submit}>Ver mi Calificación →</button>
        <button className="cx-back" onClick={() => setI(2)}>← Atrás</button>
      </>)}
    </div>
  );
}

// ── Scan animation while lead-intake + score resolve ─────────────────────────
const SCAN_STEPS = ["Analizando tu perfil de Google…", "Contando tus reseñas y fotos…", "Comparando con restaurantes de tu zona…", "Calculando tu Calificación Digital…"];
function Scan() {
  const [active, setActive] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setActive((a) => Math.min(a + 1, SCAN_STEPS.length - 1)), 900);
    return () => clearInterval(t);
  }, []);
  return (
    <div className="cx-card cx-scan">
      <div className="cx-spinner" />
      <h2>Generando tu Calificación…</h2>
      {SCAN_STEPS.map((s, i) => (
        <div key={i} className={"cx-scan-item" + (i <= active ? " cx-active" : "") + (i < active ? " cx-done" : "")}>
          <span className="cx-chk">{i < active ? "✓" : ""}</span><span>{s}</span>
        </div>
      ))}
    </div>
  );
}

// ── Score dial ───────────────────────────────────────────────────────────────
function Dial({ value, label }) {
  const R = 62, C = 2 * Math.PI * R, off = C * (1 - value / 100), col = dialColor(value);
  return (
    <div className="cx-dial">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r={R} fill="none" stroke="#e2e8f0" strokeWidth="12" />
        <circle cx="80" cy="80" r={R} fill="none" stroke={col} strokeWidth="12" strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={off} style={{ transition: "stroke-dashoffset 1s ease" }} />
      </svg>
      <div style={{ marginTop: -108, marginBottom: 58 }}>
        <span className="cx-dial-val" style={{ color: col }}>{value}</span><span className="cx-dial-max">/100</span>
      </div>
      <div className={"cx-badge " + badgeClass(label)}>{label}</div>
    </div>
  );
}

// ── Calendar (ported shape from /diagnostico) ────────────────────────────────
function Calendar({ ae, lead }) {
  const [dates, setDates] = useState([]);
  const [loading, setLoading] = useState(true);
  const [di, setDi] = useState(0), [slot, setSlot] = useState(null);
  const [booking, setBooking] = useState(false), [booked, setBooked] = useState(null), [err, setErr] = useState(null);
  useEffect(() => {
    fireEvent("calendar_shown", ""); clarityStep("calendar_shown");
    if (MOCK) { setDates([{ dateLabel: "Hoy", slots: [{ start: "1", end: "2", timeLabel: "10:00" }, { start: "3", end: "4", timeLabel: "12:30" }] }]); setLoading(false); return; }
    fetch("/api/calendar/available-slots?ae=" + encodeURIComponent(ae) + "&days=14")
      .then((r) => r.json()).then((d) => { if (d.ok && d.dates?.length) setDates(d.dates); else setErr("fallback"); })
      .catch(() => setErr("fallback")).finally(() => setLoading(false));
  }, [ae]);

  const book = async () => {
    if (!slot) return;
    setBooking(true); setErr(null);
    if (MOCK) { setBooked({ startFormatted: "Hoy 10:00", meetLink: "#" }); setBooking(false); return; }
    try {
      const res = await fetch("/api/calendar/book-demo", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ae, start: slot.start, end: slot.end, first_name: lead.first_name, last_name: lead.last_name, email: lead.email, phone: lead.phone, company_name: lead.company_name, session_id: SESSION_ID, funnel: "grader", place_id: lead.place_id || undefined }),
      });
      const result = await res.json();
      if (!res.ok) { setErr(result.error || "No pudimos agendar."); return; }
      setBooked(result); fireEvent("demo_booked", lead.place_id || ""); clarityStep("demo_booked");
      if (typeof fbq === "function" && result.eventId) fbq("track", "Schedule", { content_name: "grader_booking", value: 0, currency: "MXN" }, { eventID: "schedule_" + result.eventId });
    } catch { setErr("No pudimos agendar. Intenta de nuevo."); } finally { setBooking(false); }
  };

  if (booked) return (
    <div className="cx-booked">
      <div className="cx-check">✓</div>
      <h3>Demo agendada, {lead.first_name}</h3>
      <p style={{ color: "var(--muted)", fontSize: 14 }}>{booked.startFormatted}</p>
      {booked.meetLink && <a href={booked.meetLink} target="_blank" rel="noopener" className="cx-btn" style={{ display: "inline-block", width: "auto", padding: "12px 22px", marginTop: 8 }}>Abrir Google Meet →</a>}
    </div>
  );
  if (loading) return <p style={{ textAlign: "center", color: "var(--muted)" }}>Cargando horarios…</p>;
  if (err === "fallback") return (
    <div style={{ textAlign: "center" }}>
      <p style={{ color: "var(--muted)", fontSize: 14 }}>Escríbenos por WhatsApp y te agendamos al instante.</p>
      <a className="cx-btn cx-btn--wa" style={{ display: "inline-block", width: "auto", padding: "13px 22px" }} href={"https://wa.me/5214425975307?text=" + encodeURIComponent("Hola, quiero agendar una demo (Calificación Digital)")} target="_blank" rel="noopener">Agendar por WhatsApp</a>
    </div>
  );
  const day = dates[di] || { slots: [] };
  return (
    <div>
      <div className="cx-cal-dates">
        {dates.map((d, i) => <button key={i} className={"cx-cal-date" + (i === di ? " cx-on" : "")} onClick={() => { setDi(i); setSlot(null); }}>{d.dateLabel}</button>)}
      </div>
      <div className="cx-cal-slots">
        {day.slots.map((s, i) => <button key={i} className={"cx-slot" + (slot === s ? " cx-on" : "")} onClick={() => setSlot(s)}>{s.timeLabel}</button>)}
      </div>
      {err && <div className="cx-err">{err}</div>}
      <button className="cx-btn" style={{ marginTop: 16 }} disabled={!slot || booking} onClick={book}>{booking ? "Agendando…" : "Confirmar demo gratuita"}</button>
    </div>
  );
}

// ── Report ───────────────────────────────────────────────────────────────────
function Report({ score, intake, lead }) {
  const s = score, b = s.business, comp = s.competitors || {};
  const ownReviews = b.reviewCount || 0;
  return (
    <div>
      <div className="cx-card">
        <Dial value={s.score.value} label={s.score.label} />
        <p className="cx-biz">{b.displayName || lead.company_name}{b.rating != null ? ` · ${b.rating.toFixed(1)}★ · ${b.reviewCount ?? 0} reseñas` : ""}</p>

        {s.revenueLoss && (
          <div className="cx-loss">
            <div className="cx-loss-lbl">Dinero que podrías estar dejando en la mesa</div>
            <div className="cx-loss-amt">{MXN(s.revenueLoss.lowMxn)} – {MXN(s.revenueLoss.highMxn)}<span style={{ fontSize: 14 }}>/mes*</span></div>
            <small>*Estimado con base en tu diferencia de reseñas vs. tu zona y las señales que faltan en tu perfil. Ver metodología abajo.</small>
          </div>
        )}

        <div className="cx-sec-title">Lo que encontramos ({s.issues.length})</div>
        {s.issues.map((it) => (
          <div className="cx-issue" key={it.id}>
            <span className={"cx-sev cx-sev-" + it.severity} />
            <div><b>{it.title}</b><p>{it.detail}</p></div>
          </div>
        ))}

        {comp.count > 0 && comp.avgRating != null && (<>
          <div className="cx-sec-title">Tú vs. tu zona</div>
          <div className="cx-comp">
            <span className="cx-comp-name">Tú</span>
            <span className="cx-bar"><i style={{ width: Math.min(100, (ownReviews / Math.max(ownReviews, comp.avgReviews)) * 100) + "%", background: dialColor(s.score.value) }} /></span>
            <span className="cx-comp-v">{ownReviews} reseñas</span>
          </div>
          <div className="cx-comp">
            <span className="cx-comp-name">Tu zona (prom.)</span>
            <span className="cx-bar"><i style={{ width: "100%", background: "#94a3b8" }} /></span>
            <span className="cx-comp-v">{comp.avgReviews} reseñas</span>
          </div>
          <p style={{ fontSize: 12, color: "var(--muted)", marginTop: 4 }}>{comp.betterThan > 0 ? `Superas a ${comp.betterThan} de ${comp.count} competidores cercanos en calificación.` : `${comp.count} restaurantes cerca de ti te superan en calificación.`}</p>
        </>)}
      </div>

      <div className="cx-cta">
        {intake.showCalendar ? (<>
          <h3>Arreglemos esto juntos</h3>
          <p>Agenda una demo gratuita de 20 min. Te mostramos cómo subir tu Calificación y dejar de pagar comisiones.</p>
          <Calendar ae={intake.assignedAE || "Mariana"} lead={lead} />
        </>) : (<>
          <h3>Te preparamos un plan</h3>
          <p>Un especialista revisa tu caso y te escribe por WhatsApp con los primeros pasos para subir tu Calificación.</p>
          <a className="cx-btn cx-btn--wa" style={{ display: "inline-block", width: "auto", padding: "13px 24px" }}
            href={"https://wa.me/" + (intake.aeWhatsapp || "5214425975307") + "?text=" + encodeURIComponent(`Hola, acabo de sacar mi Calificación Digital (${s.score.value}/100) para ${b.displayName || lead.company_name}`)}
            target="_blank" rel="noopener">Hablar por WhatsApp</a>
        </>)}
      </div>

      <Faq />
      <div className="cx-foot">FluxSales — el sistema operativo con IA para restaurantes · <a href="/">Conócenos</a></div>
    </div>
  );
}

// ── Manual-review close (unscoreable / not found / error) ────────────────────
function ManualClose({ lead, reason }) {
  const msg = reason === "not_restaurant"
    ? "No pudimos identificar tu restaurante en Google. Escríbenos y lo revisamos contigo."
    : "Tu perfil necesita una revisión manual. Un especialista lo analiza y te manda tu Calificación por WhatsApp.";
  return (
    <div className="cx-card" style={{ textAlign: "center" }}>
      <div style={{ fontSize: 40, marginBottom: 8 }}>🔍</div>
      <h2 style={{ fontSize: 20, marginBottom: 8 }}>Necesitamos revisar tu caso</h2>
      <p style={{ color: "var(--muted)", fontSize: 14, marginBottom: 18 }}>{msg}</p>
      <a className="cx-btn cx-btn--wa" style={{ display: "inline-block", width: "auto", padding: "13px 24px" }}
        href={"https://wa.me/" + (lead.aeWhatsapp || "5214425975307") + "?text=" + encodeURIComponent(`Hola, quiero mi Calificación Digital para ${lead.company_name}`)}
        target="_blank" rel="noopener">Escribir por WhatsApp</a>
      <Faq />
    </div>
  );
}

function Faq() {
  return (
    <div className="cx-faq">
      <details><summary>¿Cómo se calcula la Calificación Digital?</summary><p>Usamos solo los datos públicos de tu propio perfil de Google (calificación, reseñas, fotos, horarios, teléfono, sitio web y canales de pedido) y los comparamos con el promedio de restaurantes cercanos. No entramos ni rastreamos ningún sitio web. La calificación va de 0 a 100 sobre seis dimensiones.</p></details>
      <details><summary>¿El dinero perdido es exacto?</summary><p>Es un estimado, no una promesa. Lo calculamos a partir de tu diferencia de reseñas vs. tu zona (asumiendo ~1 reseña pública por cada ~30 pedidos, en ~24 meses) y de las señales que faltan en tu perfil. Siempre se muestra como un rango.</p></details>
      <details><summary>¿Qué hacen con mis datos?</summary><p>Usamos tu nombre, WhatsApp y correo para enviarte tu análisis y coordinar una demo si calificas. No los vendemos. Consulta el <a href="/privacy" target="_blank" rel="noopener">aviso de privacidad</a>.</p></details>
    </div>
  );
}

// ── App orchestrator ─────────────────────────────────────────────────────────
function App() {
  const [step, setStep] = useState("hero");   // hero | quiz | scan | report | manual
  const [restaurant, setRestaurant] = useState(null);
  const [score, setScore] = useState(null);
  const [intake, setIntake] = useState(null);
  const [lead, setLead] = useState(null);
  const [manualReason, setManualReason] = useState(null);

  useEffect(() => { window.scrollTo(0, 0); }, [step]);

  const onQuizDone = (form) => {
    const fullLead = { ...form, company_name: restaurant.name, place_id: restaurant.placeId, aeWhatsapp: "5214425975307" };
    setLead(fullLead);
    setStep("scan");

    const started = Date.now();
    const scorePromise = MOCK
      ? Promise.resolve(MOCK_SCORE)
      : fetch("/api/grader/score", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ place_id: restaurant.placeId, session_id: SESSION_ID, funnel_version: FUNNEL_VERSION }) }).then((r) => r.json()).catch(() => ({ ok: false, reason: "error" }));

    const intakePromise = MOCK
      ? Promise.resolve({ ok: true, showCalendar: true, assignedAE: "Mariana", aeWhatsapp: "5214425975307", enrichment: {} })
      : fetch("/api/demo-page/lead-intake", { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ...form, company_name: restaurant.name, place_id: restaurant.placeId || undefined, place_address: restaurant.address || undefined, funnel: "grader", session_id: SESSION_ID }) })
          .then((r) => r.json()).catch(() => ({ ok: true, showCalendar: false, aeWhatsapp: "5214425975307" }));

    Promise.all([scorePromise, intakePromise]).then(([sc, ik]) => {
      const wait = Math.max(0, 3600 - (Date.now() - started));   // let the scan breathe
      setTimeout(() => {
        setIntake(ik);
        if (ik && ik.aeWhatsapp) fullLead.aeWhatsapp = ik.aeWhatsapp;
        if (sc && sc.ok) {
          setScore({ ...sc, placeId: restaurant.placeId });
          fireEvent("full_diagnostic_revealed", restaurant.placeId);
          clarityStep("report");
          if (typeof fbq === "function") fbq("track", "Lead", { content_name: "grader_landing" });
          setStep("report");
        } else {
          setManualReason(sc && sc.reason);
          setStep("manual");
        }
      }, wait);
    });
  };

  return (
    <div className="cx-wrap">
      <div className="cx-top"><span className="cx-logo">Flux<span>Sales</span></span></div>
      {step === "hero" && <Hero onSelect={(r) => { setRestaurant(r); setStep("quiz"); }} />}
      {step === "quiz" && <Quiz restaurant={restaurant} onDone={onQuizDone} />}
      {step === "scan" && <Scan />}
      {step === "report" && score && <Report score={score} intake={intake} lead={lead} />}
      {step === "manual" && <ManualClose lead={lead} reason={manualReason} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
