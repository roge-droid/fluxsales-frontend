<style>
:root{
  --ink:#0f172a; --muted:#64748b; --line:#e6e3dc; --bg:#faf8f4; --panel:#fff;
  --brand:#166534; --brand-d:#14532d; --accent:#c2410c;
  --good:#16a34a; --warn:#d97706; --bad:#dc2626;
  --shadow:0 10px 40px rgba(15,23,42,.07);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;line-height:1.5}
h1,h2,h3{font-family:'DM Sans',sans-serif;margin:0}
a{color:inherit}
.cx-nav{display:flex;align-items:center;justify-content:space-between;max-width:1080px;margin:0 auto;padding:16px 20px}
.cx-logo{font-family:'DM Sans';font-weight:700;font-size:20px;letter-spacing:-.02em}
.cx-logo span{color:var(--brand)}
.cx-login{font-size:14px;color:var(--muted);border:1px solid var(--line);border-radius:10px;padding:8px 16px;text-decoration:none}
.cx-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:24px 20px;box-shadow:var(--shadow)}
.cx-btn{width:100%;font-family:'DM Sans';font-weight:700;font-size:16px;color:#fff;background:var(--brand);
  border:none;border-radius:14px;padding:15px;cursor:pointer;transition:background .15s;margin-top:6px}
.cx-btn:hover{background:var(--brand-d)}
.cx-btn:disabled{opacity:.55;cursor:default}
.cx-btn--wa{background:#25d366}.cx-btn--wa:hover{background:#1eb858}
.cx-err{color:var(--bad);font-size:13px;margin:10px 0 0;text-align:center}
.cx-legal{font-size:11px;color:#94a3b8;text-align:center;margin-top:12px;line-height:1.4}
.cx-legal a{color:#94a3b8;text-decoration:underline}
.cx-input{width:100%;font-size:16px;padding:14px 15px;border:1.5px solid var(--line);border-radius:13px;
  outline:none;font-family:inherit;background:#fff;transition:border-color .15s}
.cx-input:focus{border-color:var(--brand)}

/* hero */
.cx-hero{max-width:640px;margin:0 auto;padding:56px 20px 60px;text-align:center}
.cx-hero h1{font-size:34px;line-height:1.12;letter-spacing:-.02em;margin-bottom:12px}
.cx-hero .cx-sub{color:var(--muted);font-size:16px;margin-bottom:26px}
.cx-ac{position:relative;text-align:left}
.cx-ac .cx-searchwrap{position:relative}
.cx-ac .cx-input{padding:17px 52px 17px 17px;font-size:17px;border-radius:16px;box-shadow:var(--shadow)}
.cx-ac .cx-go{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:38px;height:38px;border:none;
  border-radius:50%;background:var(--brand);color:#fff;font-size:17px;cursor:pointer}
.cx-suggest{position:absolute;top:calc(100% + 8px);left:0;right:0;background:#fff;border:1px solid var(--line);
  border-radius:16px;box-shadow:var(--shadow);z-index:20;overflow:hidden;list-style:none;margin:0;padding:6px;
  max-height:340px;overflow-y:auto}
.cx-suggest li{padding:12px 14px;border-radius:11px;cursor:pointer}
.cx-suggest li:hover,.cx-suggest li[aria-selected=true]{background:#f0fdf4}
.cx-suggest .cx-sg-main{font-weight:600;font-size:15px}
.cx-suggest .cx-sg-sub{color:var(--muted);font-size:12.5px}
.cx-chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:22px}
.cx-chip{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:99px;
  padding:8px 15px;font-size:13.5px;color:var(--ink);font-weight:500;font-family:inherit;cursor:pointer;
  transition:border-color .15s,box-shadow .15s}
.cx-chip:hover{border-color:#94a3b8;box-shadow:var(--shadow)}
.cx-chip .d{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}

/* chat intro (Owner-style: chip → 2-message chat, search drops to the bottom) */
.cx-hero--chat{display:flex;flex-direction:column;text-align:left;max-width:760px;min-height:calc(100vh - 150px)}
.cx-chatlog{flex:1;padding-top:16px}
.cx-msg{display:flex;margin-bottom:22px;animation:cx-fadein .35s ease}
.cx-msg--user{justify-content:flex-end}
.cx-msg--bot{gap:10px;align-items:flex-start}
.cx-bubble--user{max-width:78%;padding:13px 19px;border-radius:22px;background:#eceae3;font-size:15.5px;line-height:1.5}
.cx-bubble--bot{max-width:640px;font-size:15.5px;line-height:1.6;padding-top:1px}
.cx-avatar{width:21px;height:21px;border-radius:50%;background:var(--brand);color:#fff;font-size:11px;font-weight:700;
  font-family:'DM Sans';display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:3px}
.cx-ac--up .cx-suggest{top:auto;bottom:calc(100% + 8px)}
@keyframes cx-fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* scan — Owner-style theater: checklist rail + stage visuals through a scanner line */
.cx-scan{max-width:1120px;margin:0 auto;padding:14px 16px 30px;display:grid;gap:14px}
@media(min-width:900px){.cx-scan{grid-template-columns:300px 1fr;height:calc(100vh - 86px);padding-bottom:10px}}
.cx-scan-rail{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px 20px 16px;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.cx-scan-rail h2{font-size:19px;margin-bottom:4px}
.cx-scan .cx-scan-sub{color:var(--muted);font-size:12.5px;margin-bottom:16px;line-height:1.45}
.cx-scan-steps{flex:1}
.cx-scan-item{display:flex;align-items:center;gap:12px;font-size:14px;color:#94a3b8;padding:6px 0 0;transition:color .3s}
.cx-scan-item.cx-active{color:var(--ink);font-weight:500}
.cx-scan-item .cx-chk{width:21px;height:21px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;font-size:11px}
.cx-scan-item.cx-active .cx-chk{border-color:var(--brand)}
.cx-scan-item.cx-done .cx-chk{background:#111;border-color:#111;color:#fff}
.cx-scan-item .cx-mini{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:cx-spin .8s linear infinite}
.cx-conn{width:1.5px;height:9px;background:#111;border-radius:99px;margin:1px 0 0 10px;transform-origin:top;animation:cx-grow .35s ease-out forwards}
.cx-conn--idle{background:var(--line);animation:none}
.cx-scan-bar{height:5px;background:var(--line);border-radius:99px;overflow:hidden;margin:18px 0 10px}
.cx-scan-bar i{display:block;height:100%;background:#111;border-radius:99px;transition:width .3s linear}
.cx-scan-eta{font-size:12.5px;color:var(--ink);font-weight:600;display:flex;align-items:center;gap:8px}
.cx-scan-eta .cx-mini{width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:cx-spin .8s linear infinite;display:inline-block}
@keyframes cx-spin{to{transform:rotate(360deg)}}
@keyframes cx-grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
/* stage area + scanner line */
.cx-stagewrap{position:relative;border-radius:20px;overflow:hidden;min-height:52vh}
.cx-scanline{position:absolute;left:0;right:0;top:55%;height:2px;z-index:3;pointer-events:none;transform-origin:center;
  background:linear-gradient(90deg,transparent,rgba(22,163,74,.65) 16%,#15803d 50%,rgba(22,163,74,.65) 84%,transparent);
  animation:cx-linein .8s ease-out}
.cx-scanline::after{content:"";position:absolute;left:6%;right:6%;top:-30px;height:62px;
  background:radial-gradient(ellipse at 50% 50%,rgba(22,163,74,.14),transparent 70%);filter:blur(5px)}
@keyframes cx-linein{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.cx-osc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;
  animation:cx-oscillate 4s ease-in-out infinite}
@keyframes cx-oscillate{0%,100%{transform:translateY(-13%)}50%{transform:translateY(13%)}}
.cx-stage-in{animation:cx-fadein .5s ease}
/* stage 1: simulated maps search */
.cx-map{position:absolute;inset:0;background:#e9e7e1;z-index:1}
.cx-map::before{content:"";position:absolute;inset:0;opacity:.6;background:
  repeating-linear-gradient(0deg,transparent 0 84px,#dedbd2 84px 88px),
  repeating-linear-gradient(90deg,transparent 0 108px,#dedbd2 108px 112px)}
.cx-map-search{position:absolute;top:20px;left:50%;transform:translateX(-50%);width:min(430px,82%);background:#fff;
  border-radius:14px;box-shadow:var(--shadow);padding:12px 16px;font-size:15px;display:flex;gap:9px;align-items:center;z-index:2}
.cx-map-search .q{color:#94a3b8}
.cx-caret{display:inline-block;width:1.5px;height:16px;background:#111;animation:cx-blink 1s steps(2) infinite}
@keyframes cx-blink{50%{opacity:0}}
.cx-pin{position:absolute;background:#fff;border-radius:99px;padding:9px 15px;font-size:13px;font-weight:600;
  box-shadow:0 8px 26px rgba(15,23,42,.14);animation:cx-drop .5s ease-out backwards;z-index:2}
@keyframes cx-drop{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
/* stage 2: GBP knowledge-panel card */
.cx-gbp{width:min(530px,90%);background:#fff;border-radius:26px;box-shadow:0 18px 50px rgba(15,23,42,.13);overflow:hidden;padding:8px}
.cx-gbp-photos{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:150px;border-radius:18px 18px 4px 4px;overflow:hidden;background:#f1f0ec}
.cx-gbp-photos img{width:100%;height:100%;object-fit:cover;display:block}
.cx-gbp-body{padding:12px 14px 10px}
.cx-gbp-body h3{font-size:20px;margin-bottom:3px}
.cx-gbp-meta{display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--muted)}
.cx-stars{color:#f59e0b;letter-spacing:1px;font-size:13px}
.cx-stars .off{color:#d9d6cd}
.cx-gbp-sum{font-size:13px;color:var(--muted);margin-top:7px;line-height:1.5}
/* stage 3: review cards */
.cx-revs{width:min(500px,92%);display:flex;flex-direction:column;gap:12px}
.cx-rev{background:#fff;border-radius:16px;box-shadow:0 10px 30px rgba(15,23,42,.10);padding:13px 16px}
.cx-rev:nth-child(2n){transform:rotate(-1.6deg)}
.cx-rev:nth-child(3n){transform:rotate(1.3deg)}
.cx-rev-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.cx-rev-av{width:34px;height:34px;border-radius:50%;background:var(--brand);color:#fff;font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex:0 0 auto}
.cx-rev-av img{width:100%;height:100%;object-fit:cover}
.cx-rev-who{flex:1;min-width:0}
.cx-rev-who b{font-size:14px;display:block}
.cx-rev-who span{font-size:12px;color:var(--muted)}
.cx-rev-txt{font-size:13px;color:#475569;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cx-rev-txt .more{color:var(--muted)}
/* stage 4: photo polaroids */
.cx-pols{position:relative;width:min(560px,94%);height:420px}
.cx-pol{position:absolute;background:#fff;padding:7px;border-radius:6px;box-shadow:0 12px 34px rgba(15,23,42,.16);animation:cx-drop .6s ease-out backwards}
.cx-pol img{display:block;width:150px;height:118px;object-fit:cover;border-radius:2px}
/* stage 5: browser frame */
.cx-browser{width:min(560px,92%);background:#fff;border-radius:16px;box-shadow:0 18px 50px rgba(15,23,42,.13);overflow:hidden}
.cx-browser-bar{display:flex;align-items:center;gap:10px;background:#f1f0ec;padding:10px 14px}
.cx-dot{width:10px;height:10px;border-radius:50%;background:#d9d6cd}
.cx-url{flex:1;background:#fff;border-radius:8px;padding:5px 12px;font-size:12px;color:var(--muted);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cx-browser-body{padding:18px;display:flex;flex-direction:column;gap:12px;min-height:210px}
.cx-browser-body img{width:100%;max-height:280px;object-fit:cover;object-position:top;display:block;border-radius:8px}
.cx-skel{height:12px;border-radius:6px;background:linear-gradient(90deg,#ecebe6 25%,#f7f6f2 40%,#ecebe6 60%);
  background-size:200% 100%;animation:cx-shimmer 1.4s infinite}
.cx-skel--hero{height:110px;border-radius:10px}
@keyframes cx-shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
/* stage 6: phone frame */
.cx-phone{width:225px;height:460px;border-radius:34px;background:#fff;border:1.5px solid #d9d6cd;
  box-shadow:0 24px 60px rgba(15,23,42,.17);overflow:hidden;padding:7px}
.cx-phone-screen{width:100%;height:100%;border-radius:27px;overflow:hidden;background:#f4f3ef;display:flex;flex-direction:column;gap:10px;padding:0}
.cx-phone-screen img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}
.cx-phone-skel{padding:16px;display:flex;flex-direction:column;gap:10px}

/* ai-website preview (Owner-parity: report ends at a phone mockup of the site
   rebuilt "with AI" from the restaurant's own Google data → demo) */
.cx-ai-duo{display:flex;align-items:flex-start;justify-content:center;gap:20px;flex-wrap:wrap;padding:12px 0 4px}
.cx-ai-col{display:flex;flex-direction:column;align-items:center;gap:10px}
.cx-ai-lbl{font-size:12.5px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:7px}
.cx-ai-lbl .chip{border-radius:99px;padding:2px 9px;font-size:11px;font-weight:700}
.cx-ai-lbl .chip--bad{background:#fee2e2;color:var(--bad)}
.cx-ai-lbl .chip--good{background:#dcfce7;color:var(--brand)}
.cx-ai-arrow{align-self:center;font-size:22px;color:var(--brand);display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:700}
.cx-ai-arrow small{font-size:10.5px;color:var(--muted);font-weight:600;max-width:96px;text-align:center;line-height:1.3}
.cx-phone--sm{width:192px;height:396px;padding:6px;border-radius:30px}
.cx-phone--sm .cx-phone-screen{border-radius:24px}
.cx-aisite{background:#fff;gap:0}
.cx-aisite-nav{background:var(--brand-d);color:#fff;font-family:'DM Sans';font-weight:700;font-size:11.5px;padding:9px 11px;display:flex;justify-content:space-between;align-items:center;gap:6px}
.cx-aisite-nav em{font-style:normal;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cx-aisite-nav span{background:#fff;color:var(--brand-d);border-radius:99px;padding:2px 8px;font-size:9.5px;flex:0 0 auto}
.cx-aisite-hero{position:relative;height:118px;background:#f1f0ec;flex:0 0 auto}
.cx-aisite-hero img{width:100%;height:100%;object-fit:cover;display:block}
.cx-aisite-hero .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,23,42,0) 26%,rgba(15,23,42,.74));display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-start;padding:9px 11px;color:#fff}
.cx-aisite-hero .ov b{font-family:'DM Sans';font-size:13px;line-height:1.25}
.cx-aisite-btn{background:#16a34a;color:#fff;font-weight:700;font-size:10.5px;border-radius:99px;padding:6px 12px;margin-top:6px}
.cx-aisite-meta{display:flex;gap:6px;align-items:center;font-size:9.5px;color:var(--muted);padding:8px 11px;border-bottom:1px solid var(--line)}
.cx-aisite-meta .cx-stars{font-size:9px}
.cx-aisite-rev{font-size:9px;color:#475569;line-height:1.5;padding:8px 11px;border-bottom:1px solid var(--line)}
.cx-aisite-rev b{display:block;color:var(--ink);margin-top:3px}
.cx-aisite-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;flex:1;min-height:60px;background:#f1f0ec}
.cx-aisite-grid img{width:100%;height:100%;object-fit:cover;display:block;min-height:60px}

// ── Places autocomplete ──────────────────────────────────────────────────────
function usePlaces(active) {
  const libRef = useRef(null), tokenRef = useRef(null), debRef = useRef(null);
  const [suggestions, setSuggestions] = useState([]);
  useEffect(() => {
    if (!active || libRef.current || MOCK) return;
    let cancelled = false;
    (async () => { try { const lib = await google.maps.importLibrary("places"); if (!cancelled) libRef.current = lib; } catch (e) { console.error("[places] importLibrary failed:", e); } })();
    return () => { cancelled = true; };
  }, [active]);
  const suggest = (text) => {
    if (debRef.current) clearTimeout(debRef.current);
    debRef.current = setTimeout(() => {
      const q = (text || "").trim();
      if (MOCK) {
        if (q.length < 1) { setSuggestions([]); return; }
        const ql = q.toLowerCase();
        const hits = MOCK_SUGGEST.filter((s) => s.mainText.text.toLowerCase().includes(ql));
        setSuggestions(hits.length ? hits : MOCK_SUGGEST);
        return;
      }
      const lib = libRef.current;
      if (!lib || !lib.AutocompleteSuggestion || q.length < 2) { setSuggestions([]); return; }
      if (!tokenRef.current) tokenRef.current = new lib.AutocompleteSessionToken();
      const base = { input: q, sessionToken: tokenRef.current, includedRegionCodes: ["mx", "co", "cl", "pe"], language: "es", region: "mx" };
      const apply = ({ suggestions }) => setSuggestions((suggestions || []).map((s) => s.placePrediction).filter(Boolean).slice(0, 5));
      const AS = lib.AutocompleteSuggestion;
      AS.fetchAutocompleteSuggestions({ ...base, includedPrimaryTypes: ["establishment"] })
        .then(apply).catch(() => AS.fetchAutocompleteSuggestions(base).then(apply))
        .catch((e) => { console.error("[places] suggest error:", e); setSuggestions([]); });
    }, 220);
  };
  const resolve = async (pred) => {
    const fallback = (pred.text && pred.text.text) || (pred.mainText && pred.mainText.text) || "";
    const txt = (v) => (v == null ? "" : typeof v === "object" ? v.text || "" : String(v));
    try {
      const place = pred.toPlace();
      // Rich fields feed the scan-phase stage visuals (photos / reviews / GBP card).
      // If the richer mask fails (older SDK / SKU), fall back to the basic pair so
      // the funnel never breaks — the scan just shows skeletons instead.
      let rich = true;
      try {
        await place.fetchFields({ fields: ["displayName", "formattedAddress", "rating", "userRatingCount", "priceLevel", "photos", "reviews", "editorialSummary", "primaryTypeDisplayName"] });
      } catch (e) {
        rich = false;
        await place.fetchFields({ fields: ["displayName", "formattedAddress"] });
      }
      tokenRef.current = null;
      const base = { name: txt(place.displayName) || fallback, placeId: place.id || pred.placeId || "", address: txt(place.formattedAddress) };
      if (!rich) return base;
      const photoUrls = (place.photos || []).slice(0, 6).map((ph) => { try { return ph.getURI({ maxWidth: 800 }); } catch (e) { return null; } }).filter(Boolean);
      const reviews = (place.reviews || []).slice(0, 5).map((rv) => ({
        author: (rv.authorAttribution && rv.authorAttribution.displayName) || "Cliente",
        avatar: (rv.authorAttribution && rv.authorAttribution.photoURI) || null,
        rating: rv.rating || null,
        when: rv.relativePublishTimeDescription || "",
        text: txt(rv.text),
      }));
      return {
        ...base,
        rating: place.rating || null,
        reviewCount: place.userRatingCount || null,
        priceLevel: place.priceLevel || null,
        category: txt(place.primaryTypeDisplayName),
        summary: txt(place.editorialSummary),
        photoUrls, reviews,
      };
    } catch (e) { console.error("[places] fetchFields error:", e); tokenRef.current = null; return { name: fallback, placeId: pred.placeId || "", address: "" }; }
  };
  return { suggestions, setSuggestions, suggest, resolve };
}

function Hero({ onSelect }) {
  const places = usePlaces(true);
  const [val, setVal] = useState("");
  const [active, setActive] = useState(-1);
  const [chat, setChat] = useState(null);
  const inputRef = useRef(null);
  useEffect(() => { fireEvent("diagnostic_started"); clarityStep("landing"); }, []);
  useEffect(() => { if (chat && inputRef.current) inputRef.current.focus(); }, [chat]);

  const openChat = (c) => { setChat(c); fireEvent("grader_chip_clicked"); clarityStep("chat_" + c.slug); };

  const pick = async (pred) => {
    places.setSuggestions([]);
    if (MOCK || !pred) {
      const name = (pred && pred.mainText && pred.mainText.text) || MOCK_SCORE.business.displayName;
      const address = (pred && pred.secondaryText && pred.secondaryText.text) || "CDMX";
      onSelect({ name, placeId: "mock", address, ...MOCK_PLACE });
      return;
    }
    const r = await places.resolve(pred);
    setVal(r.name);
    fetch("/api/diagnostico/partial-lead", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ company_name: r.name, place_id: r.placeId || undefined, place_address: r.address || undefined, session_id: SESSION_ID, funnel: "grader" }) }).catch(() => {});
    onSelect(r);
  };

  const searchBox = (
    <div className={"cx-ac" + (chat ? " cx-ac--up" : "")}>
      {places.suggestions.length > 0 && (
        <ul className="cx-suggest">
          {places.suggestions.map((p, i) => (
            <li key={p.placeId || i} role="option" aria-selected={i === active} onMouseDown={(e) => { e.preventDefault(); pick(p); }}>
              <div className="cx-sg-main">{(p.mainText && p.mainText.text) || (p.text && p.text.text)}</div>
              {p.secondaryText && <div className="cx-sg-sub">{p.secondaryText.text}</div>}
            </li>
          ))}
        </ul>
      )}
      <div className="cx-searchwrap">
        <input ref={inputRef} className="cx-input" placeholder="Busca tu restaurante" value={val} autoFocus
          onChange={(e) => { setVal(e.target.value); setActive(-1); places.suggest(e.target.value); }}
          onKeyDown={(e) => {
            if (!places.suggestions.length) { if (e.key === "Enter" && MOCK) pick(null); return; }
            if (e.key === "ArrowDown") { e.preventDefault(); setActive((i) => Math.min(i + 1, places.suggestions.length - 1)); }
            else if (e.key === "ArrowUp") { e.preventDefault(); setActive((i) => Math.max(i - 1, 0)); }
            else if (e.key === "Enter" && active >= 0) { e.preventDefault(); pick(places.suggestions[active]); }
            else if (e.key === "Escape") places.setSuggestions([]);
          }} />
        <button className="cx-go" onClick={() => { if (MOCK) pick(null); else if (active >= 0) pick(places.suggestions[active]); else if (places.suggestions[0]) pick(places.suggestions[0]); }}>↑</button>
      </div>
    </div>
  );

  if (chat) return (
    <div className="cx-hero cx-hero--chat">
      <div className="cx-chatlog">
        <div className="cx-msg cx-msg--user"><div className="cx-bubble--user">{chat.label}</div></div>
        <div className="cx-msg cx-msg--bot"><span className="cx-avatar">F</span><div className="cx-bubble--bot">{chat.a}</div></div>
      </div>
      {searchBox}
    </div>
  );

  return (
    <div className="cx-hero">
      <h1>Escribe el nombre de tu restaurante<br/>y descubre tu Calificación Digital</h1>
      <p className="cx-sub">Analizamos tu presencia en Google en segundos y te decimos cómo te ganan tus competidores.</p>
      {searchBox}
      <div className="cx-chips">
        {CHAT_CHIPS.map((c) => (
          <button key={c.slug} type="button" className="cx-chip" onClick={() => openChat(c)}>
            <span className="d" style={{ background: c.bg }}>{c.icon}</span>{c.label}
          </button>
        ))}
      </div>
    </div>
  );
}

const SCAN_STEP_MS = 3500;               // 6 stages × 3.5s ≈ 21s of theater
const SCAN_MIN_MS = SCAN_STEP_MS * 6 + 600;
function Stars({ rating }) {
  const full = Math.round(rating || 0);
  return <span className="cx-stars">{[0,1,2,3,4].map((i) => <span key={i} className={i < full ? "" : "off"}>★</span>)}</span>;
}
function Scan({ restaurant, score }) {
  const name = restaurant.name;

    name + " y sus competidores",
    "Tu perfil de Google",
    "Reseñas y calificación",
    "Fotos y datos de tu perfil",
    "Tu sitio web (SEO)",
    "Velocidad y experiencia móvil",
  ];
  const [active, setActive] = useState(0);
  const [pct, setPct] = useState(3);
  const [typed, setTyped] = useState("");
  useEffect(() => {
    const t = setInterval(() => setActive((a) => Math.min(a + 1, STEPS.length - 1)), SCAN_STEP_MS);
    const p = setInterval(() => setPct((x) => Math.min(97, x + Math.max(0.3, (97 - x) * 0.022))), 300);
    return () => { clearInterval(t); clearInterval(p); };
  }, []);
  useEffect(() => {  // stage-1 typewriter (simulated Google search)
    if (active !== 0) return;
    let i = 0;
    const ty = setInterval(() => { i++; setTyped(name.slice(0, i)); if (i >= name.length) clearInterval(ty); }, 85);
    return () => clearInterval(ty);

  const photos = restaurant.photoUrls || [];

  const domain = site ? site.replace(/^https?:\/\//, "").replace(/\/.*$/, "") : "tu sitio web";
  const price = { FREE: "$", INEXPENSIVE: "$", MODERATE: "$$", EXPENSIVE: "$$$", VERY_EXPENSIVE: "$$$$" }[restaurant.priceLevel] || null;

    // 2 — GBP knowledge-panel card

          {restaurant.rating != null && <span><Stars rating={restaurant.rating} /> {restaurant.rating}</span>}
          {restaurant.category && <span>| {restaurant.category}</span>}

        {fullBleed ? STAGES[0] : <div className="cx-osc" key={active}>{STAGES[active]}</div>}

  );

    fetch("/api/calendar/available-slots?ae=" + encodeURIComponent(ae) + "&days=14").then((r) => r.json())
      .then((d) => { if (d.ok && d.dates?.length) setDates(d.dates); else setErr("fallback"); }).catch(() => setErr("fallback")).finally(() => setLoading(false));
  }, [ae]);
  const book = async () => {
    if (!slot) return; setBooking(true); setErr(null);
    if (MOCK) { setBooked({ startFormatted: "Hoy 10:00", meetLink: "#" }); setBooking(false); return; }
    try {
      const res = await fetch("/api/calendar/book-demo", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ae, start: slot.start, end: slot.end, first_name: lead.first_name, last_name: lead.last_name, email: lead.email, phone: lead.phone, company_name: lead.company_name, session_id: SESSION_ID, funnel: "grader", place_id: lead.place_id || undefined }) });
      const result = await res.json();
      if (!res.ok) { setErr(result.error || "No pudimos agendar."); return; }
      setBooked(result); fireEvent("demo_booked", lead.place_id || ""); clarityStep("demo_booked");
      if (typeof fbq === "function" && result.eventId) fbq("track", "Schedule", { content_name: "grader_booking", value: 0, currency: "MXN" }, { eventID: "schedule_" + result.eventId });

  const day = dates[di] || { slots: [] };
  return (
    <div>
      <div className="cx-cal-dates">{dates.map((d, i) => <button key={i} className={"cx-cal-date" + (i === di ? " cx-on" : "")} onClick={() => { setDi(i); setSlot(null); }}>{d.dateLabel}</button>)}</div>

}

// ── Unlock gate (contact capture over the blurred report) ────────────────────
const ROLES = [["dueno", "Dueño(a)"], ["gerente", "Gerente"], ["marketing", "Marketing"], ["otro", "Otro"]];
const SUCS = [["1", "1 sucursal"], ["2-5", "2 a 5"], ["6-20", "6 a 20"], ["20+", "20+"]];
function Unlock({ topCompetitor, placeId, onUnlock }) {
  const [firstName, setFirstName] = useState(""), [phone, setPhone] = useState(""), [email, setEmail] = useState("");
  const [plataformas, setPlataformas] = useState("dueno"), [sucursales, setSucursales] = useState("1");
  const [err, setErr] = useState(null), [busy, setBusy] = useState(false);
  // WhatsApp verification (Owner gates on SMS-verified phones; ours is the
  // channel the AE actually writes to). STRICTLY fail-open: OTP disabled /
  // send failed / code expired / too many tries → unlock anyway. Verification
  // may only upgrade lead quality — it must never cost a lead.
  const [stage, setStage] = useState("form"); // form | code
  const [code, setCode] = useState(""), [cooldown, setCooldown] = useState(0);
  useEffect(() => {
    if (!cooldown) return;
    const t = setTimeout(() => setCooldown(cooldown - 1), 1000);
    return () => clearTimeout(t);
  }, [cooldown]);
  const leadForm = () => ({ first_name: firstName.trim(), last_name: "", phone: phone.trim(), email: email.trim(), plataformas, sucursales });
  const sendCode = () => fetch("/api/grader/otp/send", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ phone: phone.trim() }) }).then((r) => r.json());
  const submit = () => {
    if (!firstName.trim()) return setErr("Escribe tu nombre.");
    if (!phone.trim() || phone.replace(/\D/g, "").length < 10) return setErr("Escribe un WhatsApp válido (10 dígitos).");
    if (!email.trim() || !/.+@.+\..+/.test(email)) return setErr("Escribe un correo válido.");
    setErr(null); setBusy(true);
    if (MOCK) return onUnlock(leadForm());
    sendCode().then((r) => {
      if (r && r.ok) { setStage("code"); setBusy(false); setCooldown(60); }
      else onUnlock(leadForm()); // disabled / bad_phone / send_failed → open
    }).catch(() => onUnlock(leadForm()));
  };
  const verify = () => {
    if (!/^\d{6}$/.test(code.trim())) return setErr("Escribe el código de 6 dígitos.");
    setErr(null); setBusy(true);
    fetch("/api/grader/otp/verify", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ phone: phone.trim(), code: code.trim(), session_id: SESSION_ID, place_id: placeId || undefined }) })
      .then((r) => r.json())
      .then((r) => {
        if (r && r.ok) return onUnlock(leadForm());
        if (r && r.reason === "bad_code") { setErr("Código incorrecto — revisa tu WhatsApp."); setBusy(false); return; }
        onUnlock(leadForm()); // expired / too_many / no_code → open
      })
      .catch(() => onUnlock(leadForm()));
  };
  const resend = () => {
    setErr(null); setCode("");
    sendCode().then((r) => { if (r && r.ok) setCooldown(60); else onUnlock(leadForm()); }).catch(() => onUnlock(leadForm()));
  };
  if (stage === "code") return (
    <div className="cx-unlock">
      <div className="cx-lock-ic">💬</div>
      <h3>Te enviamos un código por WhatsApp</h3>
      <p className="cx-otp-hint">Escribe el código de 6 dígitos que llegó al {phone.replace(/\d(?=\d{4})/g, "•")} para ver tu reporte.</p>
      <input className="cx-input cx-otp-code" placeholder="······" value={code} maxLength={6} inputMode="numeric" autoFocus
        onChange={(e) => setCode(e.target.value.replace(/\D/g, ""))} onKeyDown={(e) => { if (e.key === "Enter") verify(); }} />
      {err && <div className="cx-err" style={{ color: "#fecaca" }}>{err}</div>}
      <button className="cx-btn" disabled={busy} onClick={verify}>{busy ? "Verificando…" : "Verificar y ver mi reporte →"}</button>
      <button className="cx-otp-resend" disabled={cooldown > 0} onClick={resend}>{cooldown > 0 ? `Reenviar código (${cooldown}s)` : "Reenviar código"}</button>
    </div>
  );
  return (
    <div className="cx-unlock">
      <div className="cx-lock-ic">🔒</div>
      <h3>Desbloquea tu reporte completo</h3>
      <p>{topCompetitor ? `Ve por qué ${topCompetitor} te está ganando en Google y qué hacer para superarlo.` : "Ve la lista completa de problemas, tus competidores y cuánto podrías recuperar."}</p>
      <input className="cx-input" placeholder="Tu nombre" value={firstName} onChange={(e) => setFirstName(e.target.value)} />
      <input className="cx-input" placeholder="WhatsApp (10 dígitos)" value={phone} maxLength={10} onChange={(e) => setPhone(e.target.value.replace(/\D/g, "").slice(0, 10))} inputMode="tel" />
      <input className="cx-input" placeholder="Correo" value={email} onChange={(e) => setEmail(e.target.value)} inputMode="email" />
      <div className="cx-selrow">
        <select className="cx-input" value={plataformas} onChange={(e) => setPlataformas(e.target.value)}>{ROLES.map(([v, l]) => <option key={v} value={v}>{l}</option>)}</select>
        <select className="cx-input" value={sucursales} onChange={(e) => setSucursales(e.target.value)}>{SUCS.map(([v, l]) => <option key={v} value={v}>{l}</option>)}</select>
      </div>
      {err && <div className="cx-err" style={{ color: "#fecaca" }}>{err}</div>}
      <button className="cx-btn" disabled={busy} onClick={submit}>{busy ? "Desbloqueando…" : "Ver mi reporte completo →"}</button>
      <p className="cx-legal">Al continuar aceptas recibir tu análisis por WhatsApp y correo. <a href="/privacy" target="_blank" rel="noopener">Aviso de privacidad</a>.</p>
    </div>
  );
}

// ── Review-mined dishes ("Lo más pedido") — same lexicon as /sitio ────────────
// Longest-first matching with span consumption so "tacos al pastor" doesn't also
// count "pastor"/"tacos". Only 4★+ reviews name best-sellers.
const DISH_LEXICON = ["tacos al pastor","tacos de canasta","tacos dorados","pescado zarandeado","pastel de tres leches","tostadas de atún","cochinita pibil","café de olla","tres leches","quesabirria","al pastor","suadero","birria","carnitas","barbacoa","cochinita","gringas","gringa","volcanes","volcán","alambres","alambre","arrachera","costillas","chuletas","chuleta","pozole","chilaquiles","enchiladas","quesadillas","sopes","huaraches","tlayudas","tamales","flautas","tostadas","tortas","pambazos","elotes","esquites","aguachile","ceviche","camarones","pulpo","mojarra","micheladas","margaritas","horchata","flan","churros","cheesecake","pizzas","pizza","hamburguesas","hamburguesa","alitas","boneless","sushi","ramen","lasaña","pasta","crepas","waffles","hotcakes","molletes","mole","burritos","nachos","guacamole","pastor","tacos","mariscos"].sort((a, b) => b.length - a.length);
const deacc = (s) => (s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
function mineDishes(reviews, max) {
  const found = new Map();
  for (const rv of reviews || []) {
    if (!rv || !rv.text || (rv.rating || 0) < 4) continue;
    let t = deacc(rv.text);
    for (const dish of DISH_LEXICON) {
      const dd = deacc(dish);
      let idx, hit = false;
      while ((idx = t.indexOf(dd)) !== -1) {
        const b = idx === 0 ? " " : t[idx - 1];
        const a = idx + dd.length >= t.length ? " " : t[idx + dd.length];
        if (/[^a-z0-9ñ]/.test(b) && /[^a-z0-9ñ]/.test(a)) hit = true;
        t = t.slice(0, idx) + " ".repeat(dd.length) + t.slice(idx + dd.length);
      }
      if (hit) {
        const cur = found.get(dd) || { name: dish[0].toUpperCase() + dish.slice(1), count: 0 };
        cur.count++;
        found.set(dd, cur);
      }
    }
  }
  // Merge same-dish variants named across different reviews ("pastor" +
  // "tacos al pastor" + "gringa"/"gringas") into the most specific name.
  const entries = [...found.entries()].map(([canon, v]) => ({ canon, ...v }))
    .sort((x, y) => y.canon.length - x.canon.length);
  const merged = [];
  for (const e of entries) {
    const host = merged.find((m) => m.canon.includes(e.canon) || e.canon.includes(m.canon));
    if (host) host.count += e.count;
    else merged.push(e);
  }
  return merged.sort((x, y) => y.count - x.count).slice(0, max || 3);
}

// ── AI website preview (Owner-parity: "Fix your website in 35 seconds") ──────
// Owner ends the grader report with a phone mockup of the restaurant's site
// rebuilt by "AI" — a templated hero + the restaurant's OWN GBP photos — as the
// desire-builder before the demo CTA (study: grader-owner-ai-website-study.md).
// Ours goes one further: before/after — the real PSI screenshot vs a preview
// assembled client-side from the Places data already fetched on pick. The
// build-in animation replays on unlock. No new backend calls.
function AiPreview({ restaurant, score, unlocked, lockCls, onCta }) {
  const b = score.business || {};
  const photos = restaurant.photoUrls || [];
  const review = (restaurant.reviews || []).find((r) => (r.rating || 0) >= 4 && r.text);
  const shot = score.pageSpeed && score.pageSpeed.screenshot;
  const perf = score.pageSpeed && score.pageSpeed.perfScore;
  const name = b.displayName || restaurant.name;
  const ref = useRef(null);
  useEffect(() => {  // "viewed" = the unlocked preview actually scrolled into sight
    if (!unlocked || !ref.current || !window.IntersectionObserver) return;
    const ob = new IntersectionObserver((es) => {
      if (es.some((e) => e.isIntersecting)) { fireEvent("grader_ai_preview_viewed", restaurant.placeId); ob.disconnect(); }
    }, { threshold: 0.35 });
    ob.observe(ref.current);
    return () => ob.disconnect();
  }, [unlocked]);
  // Menu strip: real items (name+price) parsed from their CURRENT site beat
  // review-mined dishes; both beat the plain photo grid (Owner's preview shows
  // skeleton rows here — this is our edge).
  const menuItems = (score.siteAudit && score.siteAudit.ok && score.siteAudit.menuItems) || [];
  const menuRows = (menuItems.length ? menuItems : mineDishes(restaurant.reviews, 2)).slice(0, 2);
  useEffect(() => {  // hand the real menu items to /sitio (same-device localStorage)
    if (menuItems.length && restaurant.placeId) {
      try { localStorage.setItem("cx-menu:" + restaurant.placeId, JSON.stringify(menuItems.slice(0, 8))); } catch (e) {}
    }
  }, []);
  if (!photos.length) return null;  // the preview is only convincing with real photos
  const grid = photos.slice(1, 4).length ? photos.slice(1, 4) : [photos[0]];
  const dly = (i) => ({ animationDelay: (0.2 + i * 0.55) + "s" });
  return (
    <div className="cx-panel" style={{ marginTop: 14 }} ref={ref}>
      <h3>Así se vería tu sitio, arreglado con IA</h3>
      <p className="cx-panel-lead">{shot
        ? "Vista previa generada al instante con las fotos y reseñas reales de tu perfil de Google."
        : "No encontramos un sitio web propio — así se vería el tuyo, generado con las fotos y reseñas reales de tu perfil de Google."}</p>
      <div className={lockCls}>
        <div className="cx-ai-duo">
          {shot && (
            <div className="cx-ai-col">
              <span className="cx-ai-lbl">Tu sitio hoy {perf != null && <span className="chip chip--bad">{perf}/100</span>}</span>
              <div className="cx-phone cx-phone--sm"><div className="cx-phone-screen"><img src={shot} alt="" /></div></div>
            </div>
          )}
          {shot && <div className="cx-ai-arrow">→<small>arreglado con IA</small></div>}
          <div className="cx-ai-col">
            <span className="cx-ai-lbl">Con FluxSales <span className="chip chip--good">Optimizado</span></span>
            <div className="cx-phone cx-phone--sm">
              <div className={"cx-phone-screen cx-aisite" + (unlocked ? " cx-ai-build" : "")} key={unlocked ? "build" : "still"}>
                <div className="cx-aisite-nav cx-ai-sec" style={dly(0)}><em>{name}</em><span>Ordenar</span></div>
                <div className="cx-aisite-hero cx-ai-sec" style={dly(1)}>
                  <img src={photos[0]} alt="" />
                  <div className="ov"><b>{name}</b><i style={{ fontStyle: "normal", fontSize: 9.5, opacity: .9 }}>Pide directo, sin comisiones</i><span className="cx-aisite-btn">Ordenar en línea</span></div>
                </div>
                <div className="cx-aisite-meta cx-ai-sec" style={dly(2)}>
                  {b.rating != null && <span><Stars rating={b.rating} /> {b.rating.toFixed(1)} ({b.reviewCount ?? 0} reseñas)</span>}
                  {restaurant.category && <span>· {restaurant.category}</span>}
                </div>
                {review && (
                  <div className="cx-aisite-rev cx-ai-sec" style={dly(3)}>
                    “{review.text.length > 110 ? review.text.slice(0, 110) + "…" : review.text}”<b>— {review.author}</b>
                  </div>
                )}
                {menuRows.length > 0 ? (
                  <div className="cx-ai-sec" style={dly(4)}>
                    <div className="cx-aisite-mtitle">Lo más pedido</div>
                    {menuRows.map((row, i) => (
                      <div className="cx-aisite-dish" key={i}>
                        <img src={photos[(i + 1) % photos.length] || photos[0]} alt="" />
                        <b>{row.name}</b>
                        {row.priceMxn != null ? <span className="pr">${row.priceMxn}</span> : <span style={{ color: "#f59e0b" }}>★</span>}
                        <span className="plus">+</span>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="cx-aisite-grid cx-ai-sec" style={dly(4)}>
                    {grid.map((u, i) => <img key={i} src={u} alt="" />)}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      </div>
      <div style={{ textAlign: "center", marginTop: 16 }}>
        {/* Unlocked + token → the real deliverable: open the full generated site.
            Locked → scroll to the gate (the button stays outside the blur). */}
        {unlocked && score.siteToken ? (
          <a className="cx-btn" style={{ display: "inline-block", width: "auto", padding: "13px 28px", textDecoration: "none" }}
            href={"/sitio?t=" + encodeURIComponent(score.siteToken) + (score.siteToken === "mock-token" ? "&mock=1" : "")}
            target="_blank" rel="noopener"
            onClick={() => fireEvent("grader_ai_preview_cta_clicked", restaurant.placeId)}>Abrir mi sitio optimizado →</a>
        ) : (
          <button className="cx-btn" style={{ width: "auto", padding: "13px 28px" }} onClick={onCta}>Quiero mi sitio así →</button>
        )}
      </div>
      <div className="cx-ai-foot">Vista previa ilustrativa generada con tus datos públicos de Google. En la demo te lo mostramos funcionando con tu menú real.</div>
    </div>
  );
}

// ── Report (score always visible; details gated behind Unlock) ───────────────
function Report({ score, restaurant, onLeadReady, initialUnlocked }) {
  const s = score, b = s.business, comp = s.competitors || {};
  // Permalink re-opens (?t=) start unlocked: the token only ever traveled to the
  // lead who already gave contact — re-gating them would just lose the visit.
  const [unlocked, setUnlocked] = useState(!!initialUnlocked);
  const [intake, setIntake] = useState(initialUnlocked ? { ok: true, showCalendar: false, aeWhatsapp: FLUX_WA } : null);
  const [lead, setLead] = useState(initialUnlocked ? { first_name: "", aeWhatsapp: FLUX_WA } : null);
  const below = Math.max(0, (comp.count || 0) - (comp.betterThan || 0));
  const compList = comp.list || [];
  const topCompetitor = compList[0] && compList[0].name;
  // Owner-style rank position: you + the nearby list, ordered by rating (review
  // count breaks ties). Being #1 is celebrated, not silent — good restaurants
  // convert on keeping the lead, not on shame.
  const ranked = [
    { name: b.displayName, rating: b.rating, reviewCount: b.reviewCount, you: true },
    ...compList.map((c) => ({ ...c, you: false })),
  ].filter((r) => r.rating != null).sort((x, y) => (y.rating - x.rating) || ((y.reviewCount || 0) - (x.reviewCount || 0)));
  const myRank = ranked.findIndex((r) => r.you) + 1;

  const doUnlock = (form) => {
    const fullLead = { ...form, company_name: b.displayName || restaurant.name, place_id: restaurant.placeId, aeWhatsapp: FLUX_WA };
    setLead(fullLead); setUnlocked(true);
    fireEvent("contact_submitted", restaurant.placeId); clarityStep("report_unlocked");
    fireEvent("full_diagnostic_revealed", restaurant.placeId);
    if (typeof fbq === "function") fbq("track", "Lead", { content_name: "grader_landing" });
    if (MOCK) { setIntake({ ok: true, showCalendar: true, assignedAE: "Mariana", aeWhatsapp: FLUX_WA }); return; }
    fetch("/api/demo-page/lead-intake", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...form, company_name: fullLead.company_name, place_id: restaurant.placeId || undefined, place_address: restaurant.address || undefined, funnel: "grader", session_id: SESSION_ID }) })
      .then((r) => r.json()).then((ik) => { setIntake(ik); if (ik && ik.aeWhatsapp) fullLead.aeWhatsapp = ik.aeWhatsapp; })
      .catch(() => setIntake({ ok: true, showCalendar: false, aeWhatsapp: FLUX_WA }));
  };

  const lockCls = unlocked ? "" : " cx-locked";
  const shownIssues = unlocked ? s.issues : s.issues.slice(0, 1);

  // AI-preview CTA: locked → scroll to the unlock gate; unlocked → to the demo CTA.
  const aiCta = () => {
    fireEvent("grader_ai_preview_cta_clicked", restaurant.placeId);
    const target = document.querySelector(unlocked ? ".cx-cta" : ".cx-unlock");
    if (target) target.scrollIntoView({ behavior: "smooth", block: "center" });
  };

  return (
    <div className="cx-report">
      <div className="cx-report-grid">
        <ScorePanel score={s.score} business={b} />
        <div>
          <div className="cx-cardrow">
            <div className="cx-panel">
              {/* Top performers estimate to a $0–$0 range — reframe positive instead of "losing $0". */}
              {(() => { const loss = s.revenueLoss && s.revenueLoss.highMxn > 0 ? s.revenueLoss : null; return (<React.Fragment>
              <h3>{loss ? "Podrías estar perdiendo dinero" : "Vas bien — pero hay margen de mejora"}</h3>
              <p className="cx-panel-lead">{loss
                ? `Por ${s.issues.length} problemas en tu presencia digital`
                : s.issues.length
                  ? `Tu presencia digital es sólida; detectamos ${s.issues.length} área${s.issues.length === 1 ? "" : "s"} donde aún puedes crecer`
                  : "Tu presencia digital es sólida — no encontramos problemas graves"}</p>
              {loss && <div className="cx-loss-amt">{MXN(loss.lowMxn)} – {MXN(loss.highMxn)} <span style={{ fontSize: 14, color: "var(--muted)" }}>/mes*</span></div>}
              <div style={{ marginTop: 12 }} className={lockCls}>
                {shownIssues.map((it) => (
                  <div className="cx-issue" key={it.id}><span className={"cx-sev cx-sev-" + it.severity} /><div><b>{it.title}</b><p>{it.detail}</p></div></div>
                ))}
              </div>
              {loss && <div className="cx-loss-foot">*Estimado con datos de Google (tu diferencia de reseñas vs. tu zona + señales que faltan en tu perfil). Ver metodología abajo.</div>}
              </React.Fragment>); })()}
            </div>

            <div className="cx-panel">
              <h3>{myRank === 1 && ranked.length > 1
                ? <>Eres el #1 de tu zona<span className="cx-rank-badge">🏆</span></>
                : myRank > 0
                  ? <>Estás en el puesto #{myRank} de tu zona</>
                  : below > 0 ? `${below} restaurante${below > 1 ? "s" : ""} de tu zona te gana${below > 1 ? "n" : ""}` : "Tú vs. tu zona"}</h3>
              <p className="cx-panel-lead">{myRank === 1 && ranked.length > 1
                ? "Así te comparas con los mejor calificados cerca de ti — la ventaja se defiende."
                : "Comparado con los restaurantes mejor calificados cerca de ti."}</p>
              <div className={lockCls}>
                {(unlocked ? ranked : ranked.filter((r, i) => r.you || i === 0)).map((r, i) => (
                  <div className={"cx-comp" + (r.you ? " cx-you" : "")} key={i}>
                    <span className="cx-comp-pos">{(unlocked ? i : r.you ? myRank - 1 : 0) + 1}º</span>
                    <span className="cx-comp-name">{r.you ? <b>{r.name} (tú)</b> : r.name}</span>
                    <span className="cx-comp-v">{r.rating != null ? r.rating.toFixed(1) + "★" : "—"} · {r.reviewCount ?? 0}</span>
                  </div>
                ))}
                {ranked.length <= 1 && comp.avgReviews != null && <div className="cx-comp"><span className="cx-comp-pos">~</span><span className="cx-comp-name">Promedio de tu zona</span><span className="cx-comp-v">{comp.avgRating}★ · {comp.avgReviews}</span></div>}
              </div>
            </div>
          </div>

          <V2Cards s={s} lockCls={lockCls} />

          <ChecklistPanel checklist={s.checklist} lockCls={lockCls} />

          <AiPreview restaurant={restaurant} score={s} unlocked={unlocked} lockCls={lockCls} onCta={aiCta} />

          {!unlocked && <div style={{ marginTop: 18 }}><Unlock topCompetitor={topCompetitor} placeId={restaurant.placeId} onUnlock={doUnlock} /></div>}

          {unlocked && intake && (
            <div className="cx-cta">
              {intake.showCalendar ? (<>
                <h3>Arreglemos esto juntos</h3>
                <p>Agenda una demo gratuita de 20 min. Te mostramos cómo subir tu Calificación y dejar de pagar comisiones.</p>
                <Calendar ae={intake.assignedAE || "Mariana"} lead={lead} />
              </>) : (<>
                <h3>Agendemos tu demo</h3>
                <p>Escríbenos por WhatsApp y coordinamos una demo gratuita de 20 min para subir tu Calificación y dejar de pagar comisiones.</p>
                <a className="cx-btn cx-btn--wa" style={{ display: "inline-block", width: "auto", padding: "13px 24px" }} href={"https://wa.me/" + (lead.aeWhatsapp || FLUX_WA) + "?text=" + encodeURIComponent(`Hola, saqué mi Calificación Digital (${s.score.value}/100) para ${b.displayName || restaurant.name} y quiero agendar una demo.`)} target="_blank" rel="noopener">Agendar mi demo por WhatsApp</a>
              </>)}
            </div>
          )}
          {unlocked && !intake && <p style={{ textAlign: "center", color: "var(--muted)", marginTop: 18 }}>Preparando tu plan…</p>}
        </div>
      </div>
      <Faq />
      <div className="cx-foot">FluxSales — el sistema operativo con IA para restaurantes · <a href="/">Conócenos</a></div>
    </div>
  );
}

function ManualClose({ restaurant, reason }) {
  const msg = reason === "not_restaurant" ? "No pudimos identificar tu restaurante en Google. Escríbenos y lo revisamos contigo." : "Tu perfil necesita una revisión manual. Un especialista lo analiza y te manda tu Calificación por WhatsApp.";
  return (
    <div className="cx-report">
      <div className="cx-panel" style={{ maxWidth: 480, margin: "40px auto", textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 8 }}>🔍</div>
        <h2 style={{ fontSize: 21, marginBottom: 8 }}>Necesitamos revisar tu caso</h2>
        <p style={{ color: "var(--muted)", fontSize: 14, marginBottom: 18 }}>{msg}</p>
        <a className="cx-btn cx-btn--wa" style={{ display: "inline-block", width: "auto", padding: "13px 24px" }} href={"https://wa.me/" + FLUX_WA + "?text=" + encodeURIComponent(`Hola, quiero mi Calificación Digital para ${restaurant.name}`)} target="_blank" rel="noopener">Escribir por WhatsApp</a>
      </div>
      <Faq />
    </div>
  );
}

function Faq() {
  return (
    <div className="cx-faq">
      <details><summary>¿Cómo se calcula la Calificación Digital?</summary><p>Usamos los datos públicos de tu perfil de Google (calificación, reseñas, fotos, horarios, teléfono, canales de pedido) y, con tu permiso, analizamos tu propio sitio web: velocidad y experiencia móvil con la API oficial de Google PageSpeed, y su SEO en la página. Comparamos con el promedio público de restaurantes cercanos. Nunca rastreamos ni calificamos el sitio web de otro restaurante. La calificación va de 0 a 100 sobre tres áreas: presencia en buscadores, experiencia del cliente y perfil local.</p></details>
      <details><summary>¿El dinero perdido es exacto?</summary><p>Es un estimado, no una promesa. Lo calculamos a partir de tu diferencia de reseñas vs. tu zona (asumiendo ~1 reseña pública por cada ~30 pedidos, en ~24 meses) y de las señales que faltan en tu perfil. Siempre se muestra como un rango.</p></details>
      <details><summary>¿Qué hacen con mis datos?</summary><p>Usamos tu nombre, WhatsApp y correo para enviarte tu análisis y coordinar una demo si calificas. No los vendemos. Consulta el <a href="/privacy" target="_blank" rel="noopener">aviso de privacidad</a>.</p></details>
    </div>
  );
}

// Permalink re-open: fetch the restaurant by place_id (same SDK pattern /sitio
// uses) into the shape the report/theater components already consume.
async function fetchRestaurantById(placeId) {
  const t = (v) => (v == null ? "" : typeof v === "object" ? v.text || "" : String(v));
  const lib = await google.maps.importLibrary("places");
  const place = new lib.Place({ id: placeId });
  await place.fetchFields({ fields: ["displayName", "formattedAddress", "rating", "userRatingCount", "priceLevel", "photos", "reviews", "editorialSummary", "primaryTypeDisplayName"] });
  return {
    placeId,
    name: t(place.displayName),
    address: t(place.formattedAddress),
    rating: place.rating || null,
    reviewCount: place.userRatingCount || null,
    priceLevel: place.priceLevel || null,
    category: t(place.primaryTypeDisplayName),
    summary: t(place.editorialSummary),
    photoUrls: (place.photos || []).slice(0, 6).map((ph) => { try { return ph.getURI({ maxWidth: 800 }); } catch (e) { return null; } }).filter(Boolean),
    reviews: (place.reviews || []).slice(0, 5).map((rv) => ({
      author: (rv.authorAttribution && rv.authorAttribution.displayName) || "Cliente",
      avatar: (rv.authorAttribution && rv.authorAttribution.photoURI) || null,
      rating: rv.rating || null,
      when: rv.relativePublishTimeDescription || "",
      text: t(rv.text),
    })),
  };
}

// ── App: hero → scan (score runs now) → report(teaser→unlock→full) ───────────
// With ?t=<token>: reopening → report (already unlocked, no re-gate, no theater).
function App() {
  const [step, setStep] = useState(REOPEN_TOKEN ? "reopening" : "hero");  // hero | scan | report | manual | reopening
  const [restaurant, setRestaurant] = useState(null);
  const [score, setScore] = useState(null);
  const [manualReason, setManualReason] = useState(null);
  const [reopened, setReopened] = useState(false);
  useEffect(() => { window.scrollTo(0, 0); }, [step]);

  useEffect(() => {
    if (!REOPEN_TOKEN) return;
    (async () => {
      try {
        const v = await fetch("/api/grader/site-token?t=" + encodeURIComponent(REOPEN_TOKEN)).then((r) => r.json());
        if (!v || !v.ok) { setStep("hero"); return; }
        const r = await fetchRestaurantById(v.place_id);
        if (!r.name) { setStep("hero"); return; }
        const sc = await fetch("/api/grader/score", { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ place_id: v.place_id, session_id: SESSION_ID, funnel_version: FUNNEL_VERSION, report_token: REOPEN_TOKEN, zone: ((r.address || "").split(",").slice(1).join(",").trim() || (r.address || "")) }) }).then((res) => res.json());
        if (!sc || !sc.ok) { setStep("hero"); return; }
        setRestaurant(r); setScore(sc); setReopened(true); clarityStep("report_reopened"); setStep("report");
      } catch (e) { console.error("[calificador] reopen failed:", e); setStep("hero"); }
    })();
  }, []);

  const onSelect = (r) => {
    setRestaurant(r); setStep("scan");
    if (MOCK) MOCK_SCORE.business.displayName = r.name;  // demo report reflects the picked restaurant
    const started = Date.now();
    const scorePromise = MOCK ? Promise.resolve(MOCK_SCORE)
      : fetch("/api/grader/score", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ place_id: r.placeId, session_id: SESSION_ID, funnel_version: FUNNEL_VERSION, zone: ((r.address || "").split(",").slice(1).join(",").trim() || (r.address || "")), fbp: FBP || undefined, fbc: FBC || undefined }) }).then((res) => res.json()).catch(() => ({ ok: false, reason: "error" }));
    // Enrich competitor names for the report card (names come from /nearby, not /score).
    const nearbyPromise = MOCK ? Promise.resolve(null)
      : fetch("/api/diagnostico/nearby?place_id=" + encodeURIComponent(r.placeId)).then((res) => res.ok ? res.json() : null).catch(() => null);
    Promise.all([scorePromise, nearbyPromise]).then(([sc, nb]) => {
      // Success holds the full scan theater (~21s, Owner runs ~40s); failures
      // bail early. Score is stashed as soon as it lands so the scan's browser/
      // phone stages can render the real PSI screenshot before the report shows.
      const ok = sc && sc.ok;
      if (ok) {
        if (nb && nb.competitors) sc.competitors = { ...sc.competitors, list: nb.competitors.filter((c) => c.placeId) };
        setScore(sc);
        // Ads-optimization conversion: same eventID the backend CAPI event uses
        // (grader_score_<session>) so Meta dedups browser+server into one.
        if (!MOCK && typeof fbq === "function") fbq("trackCustom", "GraderScoreGenerated", { content_name: "calificador", score: sc.score && sc.score.value }, { eventID: "grader_score_" + SESSION_ID });
      }
      const wait = Math.max(0, (ok ? SCAN_MIN_MS : 4200) - (Date.now() - started));
      setTimeout(() => {
        if (ok) { clarityStep("report"); setStep("report"); }
        else { setManualReason(sc && sc.reason); setStep("manual"); }
      }, wait);
    });
  };

  return (
    <div>
      <div className="cx-nav"><span className="cx-logo">Flux<span>Sales</span></span><a className="cx-login" href="/">Iniciar sesión</a></div>
      {step === "hero" && <Hero onSelect={onSelect} />}
      {step === "reopening" && <div className="cx-report"><div className="cx-panel" style={{ maxWidth: 420, margin: "60px auto", textAlign: "center" }}><div className="cx-mini" style={{ margin: "0 auto 12px" }} /><p style={{ color: "var(--muted)", fontSize: 14 }}>Abriendo tu reporte…</p></div></div>}
      {step === "scan" && <Scan restaurant={restaurant} score={score} />}
      {step === "report" && score && <Report score={score} restaurant={restaurant} initialUnlocked={reopened} />}
      {step === "manual" && <ManualClose restaurant={restaurant} reason={manualReason} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
