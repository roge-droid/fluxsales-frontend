<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Política de Devoluciones — Fluxsales</title>
<meta name="description" content="Política de devoluciones y reembolsos de Fluxsales.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../landing/styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="../landing/content.js"></script>
<style>
.legal-body { max-width: 780px; margin: 0 auto; padding: 64px 28px 120px; }
.legal-body .eyebrow { margin-bottom: 16px; }
.legal-body h1 {
  font-family: var(--serif);
  font-variation-settings: "opsz" 144, "SOFT" 30;
  font-size: clamp(32px, 4vw, 48px);
  line-height: 1.05; letter-spacing: -0.025em;
  color: var(--ink-soft); font-weight: 400;
  margin: 0 0 12px;
}
.legal-body h1 em {
  font-style: italic; color: var(--green-ink);
  font-variation-settings: "opsz" 144, "SOFT" 80;
}
.legal-body .updated {
  font-family: var(--mono); font-size: 12px;
  letter-spacing: .06em; color: var(--ink-muted);
  margin-bottom: 48px;
}
.legal-body h2 {
  font-family: var(--sans); font-weight: 600;
  font-size: 20px; letter-spacing: -0.01em;
  color: var(--ink); margin: 48px 0 12px;
  padding-top: 24px; border-top: 1px solid var(--rule);
}
.legal-body h2:first-of-type { margin-top: 0; border-top: none; padding-top: 0; }
.legal-body p {
  font-size: 15.5px; line-height: 1.6; color: var(--ink-muted);
  margin: 0 0 16px;
}
.legal-body p strong { color: var(--ink); font-weight: 500; }
.legal-body ul, .legal-body ol { padding-left: 20px; margin: 0 0 16px; }
.legal-body li {
  font-size: 15.5px; line-height: 1.6; color: var(--ink-muted);
  margin-bottom: 8px;
}
.legal-body a { color: var(--green-ink); text-decoration: underline; }
.legal-body a:hover { color: var(--green-deep); }
@media (max-width: 640px) {
  .legal-body { padding: 32px 20px 80px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function LogoMark() {
  return (
    <span className="logo-mark" aria-hidden="true">
      <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
        <g fill="currentColor">
          <rect x="54" y="40" width="50" height="172" rx="6"/>
          <rect x="54" y="40" width="150" height="46" rx="6"/>
          <rect x="54" y="108" width="98" height="38" rx="6"/>
          <path d="M 148 94 Q 152 92 158 96 L 198 124 Q 202 128 198 132 L 158 160 Q 152 164 148 162 L 148 94 Z"/>
        </g>
      </svg>
    </span>
  );
}

function Nav({ lang, setLang }) {
  const t = window.COPY[lang].nav;
  return (
    <header className="nav">
      <div className="wrap nav-inner">
        <a href="/" className="logo">
          <LogoMark />
          <span>Fluxsales</span>
        </a>
        <nav className="nav-links">
          <a href="/#product">{t.product}</a>
          <a href="/#how">{t.howItWorks}</a>
          <a href="/#pricing">{t.pricing}</a>
          <a href="/#stories">{t.stories}</a>
          <a href="/#faq">{lang === "es" ? "Preguntas" : "FAQ"}</a>
        </nav>
        <div className="nav-right">
          <div className="lang-toggle" role="group" aria-label="language">
            <button className={lang === "es" ? "on" : ""} onClick={() => setLang("es")}>ES</button>
            <button className={lang === "en" ? "on" : ""} onClick={() => setLang("en")}>EN</button>
          </div>
          <a href="#" className="btn btn-ghost">{t.login}</a>
          <a href="/demo" className="btn btn-primary">{t.cta} <span className="arr">&rarr;</span></a>
        </div>
      </div>
    </header>
  );
}

function Footer({ lang }) {
  const t = window.COPY[lang].footer;
  return (
    <footer>
      <div className="wrap">
        <div className="foot-grid">
          <div className="foot-brand">
            <a href="/" className="logo"><LogoMark /><span>Fluxsales</span></a>
            <p>{t.tagline}</p>
          </div>
          <div className="foot-col">
            <h4>{t.product}</h4>
            <ul>{t.productLinks.map((l, i) => <li key={i}>{l}</li>)}</ul>
          </div>
          <div className="foot-col">
            <h4>{t.company}</h4>
            <ul>{t.companyLinks.map((l, i) => <li key={i}>{l}</li>)}</ul>
          </div>
          <div className="foot-col">
            <h4>{t.resources}</h4>
            <ul>{t.resourcesLinks.map((l, i) => <li key={i}>{l}</li>)}</ul>
          </div>
        </div>
        <div className="foot-legal">
          <span>{t.legal}</span>
          <span>CDMX &middot; Monterrey &middot; Guadalajara</span>
        </div>
      </div>
    </footer>
  );
}

function ReturnsContent({ lang }) {
  if (lang === "en") {
    return (
      <div className="legal-body">
        <span className="eyebrow">Legal</span>
        <h1>Refund <em>Policy</em></h1>
        <p className="updated">Last updated: May 26, 2026</p>

        <h2>1. Scope</h2>
        <p>This policy applies to all plans and services contracted directly with Fluxsales. For orders placed through restaurants using our platform, the restaurant's refund policy applies.</p>

        <h2>2. Trial period</h2>
        <p>Fluxsales offers a trial period depending on the contracted plan. If you cancel during the trial period, no charge will be made.</p>

        <h2>3. Subscription refunds</h2>
        <p>If you are not satisfied with the service, you can request a refund under the following conditions:</p>
        <ul>
          <li><strong>First 30 days:</strong> full refund, no questions asked</li>
          <li><strong>After 30 days:</strong> prorated refund for the remaining time of the billing period</li>
          <li><strong>Incorrect charges:</strong> full refund of the incorrect amount at any time</li>
        </ul>

        <h2>4. How to request a refund</h2>
        <p>To request a refund:</p>
        <ol>
          <li>Send an email to <a href="mailto:soporte@fluxsales.co">soporte@fluxsales.co</a> with your name, account email, and reason</li>
          <li>Or write to us via <a href="https://wa.me/5214421716825">WhatsApp</a></li>
        </ol>
        <p>We will process your request within a maximum of 10 business days. The refund will be made through the same payment method used for the purchase.</p>

        <h2>5. Exclusions</h2>
        <p>Refunds do not apply for:</p>
        <ul>
          <li>Implementation or setup services already completed</li>
          <li>Commissions on already processed transactions (Flexible plan)</li>
          <li>Additional contracted and delivered services (custom design, custom integrations)</li>
        </ul>

        <h2>6. Cancellation</h2>
        <p>You can cancel your subscription at any time. Cancellation takes effect at the end of the current billing period. No additional periods will be charged after cancellation.</p>

        <h2>7. Contact</h2>
        <p>For questions about refunds or returns:</p>
        <ul>
          <li>Email: <a href="mailto:soporte@fluxsales.co">soporte@fluxsales.co</a></li>
          <li>WhatsApp: <a href="https://wa.me/5214421716825">+52 1 442 171 6825</a></li>
        </ul>
      </div>
    );
  }

  return (
    <div className="legal-body">
      <span className="eyebrow">Legal</span>
      <h1>Política de <em>Devoluciones</em></h1>
      <p className="updated">Última actualización: 26 de mayo de 2026</p>

      <h2>1. Alcance</h2>
      <p>Esta política aplica a todos los planes y servicios contratados directamente con Fluxsales. Para pedidos realizados a través de restaurantes que usan nuestra plataforma, la política de devoluciones del restaurante aplica.</p>

      <h2>2. Período de prueba</h2>
      <p>Fluxsales ofrece un período de prueba según el plan contratado. Si cancelas durante el período de prueba, no se realizará ningún cargo.</p>

      <h2>3. Reembolsos de suscripción</h2>
      <p>Si no estás satisfecho con el servicio, puedes solicitar un reembolso bajo las siguientes condiciones:</p>
      <ul>
        <li><strong>Primeros 30 días:</strong> reembolso completo, sin preguntas</li>
        <li><strong>Después de 30 días:</strong> reembolso proporcional por el tiempo restante del período facturado</li>
        <li><strong>Cobros incorrectos:</strong> reembolso completo del monto incorrecto en cualquier momento</li>
      </ul>

      <h2>4. Cómo solicitar un reembolso</h2>
      <p>Para solicitar un reembolso:</p>
      <ol>
        <li>Envía un email a <a href="mailto:soporte@fluxsales.co">soporte@fluxsales.co</a> con tu nombre, email de cuenta y motivo</li>
        <li>O escríbenos por <a href="https://wa.me/5214421716825">WhatsApp</a></li>
      </ol>
      <p>Procesaremos tu solicitud en un máximo de 10 días hábiles. El reembolso se realizará por el mismo método de pago utilizado para la compra.</p>

      <h2>5. Exclusiones</h2>
      <p>No aplican reembolsos para:</p>
      <ul>
        <li>Servicios de implementación o configuración ya completados</li>
        <li>Comisiones por transacciones ya procesadas (plan Flexible)</li>
        <li>Servicios adicionales contratados y entregados (diseño personalizado, integraciones a medida)</li>
      </ul>

      <h2>6. Cancelación</h2>
      <p>Puedes cancelar tu suscripción en cualquier momento. La cancelación toma efecto al final del período de facturación actual. No se cobrarán períodos adicionales después de la cancelación.</p>

      <h2>7. Contacto</h2>
      <p>Para preguntas sobre devoluciones o reembolsos:</p>
      <ul>
        <li>Email: <a href="mailto:soporte@fluxsales.co">soporte@fluxsales.co</a></li>
        <li>WhatsApp: <a href="https://wa.me/5214421716825">+52 1 442 171 6825</a></li>
      </ul>
    </div>
  );
}

function App() {
  const [lang, setLang] = React.useState(() => {
    try { return localStorage.getItem("flux_lang") || "es"; } catch { return "es"; }
  });
  React.useEffect(() => {
    try { localStorage.setItem("flux_lang", lang); document.documentElement.lang = lang; } catch {}
  }, [lang]);

  return (
    <>
      <Nav lang={lang} setLang={setLang} />
      <ReturnsContent lang={lang} />
      <section className="endcta" id="demo">
        <div className="wrap">
          <span className="eyebrow" style={{ color: "#0d2c20" }}>{lang === "es" ? "Último paso" : "Last step"}</span>
          <h2 className="display h2" style={{ margin: "16px auto 16px", maxWidth: "14ch" }}>
            {lang === "es" ? "Dale superpoderes a tu restaurante." : "Give your restaurant superpowers."}
          </h2>
          <p>{lang === "es" ? "Demo gratuita de 20 minutos. Te mostramos resultados con tus propios números." : "20-minute free demo. We'll show you results using your own numbers."}</p>
          <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
            <a className="btn btn-primary" href="/demo">{lang === "es" ? "Agenda una demo" : "Book a demo"} &rarr;</a>
            <a className="btn btn-secondary" href="https://wa.me/5214421716825">{lang === "es" ? "Hablar por WhatsApp" : "WhatsApp us"}</a>
          </div>
        </div>
      </section>
      <Footer lang={lang} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
