function DeletionForm() {
  const [email, setEmail] = React.useState("");
  const [reason, setReason] = React.useState("");
  const [submitting, setSubmitting] = React.useState(false);
  const [success, setSuccess] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [confirmationCode, setConfirmationCode] = React.useState(null);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!email.trim()) return;
    setSubmitting(true);
    setError(null);

    try {
      const res = await fetch("/api/data-deletion", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email.trim(), reason: reason.trim() }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || "Error al procesar tu solicitud.");
      }
      const data = await res.json();
      setConfirmationCode(data.confirmationCode || "DEL-" + Date.now().toString(36).toUpperCase());
      setSuccess(true);
    } catch (err) {
      setError(err.message);
    } finally {
      setSubmitting(false);
    }
  };

  if (success) {
    return (
      <div className="del-form">
        <div className="del-success">
          <div className="check">&#10003;</div>
          <h3 style={{ textAlign: "center" }}>Solicitud recibida</h3>
          <p style={{ color: "var(--ink-muted)", textAlign: "center", margin: "0 0 12px" }}>
            Tu solicitud de eliminación ha sido registrada. Recibirás un email de confirmación en 48 horas.
          </p>
          <p style={{ fontFamily: "var(--mono)", fontSize: 13, color: "var(--green-ink)", textAlign: "center" }}>
            Código de seguimiento: {confirmationCode}
          </p>
        </div>
      </div>
    );
  }

  return (
    <form className="del-form" onSubmit={handleSubmit}>
      <h3>Solicitar eliminación de datos</h3>
      {error && <div className="del-error">{error}</div>}
      <div className="del-field">
        <label>Email registrado</label>
        <input
          type="email"
          placeholder="tu@email.com"
          value={email}
          onChange={(e) => setEmail(e.target.value)}
          required
        />
      </div>
      <div className="del-field">
        <label>Motivo (opcional)</label>
        <textarea
          placeholder="Cuéntanos por qué deseas eliminar tus datos..."
          value={reason}
          onChange={(e) => setReason(e.target.value)}
        />
      </div>
      <button type="submit" className="del-submit" disabled={!email.trim() || submitting}>
        {submitting ? "Enviando..." : "Solicitar eliminación"}
      </button>
    </form>
  );
}
