<noscript><div style="max-width:560px;margin:40px auto;padding:0 20px;font-family:sans-serif">

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

const PARAMS = new URLSearchParams(location.search);
const MOCK = PARAMS.get("mock") === "1";
const TOKEN = PARAMS.get("t") || "";
const SESSION_ID = "sitio-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
const WA = "5214425975307";

function fireEvent(eventType, placeId) {
  fetch("/api/diagnostico/event", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ event_type: eventType, place_id: placeId || "", session_id: SESSION_ID, funnel: "grader", funnel_version: "v2-calificador-aiweb" }),
  }).catch(() => {});
}

// ── Review-mined dishes ("Lo más pedido") ─────────────────────────────────────
// The reviews name the best-sellers — real, first-party menu signal that Owner's
// preview doesn't use (theirs shows skeleton rows). Longest-first matching with
// span consumption so "tacos al pastor" doesn't also count "pastor"/"tacos".
const DISH_LEXICON = ["tacos al pastor","tacos de canasta","tacos dorados","pescado zarandeado","pastel de tres leches","tostadas de atún","cochinita pibil","café de olla","tres leches","quesabirria","al pastor","suadero","birria","carnitas","barbacoa","cochinita","gringas","gringa","volcanes","volcán","alambres","alambre","arrachera","costillas","chuletas","chuleta","pozole","chilaquiles","enchiladas","quesadillas","sopes","huaraches","tlayudas","tamales","flautas","tostadas","tortas","pambazos","elotes","esquites","aguachile","ceviche","camarones","pulpo","mojarra","micheladas","margaritas","horchata","flan","churros","cheesecake","pizzas","pizza","hamburguesas","hamburguesa","alitas","boneless","sushi","ramen","lasaña","pasta","crepas","waffles","hotcakes","molletes","mole","burritos","nachos","guacamole","pastor","tacos","mariscos"].sort((a, b) => b.length - a.length);
const deacc = (s) => (s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
function mineDishes(reviews, max) {
  const found = new Map();
  for (const rv of reviews || []) {
    if (!rv || !rv.text || (rv.rating || 0) < 4) continue;  // only praise names best-sellers
    let t = deacc(rv.text);
    for (const dish of DISH_LEXICON) {
      const d = deacc(dish);
      let idx, hit = false;
      while ((idx = t.indexOf(d)) !== -1) {
        const b = idx === 0 ? " " : t[idx - 1];
        const a = idx + d.length >= t.length ? " " : t[idx + d.length];
        if (/[^a-z0-9ñ]/.test(b) && /[^a-z0-9ñ]/.test(a)) hit = true;
        t = t.slice(0, idx) + "␀".repeat(d.length) + t.slice(idx + d.length);
      }
      if (hit) {
        const cur = found.get(d) || { name: dish[0].toUpperCase() + dish.slice(1), count: 0 };
        cur.count++;
        found.set(d, cur);
      }
    }
  }
  // Merge same-dish variants named across different reviews ("pastor" +
  // "tacos al pastor" + "gringa"/"gringas") into the most specific name.
  const entries = [...found.entries()].map(([canon, v]) => ({ canon, ...v }))
    .sort((x, y) => y.canon.length - x.canon.length);
  const merged = [];
  for (const e of entries) {
    const host = merged.find((m) => m.canon.includes(e.canon) || e.canon.includes(m.canon));
    if (host) host.count += e.count;
    else merged.push(e);
  }
  return merged.sort((x, y) => y.count - x.count).slice(0, max || 4);
}

const MOCK_PHOTO = (emoji, bg) => "data:image/svg+xml;utf8," + encodeURIComponent(
  `<svg xmlns='http://www.w3.org/2000/svg' width='800' height='600'><rect width='800' height='600' fill='${bg}'/><text x='400' y='340' font-size='170' text-anchor='middle'>${emoji}</text></svg>`);
const MOCK_DATA = {
  placeId: "mock", name: "Tacos Don Lupe", category: "Restaurante mexicano",
  rating: 4.6, reviewCount: 248, price: "$$",
  address: "Av. Insurgentes Sur 123, Roma Norte, CDMX",
  phone: "(55) 1234 5678", mapsUri: "https://maps.google.com",
  summary: "Taquería tradicional con tacos al pastor, especialidades caseras y ambiente familiar.",
  hours: ["lunes: 12:00–22:00", "martes: 12:00–22:00", "miércoles: 12:00–22:00", "jueves: 12:00–22:00", "viernes: 12:00–23:00", "sábado: 12:00–23:00", "domingo: 12:00–20:00"],
  photoUrls: [MOCK_PHOTO("🌮","#fde9c8"), MOCK_PHOTO("🥘","#f8d8cc"), MOCK_PHOTO("🍹","#d8ecdf"), MOCK_PHOTO("🫓","#e8e0f4"), MOCK_PHOTO("🍮","#fbe3ec"), MOCK_PHOTO("🧀","#fde9c8")],
  reviews: [
    { author: "María Fernanda", avatar: null, rating: 5, when: "hace un mes", text: "Los mejores tacos al pastor de la zona, la salsa de la casa es increíble. El servicio siempre amable y rápido." },
    { author: "Carlos Hernández", avatar: null, rating: 5, when: "hace 2 meses", text: "Fuimos en familia y todo espectacular. Las porciones generosas y los precios justos. Muy recomendado." },
    { author: "Lucía Gómez", avatar: null, rating: 5, when: "hace 2 semanas", text: "El pastor y las gringas son otro nivel. Siempre que venimos a la colonia caemos aquí." },
  ],
  menuItems: [
    { name: "Orden de tacos al pastor (5)", priceMxn: 95 },
    { name: "Gringa de pastor", priceMxn: 75 },
    { name: "Quesadilla con todo", priceMxn: 60 },
    { name: "Agua fresca del día", priceMxn: 35 },
  ],
};

// ── Data loading ──────────────────────────────────────────────────────────────
// mock → canned data; otherwise the token is validated first (invalid/expired
// links never render a site) and the restaurant's data is fetched fresh via the
// Places SDK — the full field mask (hours/phone/address) beats reusing the
// leaner data /calificador fetched on pick.
const txt = (v) => (v == null ? "" : typeof v === "object" ? v.text || "" : String(v));
async function fetchPlace(placeId) {
  const lib = await google.maps.importLibrary("places");
  const place = new lib.Place({ id: placeId });
  await place.fetchFields({ fields: ["displayName", "formattedAddress", "rating", "userRatingCount", "priceLevel", "photos", "reviews", "editorialSummary", "primaryTypeDisplayName", "regularOpeningHours", "nationalPhoneNumber", "googleMapsUri"] });
  const photoUrls = (place.photos || []).slice(0, 6).map((ph) => { try { return ph.getURI({ maxWidth: 1400 }); } catch (e) { return null; } }).filter(Boolean);
  const reviews = (place.reviews || []).slice(0, 6).map((rv) => ({
    author: (rv.authorAttribution && rv.authorAttribution.displayName) || "Cliente",
    avatar: (rv.authorAttribution && rv.authorAttribution.photoURI) || null,
    rating: rv.rating || null,
    when: rv.relativePublishTimeDescription || "",
    text: txt(rv.text),
  }));
  return {
    placeId,
    name: txt(place.displayName),
    category: txt(place.primaryTypeDisplayName),
    rating: place.rating || null,
    reviewCount: place.userRatingCount || null,
    price: { FREE: "$", INEXPENSIVE: "$", MODERATE: "$$", EXPENSIVE: "$$$", VERY_EXPENSIVE: "$$$$" }[place.priceLevel] || null,
    address: txt(place.formattedAddress),
    phone: place.nationalPhoneNumber || null,
    mapsUri: place.googleMapsUri || null,
    summary: txt(place.editorialSummary),
    hours: (place.regularOpeningHours && place.regularOpeningHours.weekdayDescriptions) || [],
    photoUrls, reviews,
  };
}

async function loadSite() {
  if (MOCK) return { data: MOCK_DATA };
  if (!TOKEN) return { error: "no_token" };
  const v = await fetch("/api/grader/site-token?t=" + encodeURIComponent(TOKEN)).then((r) => r.json()).catch(() => null);
  if (!v || !v.ok) return { error: (v && v.reason) === "expired" ? "expired" : "invalid" };
  try {
    const data = await fetchPlace(v.place_id);
    if (!data.name) return { error: "fetch" };
    // Real menu items (name + price) parsed server-side from the restaurant's
    // CURRENT site during the scan — handed off by /calificador via localStorage.
    // Same-device only; a shared link simply falls back to review-mined dishes.
    try {
      const mi = JSON.parse(localStorage.getItem("cx-menu:" + v.place_id) || "null");
      if (Array.isArray(mi) && mi.length) data.menuItems = mi;
    } catch (e) {}
    return { data };
  } catch (e) { console.error("[sitio] places fetch:", e); return { error: "fetch" }; }
}

function Stars({ rating, className }) {
  const full = Math.round(rating || 0);
  return <span className={"sw-stars" + (className ? " " + className : "")}>{[0,1,2,3,4].map((i) => <span key={i} style={i < full ? {} : { color: "#d9d6cd" }}>★</span>)}</span>;
}

// ── Activation modal (every order/activate action lands here — the preview's
// honest conversion: this becomes a real site in the demo) ───────────────────
function ActivateModal({ site, onClose }) {
  const wa = "https://wa.me/" + WA + "?text=" + encodeURIComponent(`Hola, vi el sitio que la IA generó para ${site.name} y quiero activarlo`);
  return (
    <div className="sw-modal-bg" onClick={onClose}>
      <div className="sw-modal" onClick={(e) => e.stopPropagation()}>
        <div className="ic">✨</div>
        <h3>Esto es una vista previa</h3>
        <p>Tu sitio real con FluxSales recibe pedidos directos <b>sin comisiones</b>, con tu menú completo y pagos en línea. Actívalo en una demo de 20 minutos.</p>
        <a className="sw-btn sw-btn--wa" style={{ display: "block", textDecoration: "none" }} href={wa} target="_blank" rel="noopener"
          onClick={() => fireEvent("grader_site_cta_clicked", site.placeId)}>Activar mi sitio por WhatsApp</a>
        <a className="sw-btn sw-btn--primary" style={{ display: "block", textDecoration: "none" }} href="/calificador?src=sitio"
          onClick={() => fireEvent("grader_site_cta_clicked", site.placeId)}>Ver mi Calificación Digital</a>
        <button className="sw-close" onClick={onClose}>Seguir viendo la vista previa</button>
      </div>
    </div>
  );
}

function Site({ site }) {
  const [modal, setModal] = useState(false);
  const [built, setBuilt] = useState(false);
  useEffect(() => {
    fireEvent("grader_site_opened", site.placeId);
    if (typeof fbq === "function") fbq("trackCustom", "GraderSiteOpened");
    const t = setTimeout(() => setBuilt(true), 100);  // arm the reveal animation
    return () => clearTimeout(t);
  }, []);
  const open = () => setModal(true);
  const photos = site.photoUrls || [];
  const revs = (site.reviews || []).filter((r) => (r.rating || 0) >= 4 && r.text).slice(0, 3);
  const dishes = mineDishes(site.reviews, 4);
  const menuItems = (site.menuItems || []).slice(0, 6);
  const tagline = site.summary || `${site.category || "Restaurante"} en tu zona — pide directo, sin comisiones de apps.`;
  const d = (i) => ({ animationDelay: (0.15 + i * 0.45) + "s" });
  const CHIPS = [
    dishes.length >= 2 || menuItems.length ? ["#pedido", "Lo más pedido"] : null,
    revs.length ? ["#resenas", "Reseñas"] : null,
    photos.length > 1 ? ["#galeria", "Galería"] : null,
    ["#visita", "Horarios y ubicación"],
  ].filter(Boolean);
  return (
    <div className={built ? "sw-build" : "sw-build"}>
      <div className="sw-ribbon">✨ Vista previa generada con IA por <b>FluxSales</b> — <a href="#activar" onClick={(e) => { e.preventDefault(); open(); }}>así se vería tu sitio optimizado</a></div>
      <nav className="sw-nav sw-reveal" style={d(0)}>
        <span className="sw-name">{site.name}</span>
        <button className="sw-order" onClick={open}>Ordenar en línea</button>
      </nav>
      <header className="sw-hero sw-reveal" style={d(1)}>
        {photos[0] && <img src={photos[0]} alt={site.name} />}
        <div className="sw-hero-ov" />
        <div className="sw-hero-body">
          {site.rating != null && <span className="sw-kicker">★ {site.rating.toFixed(1)} en Google · {site.reviewCount} reseñas</span>}
          <h1>{site.name}</h1>
          <p className="sw-tag">{tagline}</p>
          <div className="sw-hero-ctas">
            <button className="sw-btn sw-btn--primary" onClick={open}>Ordenar en línea</button>
            <button className="sw-btn sw-btn--ghost" onClick={open}>Ver menú</button>
          </div>
        </div>
      </header>
      <div className="sw-strip sw-reveal" style={d(2)}>
        {site.rating != null && <span><Stars rating={site.rating} /> <b>{site.rating.toFixed(1)}</b> ({site.reviewCount} reseñas)</span>}
        {site.category && <React.Fragment><span className="sep">·</span><span>{site.category}</span></React.Fragment>}
        {site.price && <React.Fragment><span className="sep">·</span><span>{site.price}</span></React.Fragment>}
        <span className="sep">·</span><span>Pedidos directos <b>sin comisiones</b></span>
      </div>
      <div className="sw-chips sw-reveal" style={d(2)}>
        {CHIPS.map(([href, label]) => <a key={href} href={href}>{label}</a>)}
      </div>

      {(dishes.length >= 2 || menuItems.length > 0) && (
        <section className="sw-sec sw-reveal" style={d(3)} id="pedido">
          <h2>Lo más pedido</h2>
          <p className="sw-lead">{dishes.length >= 2
            ? "Los platillos que tus clientes mencionan en sus reseñas de Google."
            : "Platillos de tu menú actual."}</p>
          {dishes.length >= 2 && (
            <div className="sw-dishes">
              {dishes.map((dish, i) => (
                <button type="button" className="sw-dish" key={dish.name} onClick={open}>
                  <img src={photos[(i + 1) % Math.max(photos.length, 1)] || photos[0]} alt="" loading="lazy" />
                  <span className="add">+</span>
                  <span className="bd">
                    <b>{dish.name}</b>
                    <span className="src"><span className="st">★</span> Mencionado en tus reseñas{dish.count > 1 ? ` ×${dish.count}` : ""}</span>
                  </span>
                </button>
              ))}
            </div>
          )}
          {menuItems.length > 0 && (
            <div className="sw-menu">
              {menuItems.map((it) => (
                <button type="button" className="sw-menu-row" key={it.name} onClick={open}>
                  <b>{it.name}</b><span className="dots" /><span className="pr">${it.priceMxn}</span>
                </button>
              ))}
              <div className="sw-menu-note">Precios tomados de tu menú actual. Con FluxSales tu menú completo se importa y se mantiene al día.</div>
            </div>
          )}
        </section>
      )}

      {revs.length > 0 && (
        <section className="sw-sec sw-reveal" style={d(3)} id="resenas">
          <h2>Lo que dicen los clientes</h2>
          <p className="sw-lead">Reseñas reales de Google.</p>
          <div className="sw-revs">
            {revs.map((rv, i) => (
              <div className="sw-rev" key={i}>
                <Stars rating={rv.rating} />
                <p>“{rv.text.length > 170 ? rv.text.slice(0, 170) + "…" : rv.text}”</p>
                <div className="sw-who">
                  <span className="sw-av">{rv.avatar ? <img src={rv.avatar} alt="" /> : (rv.author || "C")[0]}</span>
                  <span><b>{rv.author}</b><span>{rv.when}</span></span>
                </div>
              </div>
            ))}
          </div>
        </section>
      )}

      {photos.length > 1 && (
        <section className="sw-sec sw-reveal" style={d(4)} id="galeria">
          <h2>Un vistazo</h2>
          <p className="sw-lead">Fotos de tu perfil de Google.</p>
          <div className="sw-gal">
            {photos.slice(1, 6).map((u, i) => <img key={i} src={u} alt="" loading="lazy" />)}
          </div>
        </section>
      )}

      <section className="sw-sec sw-reveal" style={d(5)} id="visita">
        <h2>Visítanos</h2>
        <p className="sw-lead">Horarios y ubicación.</p>
        <div className="sw-info">
          {site.hours.length > 0 && (
            <div className="sw-card">
              <h3>Horarios</h3>
              <ul className="sw-hours">
                {site.hours.map((h, i) => { const ix = h.indexOf(":"); return (
                  <li key={i}><span style={{ textTransform: "capitalize" }}>{ix > 0 ? h.slice(0, ix) : h}</span><b>{ix > 0 ? h.slice(ix + 1).trim() : ""}</b></li>
                ); })}
              </ul>
            </div>
          )}
          <div className="sw-card">
            <h3>Contacto</h3>
            {site.address && <div className="sw-row">📍 <span>{site.address}{site.mapsUri && <React.Fragment><br /><a href={site.mapsUri} target="_blank" rel="noopener">Cómo llegar →</a></React.Fragment>}</span></div>}
            {site.phone && <div className="sw-row">📞 <a href={"tel:" + site.phone.replace(/\D/g, "")}>{site.phone}</a></div>}
            <div className="sw-row">🛵 <span>Pedidos en línea directos, <b>sin comisiones</b> de apps</span></div>
          </div>
        </div>
      </section>

      <div className="sw-cta sw-reveal" style={d(6)} id="activar">
        <div className="sw-cta-inner">
          <h2>¿Es tu restaurante? Este sitio está listo.</h2>
          <p>La IA lo generó con tus datos reales de Google. Actívalo con FluxSales y empieza a recibir pedidos directos sin pagar comisiones — lo dejamos funcionando contigo en una demo de 20 minutos.</p>
          <button className="sw-btn sw-btn--primary" onClick={open}>Activar mi sitio →</button>
        </div>
      </div>

      <div className="sw-foot">Vista previa ilustrativa generada con los datos públicos de Google de {site.name}. No es el sitio oficial del restaurante.<br />
        Generado con IA por <a href="/">FluxSales</a> · <a href="/calificador?src=sitio">Califica tu restaurante gratis</a></div>

      {modal && <ActivateModal site={site} onClose={() => setModal(false)} />}
    </div>
  );
}

function App() {
  const [state, setState] = useState({ loading: true });
  useEffect(() => { loadSite().then((r) => setState({ loading: false, ...r })); }, []);
  if (state.loading) return (
    <div className="sw-center"><div className="sw-spin" /><h2>Generando tu sitio…</h2><p>La IA está armando la vista previa con tus datos reales de Google.</p></div>
  );
  if (state.error) {
    const msg = state.error === "expired"
      ? { t: "Este enlace expiró", p: "Los enlaces de vista previa duran 30 días. Genera tu Calificación Digital de nuevo y obtén un enlace nuevo — toma 30 segundos." }
      : { t: "Enlace no válido", p: "Esta vista previa se genera desde tu Calificación Digital. Escanea tu restaurante gratis y al final verás tu sitio optimizado." };
    return (
      <div className="sw-center"><div style={{ fontSize: 38, marginBottom: 8 }}>🔗</div><h2>{msg.t}</h2><p>{msg.p}</p>
        <a className="sw-btn sw-btn--primary" style={{ textDecoration: "none" }} href="/calificador?src=sitio">Obtener mi Calificación Digital →</a></div>
    );
  }
  return <Site site={state.data} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
