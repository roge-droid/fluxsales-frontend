<style>
/* —— Slim config nav —— */
.cfg-nav {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: saturate(1.4) blur(12px);
  background: rgba(255, 255, 255, 0.82);
  border-bottom: 1px solid rgba(231, 228, 221, 0.8);
}
.cfg-nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 58px; max-width: 1400px; margin: 0 auto; padding: 0 28px;
}
.cfg-nav-center {
  font-family: var(--mono); font-size: 12px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink-muted);
}
.cfg-nav-right .btn { padding: 8px 16px; font-size: 13px; }

/* —— Floating badge —— */
.cfg-badge {
  position: sticky; top: 62px; z-index: 40;
  display: flex; justify-content: center;
  padding: 10px 0 0;
  pointer-events: none;
}
.cfg-badge-inner {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 16px; border-radius: 999px;
  background: var(--green-wash); border: 1px solid var(--green);
  font-family: var(--mono); font-size: 11px;
  letter-spacing: .06em; color: var(--green-deep);
  pointer-events: auto;
  box-shadow: 0 2px 12px rgba(87,185,144,.15);
}
.cfg-badge-inner .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); animation: pulseGreen 2s infinite;
}
@keyframes pulseGreen {
  0%,100% { box-shadow: 0 0 0 0 rgba(87,185,144,.4); }
  50% { box-shadow: 0 0 0 8px rgba(87,185,144,0); }
}

/* —— Two-panel layout —— */
.prop-layout {
  display: grid; grid-template-columns: 460px 1fr;
  gap: 32px; max-width: 1400px; margin: 0 auto;
  padding: 24px 28px 80px;
  align-items: start;
}

/* —— Left panel: config form —— */
.prop-form {
  background: var(--card); border: 1px solid var(--rule);
  border-radius: var(--radius-lg); padding: 32px 28px 36px;
  box-shadow: var(--shadow);
}
.prop-form-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px;
}
.prop-form-header .icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--green-wash); color: var(--green-ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex: none;
}
.prop-form-header h2 {
  font-family: var(--serif);
  font-variation-settings: "opsz" 144, "SOFT" 30;
  font-size: 22px; letter-spacing: -0.02em;
  color: var(--ink); font-weight: 400; margin: 0;
}
.prop-form-sub {
  font-size: 13px; color: var(--ink-muted); margin: 0 0 28px;
  padding-left: 48px;
}
.prop-form-divider {
  border: none; border-top: 1px solid var(--rule);
  margin: 24px 0;
}

/* —— Form fields —— */
.pf-field { margin-bottom: 18px; }
.pf-field label {
  display: block; font-size: 14px; color: var(--ink-soft);
  font-weight: 500; margin-bottom: 6px;
}
.pf-field label .req { color: var(--green-ink); }
.pf-field input,
.pf-field textarea {
  width: 100%; padding: 11px 14px; font-size: 15px;
  border: 1px solid var(--rule); border-radius: 10px;
  background: var(--cream-2); color: var(--ink);
  font-family: var(--sans); outline: none; transition: border-color .2s;
}
.pf-field input:focus,
.pf-field textarea:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(87,185,144,.12); }
.pf-field input::placeholder,
.pf-field textarea::placeholder { color: var(--ink-muted); opacity: .6; }
.pf-field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

/* —— Sliders —— */
.pf-slider { margin-bottom: 24px; }
.pf-slider-top {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 10px;
}
.pf-slider-top .lab { font-size: 14px; color: var(--ink-soft); font-weight: 500; }
.pf-slider-top .val {
  font-family: var(--serif); font-variation-settings: "opsz" 144;
  font-size: 22px; letter-spacing: -0.02em;
  color: var(--green-ink); line-height: 1;
}
.pf-slider input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 6px; border-radius: 99px;
  background: var(--rule); outline: none; margin: 0;
}
.pf-slider input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--green); border: 3px solid var(--cream);
  box-shadow: 0 2px 8px rgba(0,0,0,.15); cursor: pointer;
}
.pf-slider input[type=range]::-moz-range-thumb {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--green); border: 3px solid var(--cream);
  cursor: pointer;
}
.pf-slider-range {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 10px; color: var(--ink-muted);
  letter-spacing: .06em; margin-top: 6px;
}

/* —— Submit button —— */
.pf-btn {
  width: 100%; padding: 14px 20px; font-size: 15px; font-weight: 500;
  background: var(--green); color: var(--green-deep);
  border: none; border-radius: 999px; cursor: pointer;
  font-family: var(--sans); transition: .2s;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 8px;
}
.pf-btn:hover { background: var(--green-ink); color: var(--cream); transform: translateY(-1px); }
.pf-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
.pf-btn:disabled:hover { background: var(--green); color: var(--green-deep); }
.pf-btn svg { width: 16px; height: 16px; }

/* —— Success state —— */
.pf-success {
  text-align: center; padding: 32px 20px;
}
.pf-success .check {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--green); color: var(--green-deep);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; margin: 0 auto 16px;
}
.pf-success h3 {
  font-family: var(--serif);
  font-variation-settings: "opsz" 144, "SOFT" 40;
  font-size: 24px; color: var(--ink); font-weight: 400;
  margin: 0 0 12px;
}
.pf-success .url-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--cream-2); border: 1px solid var(--rule);
  border-radius: 10px; padding: 10px 14px; margin: 16px 0;
  font-family: var(--mono); font-size: 13px; color: var(--ink);
  word-break: break-all;
}
.pf-success .url-box .url-text { flex: 1; text-align: left; }
.pf-success .url-box .copy-btn {
  flex: none; padding: 6px 12px; font-size: 12px;
  background: var(--green); color: var(--green-deep);
  border: none; border-radius: 6px; cursor: pointer;
  font-family: var(--mono); font-weight: 500;
  letter-spacing: .04em; transition: .2s;
}
.pf-success .url-box .copy-btn:hover { background: var(--green-ink); color: var(--cream); }
.pf-success .reset-link {
  display: inline-block; margin-top: 12px;
  font-size: 13px; color: var(--green-ink); cursor: pointer;
  text-decoration: underline;
}
.pf-success .reset-link:hover { color: var(--green-deep); }

/* —— Error state —— */
.pf-error {
  background: rgba(196,90,42,.08); border: 1px solid rgba(196,90,42,.3);
  border-radius: 8px; padding: 10px 14px; margin-bottom: 14px;
  font-size: 13px; color: #c45a2a;
}

/* —— Right panel: live preview —— */
.prop-preview {
  position: sticky; top: 88px;
  overflow-y: auto;
  max-height: calc(100vh - 100px);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  background: var(--cream);
  box-shadow: var(--shadow);
}
.prop-preview-inner {
  transform: scale(0.65);
  transform-origin: top left;
  width: 153.85%;  /* 1 / 0.65 = ~153.85% to fill the container */
}
.prop-preview-label {
  position: absolute; top: 12px; right: 12px;
  font-family: var(--mono); font-size: 10px;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--ink-muted); background: var(--cream-2);
  border: 1px solid var(--rule); border-radius: 6px;
  padding: 4px 8px; z-index: 2;
}
.prop-preview-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 500px; text-align: center; padding: 40px;
  color: var(--ink-muted);
}
.prop-preview-empty .icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
.prop-preview-empty p { font-size: 14px; max-width: 28ch; }

/* —— Responsive —— */
@media (max-width: 1100px) {
  .prop-layout { grid-template-columns: 1fr; max-width: 560px; }
  .prop-preview { display: none; }
  .cfg-nav-right { display: none; }
}
@media (max-width: 640px) {
  .prop-form { padding: 24px 20px 28px; }
  .prop-form-sub { padding-left: 0; }
  .cfg-nav-inner { padding: 0 16px; }
  .prop-layout { padding: 16px 16px 60px; }
}
</style>

<script type="text/babel">
const API_URL = "/api/proposals";

/* —— Helpers —— */
const fmtMXN = (n) => "$" + Math.round(n).toLocaleString("es-MX");
const fmtNum = (n) => Math.round(n).toLocaleString("es-MX");
const fmtPct = (n) => n + "%";
const todayStr = () => {
  const d = new Date();
  const months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
};

/* —— Logo —— */
function LogoMark() {
  return (
    <span className="logo-mark" aria-hidden="true">
      <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
        <g fill="currentColor">
          <rect x="54" y="40" width="50" height="172" rx="6"/>
          <rect x="54" y="40" width="150" height="46" rx="6"/>
          <rect x="54" y="108" width="98" height="38" rx="6"/>
          <path d="M 148 94 Q 152 92 158 96 L 198 124 Q 202 128 198 132 L 158 160 Q 152 164 148 162 L 148 94 Z"/>
        </g>
      </svg>
    </span>
  );
}

/* —— Icons —— */
function GearIcon() {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  );
}

function LinkIcon() {
  return (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
  );
}

function CheckIcon() {
  return (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  );
}

function CopyIcon() {
  return (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>
  );
}

function EyeIcon() {
  return (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  );
}


/* —— Compute derived values —— */
function computeMetrics(form) {
  const { locations, monthlyOrders, avgTicket, commissionRate, migrationRate } = form;
  const monthlySavings = locations * monthlyOrders * avgTicket * (commissionRate / 100) * (migrationRate / 100);
  const annualSavings = monthlySavings * 12;
  const monthlyLoyaltyRevenue = locations * monthlyOrders * avgTicket * 0.10 * (migrationRate / 100);
  const totalAnnualBenefit = annualSavings + (monthlyLoyaltyRevenue * 12);
  return { monthlySavings, annualSavings, monthlyLoyaltyRevenue, totalAnnualBenefit };
}


/* —— Slim nav —— */
function ConfigNav({ onScrollPreview }) {
  return (
    <header className="cfg-nav">
      <div className="cfg-nav-inner">
        <a href="/" className="logo">
          <LogoMark />
          <span>Fluxsales</span>
        </a>
        <div className="cfg-nav-center">Configurar Propuesta</div>
        <div className="cfg-nav-right">
          <button className="btn btn-secondary" onClick={onScrollPreview}
            style={{ padding: "8px 16px", fontSize: 13 }}>
            Vista previa <span style={{ marginLeft: 4 }}>&rarr;</span>
          </button>
        </div>
      </div>
    </header>
  );
}


/* —— Floating badge —— */
function FloatingBadge({ restaurantName }) {
  if (!restaurantName) return null;
  return (
    <div className="cfg-badge">
      <div className="cfg-badge-inner">
        <span className="dot" />
        <span>Generado para: {restaurantName} | {todayStr()}</span>
      </div>
    </div>
  );
}


/* —— Slider component —— */
function Slider({ label, value, min, max, step, format, onChange }) {
  const displayVal = format ? format(value) : value;
  return (
    <div className="pf-slider">
      <div className="pf-slider-top">
        <span className="lab">{label}</span>
        <span className="val">{displayVal}</span>
      </div>
      <input type="range" min={min} max={max} step={step}
        value={value} onChange={(e) => onChange(Number(e.target.value))} />
      <div className="pf-slider-range">
        <span>{format ? format(min) : min}</span>
        <span>{format ? format(max) : max}</span>
      </div>
    </div>
  );
}


/* —— Live preview panel —— */
function LivePreview({ form, metrics }) {
  const { restaurantName, contactName, contactEmail, contactPhone,
          locations, monthlyOrders, avgTicket, commissionRate,
          migrationRate, customMessage } = form;
  const { monthlySavings, annualSavings, monthlyLoyaltyRevenue, totalAnnualBenefit } = metrics;

  // If ProposalDoc component is loaded from components.js, use it
  const ProposalDocument = window.ProposalDoc && window.ProposalDoc.ProposalDocument;

  if (ProposalDocument) {
    return (
      <div className="prop-preview">
        <div className="prop-preview-label">Vista previa en vivo</div>
        <div className="prop-preview-inner">
          <ProposalDocument
            restaurantName={restaurantName || "Tu Restaurante"}
            contactName={contactName}
            contactEmail={contactEmail}
            contactPhone={contactPhone}
            locations={locations}
            monthlyOrders={monthlyOrders}
            avgTicket={avgTicket}
            commissionRate={commissionRate}
            migrationRate={migrationRate}
            customMessage={customMessage}
            monthlySavings={monthlySavings}
            annualSavings={annualSavings}
            monthlyLoyaltyRevenue={monthlyLoyaltyRevenue}
            totalAnnualBenefit={totalAnnualBenefit}
          />
        </div>
      </div>
    );
  }

  // Fallback: inline preview summary
  return (
    <div className="prop-preview" style={{ position: "relative" }}>
      <div className="prop-preview-label">Vista previa en vivo</div>
      <div style={{ padding: "40px 32px" }}>
        <div style={{ fontFamily: "var(--mono)", fontSize: 11, letterSpacing: ".08em",
          textTransform: "uppercase", color: "var(--green-ink)", marginBottom: 20 }}>
          Propuesta personalizada
        </div>
        <h2 style={{ fontFamily: "var(--serif)", fontVariationSettings: '"opsz" 144, "SOFT" 30',
          fontSize: 32, lineHeight: 1.05, letterSpacing: "-0.02em",
          color: "var(--ink)", fontWeight: 400, margin: "0 0 8px" }}>
          {restaurantName || "Tu Restaurante"}
        </h2>
        {contactName && (
          <p style={{ fontSize: 14, color: "var(--ink-muted)", margin: "0 0 32px" }}>
            Preparado para {contactName}
            {contactEmail ? ` — ${contactEmail}` : ""}
          </p>
        )}
        {!contactName && <div style={{ height: 32 }} />}

        {customMessage && (
          <div style={{ background: "var(--green-100)", borderRadius: 10,
            padding: "16px 18px", marginBottom: 24, fontSize: 14,
            color: "var(--green-deep)", lineHeight: 1.5, fontStyle: "italic" }}>
            {customMessage}
          </div>
        )}

        <div style={{ borderTop: "1px solid var(--rule)", paddingTop: 24, marginBottom: 24 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
            <div>
              <div style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: ".08em",
                textTransform: "uppercase", color: "var(--ink-muted)", marginBottom: 6 }}>Sucursales</div>
              <div style={{ fontFamily: "var(--serif)", fontSize: 28, color: "var(--ink)" }}>{locations}</div>
            </div>
            <div>
              <div style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: ".08em",
                textTransform: "uppercase", color: "var(--ink-muted)", marginBottom: 6 }}>Pedidos/mes</div>
              <div style={{ fontFamily: "var(--serif)", fontSize: 28, color: "var(--ink)" }}>{fmtNum(monthlyOrders)}</div>
            </div>
            <div>
              <div style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: ".08em",
                textTransform: "uppercase", color: "var(--ink-muted)", marginBottom: 6 }}>Ticket promedio</div>
              <div style={{ fontFamily: "var(--serif)", fontSize: 28, color: "var(--ink)" }}>{fmtMXN(avgTicket)}</div>
            </div>
            <div>
              <div style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: ".08em",
                textTransform: "uppercase", color: "var(--ink-muted)", marginBottom: 6 }}>Comision apps</div>
              <div style={{ fontFamily: "var(--serif)", fontSize: 28, color: "var(--ink)" }}>{commissionRate}%</div>
            </div>
          </div>
        </div>

        <div style={{ background: "var(--ink)", borderRadius: 14, padding: "28px 24px", color: "var(--cream)" }}>
          <div style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: ".1em",
            textTransform: "uppercase", color: "var(--green)", marginBottom: 10 }}>
            Ahorro mensual estimado
          </div>
          <div style={{ fontFamily: "var(--serif)", fontVariationSettings: '"opsz" 144, "SOFT" 40',
            fontSize: 40, letterSpacing: "-0.03em", color: "var(--green)", lineHeight: 1 }}>
            {fmtMXN(monthlySavings)}
          </div>
          <div style={{ fontFamily: "var(--mono)", fontSize: 11, color: "rgba(247,242,233,.5)",
            marginTop: 8, letterSpacing: ".04em" }}>
            al migrar {migrationRate}% de pedidos al canal directo
          </div>

          <div style={{ borderTop: "1px solid rgba(247,242,233,.12)", margin: "20px 0", paddingTop: 20 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <div>
                <div style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: ".08em",
                  color: "rgba(247,242,233,.55)", marginBottom: 6 }}>Ahorro anual</div>
                <div style={{ fontFamily: "var(--serif)", fontSize: 24, color: "var(--cream)" }}>
                  {fmtMXN(annualSavings)}
                </div>
              </div>
              <div>
                <div style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: ".08em",
                  color: "rgba(247,242,233,.55)", marginBottom: 6 }}>Ingreso lealtad/mes</div>
                <div style={{ fontFamily: "var(--serif)", fontSize: 24, color: "var(--cream)" }}>
                  {fmtMXN(monthlyLoyaltyRevenue)}
                </div>
              </div>
            </div>
          </div>

          <div style={{ borderTop: "1px solid rgba(247,242,233,.12)", paddingTop: 20 }}>
            <div style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: ".1em",
              textTransform: "uppercase", color: "var(--green)", marginBottom: 8 }}>
              Beneficio total anual
            </div>
            <div style={{ fontFamily: "var(--serif)", fontVariationSettings: '"opsz" 144, "SOFT" 60',
              fontSize: 48, letterSpacing: "-0.03em", color: "var(--green)", lineHeight: 1 }}>
              {fmtMXN(totalAnnualBenefit)}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


/* —— Config form —— */
function ConfigForm({ form, setField, onSubmit, submitting, success, generatedUrl, onReset, error }) {
  const allRequired = form.restaurantName.trim() && form.contactName.trim()
    && form.contactEmail.trim() && form.contactPhone.trim();

  if (success && generatedUrl) {
    return (
      <div className="prop-form">
        <SuccessState url={generatedUrl} restaurantName={form.restaurantName} onReset={onReset} />
      </div>
    );
  }

  return (
    <div className="prop-form">
      <div className="prop-form-header">
        <div className="icon"><GearIcon /></div>
        <h2>Configurar Propuesta</h2>
      </div>
      <p className="prop-form-sub">Todos los campos se reflejan en el documento completo</p>

      {error && <div className="pf-error">{error}</div>}

      {/* Contact fields */}
      <div className="pf-field">
        <label>Nombre del restaurante <span className="req">*</span></label>
        <input type="text" placeholder="Tu Restaurante" required
          value={form.restaurantName} onChange={(e) => setField("restaurantName", e.target.value)} />
      </div>
      <div className="pf-field">
        <label>Nombre de contacto <span className="req">*</span></label>
        <input type="text" placeholder="Ej: Juan Perez" required
          value={form.contactName} onChange={(e) => setField("contactName", e.target.value)} />
      </div>
      <div className="pf-field">
        <label>Email de contacto <span className="req">*</span></label>
        <input type="email" placeholder="Ej: juan@restaurante.com" required
          value={form.contactEmail} onChange={(e) => setField("contactEmail", e.target.value)} />
      </div>
      <div className="pf-field">
        <label>Telefono de contacto <span className="req">*</span></label>
        <input type="tel" placeholder="Ej: +52 55 1234 5678" required
          value={form.contactPhone} onChange={(e) => setField("contactPhone", e.target.value)} />
      </div>

      <hr className="prop-form-divider" />

      {/* Sliders */}
      <Slider label="Numero de sucursales" value={form.locations}
        min={1} max={15} step={1} onChange={(v) => setField("locations", v)} />

      <Slider label="Pedidos mensuales" value={form.monthlyOrders}
        min={100} max={10000} step={100}
        format={fmtNum} onChange={(v) => setField("monthlyOrders", v)} />

      <Slider label="Ticket promedio (MXN)" value={form.avgTicket}
        min={50} max={500} step={10}
        format={fmtMXN} onChange={(v) => setField("avgTicket", v)} />

      <Slider label="Comision delivery apps (%)" value={form.commissionRate}
        min={10} max={50} step={1}
        format={fmtPct} onChange={(v) => setField("commissionRate", v)} />

      <Slider label="Migracion esperada a canal directo (%)" value={form.migrationRate}
        min={10} max={80} step={5}
        format={fmtPct} onChange={(v) => setField("migrationRate", v)} />

      <hr className="prop-form-divider" />

      {/* Optional message */}
      <div className="pf-field">
        <label>Mensaje personalizado</label>
        <textarea placeholder="Ej: Propuesta exclusiva para tu expansion en el sureste..."
          value={form.customMessage} onChange={(e) => setField("customMessage", e.target.value)} />
      </div>

      {/* Submit */}
      <button className="pf-btn" disabled={!allRequired || submitting} onClick={onSubmit}>
        {submitting ? (
          <>Generando...</>
        ) : (
          <><LinkIcon /> Generar enlace de propuesta</>
        )}
      </button>
    </div>
  );
}


/* —— Success state —— */
function SuccessState({ url, restaurantName, onReset }) {
  const [copied, setCopied] = React.useState(false);

  const handleCopy = () => {
    navigator.clipboard.writeText(url).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  return (
    <div className="pf-success">
      <div className="check"><CheckIcon /></div>
      <h3>Enlace generado</h3>
      <p style={{ fontSize: 14, color: "var(--ink-muted)", margin: "0 0 8px" }}>
        Propuesta lista para <strong>{restaurantName}</strong>
      </p>
      <div className="url-box">
        <span className="url-text">{url}</span>
        <button className="copy-btn" onClick={handleCopy}>
          {copied ? "Copiado" : <><CopyIcon /> Copiar</>}
        </button>
      </div>
      <button className="reset-link" onClick={onReset}>
        Generar otra propuesta
      </button>
    </div>
  );
}


/* —— Main App —— */
function App() {
  const [form, setForm] = React.useState({
    restaurantName: "",
    contactName: "",
    contactEmail: "",
    contactPhone: "",
    locations: 1,
    monthlyOrders: 1500,
    avgTicket: 180,
    commissionRate: 22,
    migrationRate: 40,
    customMessage: "",
  });

  const [submitting, setSubmitting] = React.useState(false);
  const [success, setSuccess] = React.useState(false);
  const [generatedUrl, setGeneratedUrl] = React.useState("");
  const [error, setError] = React.useState(null);

  const setField = (key, value) => {
    setForm((prev) => ({ ...prev, [key]: value }));
  };

  const metrics = computeMetrics(form);

  const handleSubmit = async () => {
    setSubmitting(true);
    setError(null);
    try {
      const payload = {
        restaurantName: form.restaurantName.trim(),
        contactName: form.contactName.trim(),
        contactEmail: form.contactEmail.trim(),
        contactPhone: form.contactPhone.trim(),
        locations: form.locations,
        monthlyOrders: form.monthlyOrders,
        avgTicket: form.avgTicket,
        commissionRate: form.commissionRate,
        migrationRate: form.migrationRate,
        customMessage: form.customMessage.trim() || undefined,
        monthlySavings: metrics.monthlySavings,
        annualSavings: metrics.annualSavings,
        monthlyLoyaltyRevenue: metrics.monthlyLoyaltyRevenue,
        totalAnnualBenefit: metrics.totalAnnualBenefit,
      };
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || "Error al generar la propuesta.");
      }
      const data = await res.json();
      const code = data.code || data.id || "preview";
      const url = `https://fluxsales.co/p/${code}`;
      setGeneratedUrl(url);
      setSuccess(true);
    } catch (err) {
      setError(err.message);
    } finally {
      setSubmitting(false);
    }
  };

  const handleReset = () => {
    setForm({
      restaurantName: "",
      contactName: "",
      contactEmail: "",
      contactPhone: "",
      locations: 1,
      monthlyOrders: 1500,
      avgTicket: 180,
      commissionRate: 22,
      migrationRate: 40,
      customMessage: "",
    });
    setSuccess(false);
    setGeneratedUrl("");
    setError(null);
  };

  const scrollToPreview = () => {
    const el = document.getElementById("live-preview");
    if (el) el.scrollIntoView({ behavior: "smooth" });
  };

  return (
    <>
      <ConfigNav onScrollPreview={scrollToPreview} />
      <FloatingBadge restaurantName={form.restaurantName} />

      <div className="prop-layout">
        <ConfigForm
          form={form}
          setField={setField}
          onSubmit={handleSubmit}
          submitting={submitting}
          success={success}
          generatedUrl={generatedUrl}
          onReset={handleReset}
          error={error}
        />
        <div id="live-preview">
          <LivePreview form={form} metrics={metrics} />
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
